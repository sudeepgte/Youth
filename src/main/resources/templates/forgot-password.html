<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 18px 60px rgba(55, 65, 81, 0.16);
            width: 100%;
            max-width: 400px;
        }

        .login-container h2 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            background-color: #fff;
            color: var(--text-primary);
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--gradient-1);
            color: var(--text-primary);
            border: 1px solid rgba(55, 65, 81, 0.12);
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 800;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 40px rgba(55, 65, 81, 0.16);
        }

        .register-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 14px;
        }

        .register-link a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 800;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div style="position: absolute; top: 30px; left: 30px; z-index: 10;">
        <a th:href="@{/login}" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-primary); text-decoration: none; font-weight: 700; background: rgba(255,255,255,0.8); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s;">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>
    </div>

    <div class="login-container">
        <h2>Reset Password</h2>

        <!-- Success Message -->
        <div th:if="${param.success}"
             style="color: #15803d; background: rgba(21,128,61,0.08); border: 1.5px solid #86efac; padding: 12px 14px; border-radius: 10px; text-align: center; margin-bottom: 1rem; font-weight: 600; font-size: 14px; display:flex; align-items:center; gap:8px; justify-content:center;">
            <i class="fas fa-check-circle"></i> Password reset successful! You can now log in.
        </div>

        <!-- Error: User not found -->
        <div th:if="${param.error != null and param.error[0] == 'not_found'}"
             style="color: #ff4444; background-color: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 1rem;">
            No user found matching that username and email combination.
        </div>

        <!-- Error: Weak Password -->
        <div th:if="${param.error != null and param.error[0] == 'weak_password'}"
             style="color: #ff4444; background-color: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 1rem;">
            Password must be at least 8 characters long and contain uppercase, lowercase, digit, and special symbol.
        </div>

        <!-- Error: Passwords mismatch -->
        <div th:if="${param.error != null and param.error[0] == 'mismatch'}"
             style="color: #ff4444; background-color: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 1rem;">
            Passwords do not match.
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="newPassword" name="newPassword" required style="padding-right: 44px;">
                    <i class="far fa-eye" id="toggleNewPassword" style="position: absolute; right: 16px; cursor: pointer; color: var(--text-secondary); font-size: 16px; user-select: none;"></i>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="confirmPassword" name="confirmPassword" required style="padding-right: 44px;">
                    <i class="far fa-eye" id="toggleConfirmPassword" style="position: absolute; right: 16px; cursor: pointer; color: var(--text-secondary); font-size: 16px; user-select: none;"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">Reset Password</button>
        </form>
        <div class="register-link">
            Remember your password? <a th:href="@{/login}">Login</a>
        </div>
    </div>

    <script>
        function setupToggle(toggleId, inputId) {
            const toggle = document.querySelector(toggleId);
            const input = document.querySelector(inputId);
            if (toggle && input) {
                toggle.addEventListener('click', function () {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }
        }
        setupToggle('#toggleNewPassword', '#newPassword');
        setupToggle('#toggleConfirmPassword', '#confirmPassword');
    </script>
</body>

</html>
