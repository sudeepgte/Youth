<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentrix Snake & Ladder | Arena</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="context-path" th:content="@{/}">

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- SockJS + STOMP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/game-rewards.js}"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700;900&display=swap');

        :root {
            --board-wood: #2c1b18;
            --tile-light: rgba(255, 255, 255, 0.03);
            --tile-dark: rgba(255, 255, 255, 0.07);
            --p1-color: #ff4757;
            --p2-color: #2ed573;
            --p3-color: #1e90ff;
            --p4-color: #ffa502;
            --ladder-gold: linear-gradient(to bottom, #ffd700, #b8860b);
            --snake-skin: #2ecc71;
            --premium-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: #0a0a0c !important;
            color: #fff !important;
            font-family: 'Crimson Pro', serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px 0;
        }

        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: float 20s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        .game-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            padding: 40px;
            background: rgba(15, 15, 20, 0.8) !important;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            box-shadow: var(--premium-shadow), inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.05) 0%, transparent 40%);
            pointer-events: none;
        }

        .board-container {
            width: 620px;
            height: 620px;
            background: #0a0a0c;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            border: 12px solid var(--board-wood);
            border-radius: 12px;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.8);
            padding: 2px;
        }

        .cell {
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.15);
            background: var(--tile-light);
            position: relative;
            transition: all 0.3s ease;
            animation: fadeInTile 0.5s ease backwards;
        }

        @keyframes fadeInTile {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .cell.dark {
            background: var(--tile-dark);
        }

        .cell span {
            position: relative;
            z-index: 2;
        }

        .cell[data-num="1"],
        .cell[data-num="100"] {
            background: linear-gradient(135deg, #ffd700 0%, #daa520 100%) !important;
            color: #000 !important;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            font-weight: 900;
            font-size: 18px;
        }

        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .player {
            width: 30px;
            height: 40px;
            position: absolute;
            z-index: 20;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 5px 5px rgba(0, 0, 0, 0.4));
        }

        .pawn-top {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin: 0 auto;
        }

        .pawn-body {
            width: 24px;
            height: 28px;
            margin: -6px auto 0;
            clip-path: polygon(20% 100%, 80% 100%, 100% 80%, 100% 20%, 50% 0%, 0% 20%, 0% 80%);
        }

        .player-0 .pawn-top,
        .player-0 .pawn-body {
            background: var(--p1-color);
        }

        .player-1 .pawn-top,
        .player-1 .pawn-body {
            background: var(--p2-color);
        }

        .player-2 .pawn-top,
        .player-2 .pawn-body {
            background: var(--p3-color);
        }

        .player-3 .pawn-top,
        .player-3 .pawn-body {
            background: var(--p4-color);
        }

        .ladder-rail {
            stroke: #daa520;
            stroke-width: 8;
            stroke-linecap: round;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            animation: ladderShimmer 3s infinite alternate;
        }

        @keyframes ladderShimmer {
            0% { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)) brightness(1); }
            100% { filter: drop-shadow(0 4px 12px rgba(255, 215, 0, 0.4)) brightness(1.3); }
        }

        .snake-body-path {
            fill: none;
            stroke-width: 12;
            stroke: var(--snake-skin);
            stroke-linecap: round;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            stroke-dasharray: 10;
            animation: snakeMove 20s linear infinite;
            opacity: 0.9;
        }

        @keyframes snakeMove {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }

        .snake-head {
            fill: #1b5e20;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            animation: headPulse 2s infinite ease-in-out;
        }

        @keyframes headPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .snake-eye {
            fill: #fff;
        }

        .control-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .dice-box {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 20px 0;
        }

        .dice {
            width: 60px;
            height: 60px;
            transform-style: preserve-3d;
            transition: transform 0.8s;
            position: relative;
        }

        .dice-side {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            display: grid;
            grid-template: repeat(3, 1fr) / repeat(3, 1fr);
            padding: 8px;
            box-sizing: border-box;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
            place-self: center;
        }

        .side-1 {
            transform: translateZ(30px);
        }

        .side-2 {
            transform: rotateY(90deg) translateZ(30px);
        }

        .side-3 {
            transform: rotateY(180deg) translateZ(30px);
        }

        .side-4 {
            transform: rotateY(-90deg) translateZ(30px);
        }

        .side-5 {
            transform: rotateX(90deg) translateZ(30px);
        }

        .side-6 {
            transform: rotateX(-90deg) translateZ(30px);
        }

        .rolling {
            animation: roll 0.5s infinite linear;
        }

        @keyframes roll {
            from {
                transform: rotateX(0deg) rotateY(0deg);
            }

            to {
                transform: rotateX(360deg) rotateY(360deg);
            }
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 900;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .event-log {
            height: 150px;
            overflow-y: auto;
            text-align: left;
            font-size: 12px;
            font-family: monospace;
            color: #888;
        }

        .log-line {
            margin-bottom: 4px;
            border-left: 2px solid #fff;
            padding-left: 8px;
            color: #fff;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .victory-text {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
    </style>
</head>

<body th:data-username="${user != null ? user.username : 'Player'}">
    <div class="bg-particles">
        <div class="particle-glow" style="top: 10%; left: 10%; background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);"></div>
        <div class="particle-glow" style="bottom: 10%; right: 10%; animation-delay: -5s; background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, transparent 70%);"></div>
    </div>
    <div id="root"></div>

    <script type="text/babel" th:inline="none">
        // <![CDATA[
        const getUniqueGuestName = () => {
            const baseName = document.body.dataset.username || 'Player';
            if (baseName !== 'Player') return baseName;
            let guestName = sessionStorage.getItem('snakeGuestName');
            if (!guestName) {
                guestName = 'Guest_' + Math.floor(1000 + Math.random() * 9000);
                sessionStorage.setItem('snakeGuestName', guestName);
            }
            return guestName;
        };
        const userName = getUniqueGuestName();
        const cp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const MAPS = {
            2: 38, 7: 14, 8: 31, 15: 26, 21: 42, 28: 84, 36: 44, 51: 67, 71: 91, 78: 98,
            16: 6, 46: 25, 49: 11, 62: 19, 64: 60, 74: 53, 89: 68, 92: 88, 95: 75, 99: 80
        };

        function getCoord(num) {
            if (num <= 0) return { x: -40, y: 560 };
            let row = Math.floor((num - 1) / 10), col = (num - 1) % 10;
            let actualRow = 9 - row;
            if (row % 2 !== 0) col = 9 - col;
            const CELL_SIZE = 58.4, MARGIN = 10;
            return { x: (col * CELL_SIZE) + MARGIN + 12, y: (actualRow * CELL_SIZE) + MARGIN + 10 };
        }

        function SnakeSVG() {
            return (
                <svg id="game-overlay" viewBox="0 0 620 620">
                    <defs>
                        <linearGradient id="ladderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style={{stopColor:'#ffd700', stopOpacity:1}} />
                            <stop offset="100%" style={{stopColor:'#b8860b', stopOpacity:1}} />
                        </linearGradient>
                        <linearGradient id="snakeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style={{stopColor:'#2ed573', stopOpacity:1}} />
                            <stop offset="100%" style={{stopColor:'#1b5e20', stopOpacity:1}} />
                        </linearGradient>
                    </defs>
                    {Object.entries(MAPS).map(([f, t]) => {
                        let from = parseInt(f), to = parseInt(t);
                        const s = getCoord(from), e = getCoord(to);
                        const sx = s.x + 5, sy = s.y + 10, ex = e.x + 5, ey = e.y + 10;
                        if (to > from) {
                            const angle = Math.atan2(ey - sy, ex - sx), dx = 8 * Math.sin(angle), dy = 8 * Math.cos(angle);
                            const steps = Math.floor(Math.hypot(ex - sx, ey - sy) / 22), rungs = [];
                            for (let i = 1; i < steps; i++) {
                                const px = sx + (ex - sx) * (i / steps), py = sy + (ey - sy) * (i / steps);
                                rungs.push(<line key={i} x1={px - dx} y1={py + dy} x2={px + dx} y2={py - dy} className="ladder-rung" />);
                            }
                            return <g key={f}><line x1={sx - dx} y1={sy + dy} x2={ex - dx} y2={ey + dy} className="ladder-rail" /><line x1={sx + dx} y1={sy - dy} x2={ex + dx} y2={ey - dy} className="ladder-rail" />{rungs}</g>;
                        } else {
                            const curve = (from % 2 == 0 ? 40 : -40);
                            const d = `M ${sx} ${sy} Q ${(sx + ex) / 2 + curve} ${(sy + ey) / 2}, ${ex} ${ey}`;
                            return (
                                <g key={f}>
                                    <path d={d} className="snake-body-path" style={{stroke: 'url(#snakeGrad)'}} />
                                    <g transform={`translate(${sx},${sy})`}>
                                        <circle cx="0" cy="0" r="8" className="snake-head" />
                                        <circle cx="-2" cy="-2" r="1.5" className="snake-eye" />
                                        <circle cx="2" cy="-2" r="1.5" className="snake-eye" />
                                    </g>
                                </g>
                            );
                        }
                    })}
                </svg>
            );
        }

        function useSnakeSocket(roomId, onStateUpdate, onRollAnim) {
            const stompRef = useRef(null);
            const onStateUpdateRef = useRef(onStateUpdate);
            const onRollAnimRef = useRef(onRollAnim);

            useEffect(() => {
                onStateUpdateRef.current = onStateUpdate;
            }, [onStateUpdate]);

            useEffect(() => {
                onRollAnimRef.current = onRollAnim;
            }, [onRollAnim]);

            useEffect(() => {
                if (!roomId) return;
                console.log("Connecting to room:", roomId);
                const auth = new URLSearchParams(window.location.search).get('auth');
                const cp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
                const wsUrl = auth ? `${cp}/ws?auth=${auth}` : `${cp}/ws`;
                // Ensure wsUrl starts with / if cp was empty
                const finalWsUrl = wsUrl.startsWith('/') ? wsUrl : '/' + wsUrl;
                const socket = new SockJS(finalWsUrl);
                const stomp = Stomp.over(socket);
                stomp.debug = () => { };
                stompRef.current = stomp;
                stomp.connect({}, () => {
                    console.log("Joined WebSocket channel.");
                    stomp.subscribe(`/topic/snake/${roomId}`, (m) => onStateUpdateRef.current(JSON.parse(m.body)));
                    stomp.subscribe(`/topic/snake/${roomId}/rollEvent`, (m) => onRollAnimRef.current(JSON.parse(m.body)));
                    stomp.send(`/app/snake/${roomId}/subscribe`, {}, "{}");
                }, (err) => {
                    console.error("WebSocket Connection Failed", err);
                });
                const handleUnload = () => {
                    if (stomp && stomp.connected) {
                        stomp.send(`/app/snake/${roomId}/leave`, {}, "{}");
                    }
                };
                window.addEventListener('beforeunload', handleUnload);
                return () => {
                    window.removeEventListener('beforeunload', handleUnload);
                    stomp && stomp.disconnect();
                };
            }, [roomId]);

            return {
                sendRoll: (steps, idx) => stompRef.current?.send(`/app/snake/${roomId}/roll`, {}, JSON.stringify({ steps, playerIndex: idx })),
                sendStart: () => stompRef.current?.send(`/app/snake/${roomId}/start`, {}, "{}")
            };
        }

        function Game({ roomId, playerIndex, initialState }) {
            const [state, setState] = useState(initialState || null);
            const [rolling, setRolling] = useState(false);
            const [diceVal, setDiceVal] = useState(1);
            const [logs, setLogs] = useState(["> Arena Online."]);
            const logRef = useRef(null);

            const stateRef = useRef(state);
            useEffect(() => {
                stateRef.current = state;
            }, [state]);

            const pendingStateRef = useRef(null);
            const isRollingRef = useRef(false);

            useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [logs]);

            const onStateUpdate = useCallback((data) => {
                console.log("State Update:", data);
                if (isRollingRef.current) {
                    pendingStateRef.current = data;
                } else {
                    setState(data);
                    if (data.status === "finished") {
                        if (data.players[playerIndex]?.pos >= 100) GameRewards.award('Snake & Ladder', 'WIN');
                        else GameRewards.award('Snake & Ladder', 'PLAY');
                    }
                }
            }, [playerIndex]);

            const onRollAnim = useCallback((data) => {
                setRolling(true);
                isRollingRef.current = true;
                setTimeout(() => {
                    setRolling(false);
                    isRollingRef.current = false;
                    setDiceVal(data.steps);
                    
                    const name = (stateRef.current?.players && stateRef.current.players[data.playerIndex])?.name || "Player";
                    setLogs(prev => [...prev, `> ${name} rolled ${data.steps}.`]);

                    if (pendingStateRef.current) {
                        const nextState = pendingStateRef.current;
                        pendingStateRef.current = null;
                        setState(nextState);
                        if (nextState.status === "finished") {
                            if (nextState.players[playerIndex]?.pos >= 100) GameRewards.award('Snake & Ladder', 'WIN');
                            else GameRewards.award('Snake & Ladder', 'PLAY');
                        }
                    }
                }, 800);
            }, [playerIndex]);

            const { sendRoll, sendStart } = useSnakeSocket(roomId, onStateUpdate, onRollAnim);

            if (!state) return <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#121212", color: "#fff", letterSpacing: 5 }}>SYNCING ARENA...</div>;

            if (state.status === "opponent_left") {
                return (
                    <div className="game-wrapper" style={{ flexDirection: "column", alignItems: "center", justifyContent: "center", width: 620, minHeight: 400, textAlign: "center" }}>
                        <h2 style={{ color: "#ff4757", fontSize: 32 }}>OPPONENT LEFT</h2>
                        <p style={{ color: "#fff", margin: "20px 0" }}>Opponent left the game! Arena closed.</p>
                        <button className="btn" style={{ maxWidth: 300 }} onClick={() => window.location.href = '/games'}>BACK TO LOBBY</button>
                    </div>
                );
            }

            const myTurn = state.turn === playerIndex;
            const isGameOver = state.status === "finished";
            const COLORS = ['--p1-color', '--p2-color', '--p3-color', '--p4-color'];

            if (state.status === "waiting") {
                return (
                    <div className="game-wrapper" style={{ flexDirection: "column", alignItems: "center", justifyContent: "center", width: 620, minHeight: 400, textAlign: "center" }}>
                        <h2 style={{ color: "#FFC107", fontSize: 32 }}>GAME LOBBY</h2>
                        <div style={{ background: "#000", padding: "20px", borderRadius: 12, fontSize: 48, letterSpacing: 12, margin: "20px 0", fontFamily: "monospace", color: "#FFC107" }}>{roomId}</div>
                        <div style={{ width: "100%", maxWidth: 400, background: "rgba(0,0,0,0.5)", padding: 20, borderRadius: 12, textAlign: "left", marginBottom: 30 }}>
                            <div style={{ fontSize: 18, fontWeight: "bold", marginBottom: 15 }}>Players Joined ({state.players.length}/{state.maxPlayers}):</div>
                            {state.players.map((p, i) => (
                                <div key={i} style={{ color: `var(${COLORS[i]})`, fontSize: 16, marginBottom: 8, display: "flex", alignItems: "center" }}>
                                    <div style={{ width: 12, height: 12, borderRadius: "50%", background: `var(${COLORS[i]})`, marginRight: 10 }}></div>
                                    {p.name}
                                </div>
                            ))}
                        </div>
                        {playerIndex === 0 && state.players.length > 1 ? (
                            <button className="btn" style={{ background: "#FFC107", maxWidth: 300 }} onClick={() => sendStart()}>START BATTLE</button>
                        ) : (
                            <p style={{ color: "#888" }}>Waiting for host to start...</p>
                        )}
                        <button className="btn" style={{ background: "transparent", color: "#fff", border: "1px solid #444", maxWidth: 300, marginTop: 15 }} onClick={() => window.location.href = '/games'}>LEAVE</button>
                    </div>
                );
            }

            return (
                <div className="game-wrapper">
                    <div className="board-outer">
                        <div className="board-container">
                            {Array.from({ length: 100 }).map((_, i) => {
                                 let row = Math.floor(i / 10), col = i % 10, actualRow = 9 - row;
                                 let num = (actualRow % 2 === 0) ? (actualRow * 10) + col + 1 : (actualRow * 10) + (9 - col) + 1;
                                 return <div key={i} className={`cell ${i % 2 === 0 ? "" : "dark"}`} data-num={num} style={{animationDelay: `${i * 0.01}s`}}><span>{num}</span></div>;
                             })}
                            <SnakeSVG />
                            {state.players.map((p, idx) => {
                                const c = getCoord(p.pos);
                                return <div key={idx} className={`player player-${idx}`} style={{ left: c.x + (idx * 6) - 10, top: c.y }}><div className="pawn-top" /><div className="pawn-body" /></div>;
                            })}
                        </div>
                    </div>

                    <div className="control-panel">
                        <div className="card">
                                    <div style={{ color: `var(${COLORS[state.turn || 0]})`, fontWeight: 900, fontSize: 20 }}>{(state.players && state.players[state.turn || 0])?.name || 'Player'}'s Turn</div>
                                    <div className="dice-box" onClick={() => !rolling && myTurn && !isGameOver && sendRoll(Math.floor(Math.random() * 6) + 1, playerIndex)}>
                                        <div className={`dice ${rolling ? 'rolling' : ''}`} style={{ transform: rolling ? "" : getDiceRotation(diceVal || 1) }}>
                                            <div className="dice-side side-1"><div className="dot" style={{ gridArea: "2/2" }} /></div>
                                            <div className="dice-side side-2"><div className="dot" style={{ gridArea: "1/1" }} /><div className="dot" style={{ gridArea: "3/3" }} /></div>
                                            <div className="dice-side side-3"><div className="dot" style={{ gridArea: "1/1" }} /><div className="dot" style={{ gridArea: "2/2" }} /><div className="dot" style={{ gridArea: "3/3" }} /></div>
                                            <div className="dice-side side-4"><div className="dot" style={{ gridArea: "1/1" }} /><div className="dot" style={{ gridArea: "1/3" }} /><div className="dot" style={{ gridArea: "3/1" }} /><div className="dot" style={{ gridArea: "3/3" }} /></div>
                                            <div className="dice-side side-5"><div className="dot" style={{ gridArea: "1/1" }} /><div className="dot" style={{ gridArea: "1/3" }} /><div className="dot" style={{ gridArea: "2/2" }} /><div className="dot" style={{ gridArea: "3/1" }} /><div className="dot" style={{ gridArea: "3/3" }} /></div>
                                            <div className="dice-side side-6"><div className="dot" style={{ gridArea: "1/1" }} /><div className="dot" style={{ gridArea: "1/3" }} /><div className="dot" style={{ gridArea: "2/1" }} /><div className="dot" style={{ gridArea: "2/3" }} /><div className="dot" style={{ gridArea: "3/1" }} /><div className="dot" style={{ gridArea: "3/3" }} /></div>
                                        </div>
                                    </div>
                                    <button className="btn" onClick={() => sendRoll(Math.floor(Math.random() * 6) + 1, playerIndex)} disabled={!myTurn || rolling || isGameOver}>ROLL DICE</button>
                        </div>
                        <div className="card event-log" ref={logRef}>{logs.map((l, i) => <div key={i} className="log-line">{l}</div>)}</div>
                        <button className="btn" style={{ background: "transparent", color: "#fff", border: "1px solid #444" }} onClick={() => window.location.href = '/games'}>LEAVE</button>
                    </div>

                    {isGameOver && (
                        <div className="overlay">
                            <h1 className="victory-text" style={{ color: `var(${COLORS[state.turn || 0]})` }}>{(state.players && state.players[state.turn || 0])?.name || 'Winner'} WINS!</h1>
                            <button className="btn" style={{ maxWidth: 200 }} onClick={() => window.location.href = '/games'}>EXIT</button>
                        </div>
                    )}
                </div>
            );
        }

        function getDiceRotation(v) {
            const r = { 1: '0,0', 2: '0,-90', 3: '0,-180', 4: '0,90', 5: '-90,0', 6: '90,0' };
            const [x, y] = r[v].split(',');
            return `rotateX(${x}deg) rotateY(${y}deg)`;
        }

        function App() {
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                const roomCode = new URLSearchParams(window.location.search).get('room');
                if (!roomCode) { setError("Join via Library first."); return; }
                const auth = new URLSearchParams(window.location.search).get('auth');
                const cp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
                const joinUrl = auth ? `${cp}/api/snake/join?auth=${auth}` : `${cp}/api/snake/join`;
                const finalJoinUrl = joinUrl.startsWith('/') ? joinUrl : '/' + joinUrl;

                fetch(finalJoinUrl, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId: roomCode.toUpperCase(), playerName: userName })
                }).then(r => {
                    if (!r.ok) throw new Error("HTTP error " + r.status);
                    return r.json();
                }).then(resp => {
                    console.log("Join response:", resp);
                    if (resp.error) setError(resp.error);
                    else {
                        if (resp.status) window.__INITIAL_SNAKE_GS__ = resp; // Set global for instant use
                        setData(resp);
                    }
                }).catch((e) => {
                    console.error("Join Failed:", e);
                    setError("Arena link failed: " + e.message);
                });
            }, []);

            if (error) return (
                <div style={{ height: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#121212", color: "#fff" }}>
                    <h2 style={{ color: "#f44336" }}>{error}</h2>
                    <p style={{ opacity: 0.5 }}>Make sure the room still exists.</p>
                    <button className="btn" style={{ width: 150, marginTop: 20 }} onClick={() => window.location.href = '/games'}>BACK</button>
                </div>
            );
            if (!data) return <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#121212", color: "#fff", letterSpacing: 5 }}>INITIALIZING...</div>;
            return <Game roomId={data.roomId} playerIndex={data.playerIndex} initialState={window.__INITIAL_SNAKE_GS__} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        // ]]>
    </script>
</body>

</html>
