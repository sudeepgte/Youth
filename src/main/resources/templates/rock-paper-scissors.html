<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Arena | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <meta name="context-path" th:content="@{/}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:src="@{/js/game-rewards.js}"></script>
<style>
        body { background: #0f172a; color: #fff; font-family: 'Inter', sans-serif; }
        .game-status { font-size: 24px; font-weight: 800; color: #fbcc15; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 4px; }
        .choices-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
        .choice-btn { width: 120px; height: 120px; border-radius: 50%; border: 4px solid transparent; background: #1e293b; color: #fff; font-size: 40px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .choice-btn:hover { transform: scale(1.1); border-color: #fbcc15; box-shadow: 0 0 20px rgba(250,204,21,0.3); }
        .choice-btn:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>

    <body th:data-username="${user != null ? user.username : 'Player'}">
    <nav class="navbar" th:replace="~{fragments/template :: navbar('games')}"></nav>

    <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
        <div id="status" class="game-status">INITIALIZING...</div>
        
        <div id="waitArea" style="display: none; text-align: center;">
            <div style="background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155;">
                <h2 style="color: #fbcc15;">GAME LOBBY</h2>
                <div id="roomCode" style="font-size: 48px; letter-spacing: 12px; margin: 20px 0; color: #fbcc15; font-family: monospace;"></div>
                <div style="margin: 20px 0; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px;">
                    <div style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">Players Joined:</div>
                    <div id="lobbyP1" style="font-size: 16px; color: #fbcc15; margin-bottom: 5px;">Player 1: ...</div>
                    <div id="lobbyP2" style="font-size: 16px; color: #fbcc15;">Player 2: Waiting...</div>
                </div>
                <p style="color: #94a3b8; margin-bottom: 20px;">Share this code to invite opponent.</p>
                <button id="startBattleBtn" class="choice-btn" onclick="startBattle()" style="display: none; width: 100%; height: auto; max-width: 300px; margin: 0 auto; background: #fbcc15; color: #000; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase;">START BATTLE</button>
            </div>
        </div>

        <div id="gameArea" style="display: none; width: 100%; max-width: 600px;">
            <div class="choices-card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 40px;">
                    <div style="text-align: left;"><span id="p1Name" style="font-weight: 700;">Player 1</span><div style="font-size: 32px; font-weight: 900;" id="p1Score">0</div></div>
                    <div style="font-size: 24px; align-self: center; opacity: 0.5;">VS</div>
                    <div style="text-align: right;"><span id="p2Name" style="font-weight: 700;">Player 2</span><div style="font-size: 32px; font-weight: 900;" id="p2Score">0</div></div>
                </div>

                <div id="choiceGrid" style="display: flex; justify-content: center; gap: 20px;">
                    <button class="choice-btn" onclick="makeChoice('Rock')"><i class="fas fa-hand-rock"></i></button>
                    <button class="choice-btn" onclick="makeChoice('Paper')"><i class="fas fa-hand-paper"></i></button>
                    <button class="choice-btn" onclick="makeChoice('Scissors')"><i class="fas fa-hand-scissors"></i></button>
                </div>

                <div id="waitingMsg" style="display: none; margin-top: 20px; font-style: italic; opacity: 0.7; text-align: center;">Choice Locked. Waiting for opponent...</div>

                <div id="resultBlock" style="display: none; text-align: center; margin-top: 30px;">
                    <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; font-size: 14px;">
                        <div>RESULT: <span id="p1Choice" style="color: #fbcc15;"></span></div>
                        <div>RESULT: <span id="p2Choice" style="color: #fbcc15;"></span></div>
                    </div>
                    <div id="roundResult" style="font-size: 28px; font-weight: 900; margin-bottom: 20px;"></div>
                    <button id="nextBtn" class="btn" onclick="nextRound()" style="display: none; max-width: 200px; margin: 0 auto;">Next Round</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" th:inline="none">
        // <![CDATA[
        const getUniqueGuestName = () => {
            const baseName = document.body.dataset.username || 'Player';
            if (baseName !== 'Player') return baseName;
            let guestName = sessionStorage.getItem('rpsGuestName');
            if (!guestName) {
                guestName = 'Guest_' + Math.floor(1000 + Math.random() * 9000);
                sessionStorage.setItem('rpsGuestName', guestName);
            }
            return guestName;
        };
        const userName = getUniqueGuestName();
        const cp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
        let stomp = null, rId = null, pNum = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            rId = params.get('room');
            if (!rId) { document.getElementById('status').innerText = "Join via Lobby"; return; }

            try {
                const auth = new URLSearchParams(window.location.search).get('auth');
                const configCp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
                const joinUrl = auth ? `${configCp}/api/rps/join?auth=${auth}` : `${configCp}/api/rps/join`;
                const finalJoinUrl = joinUrl.startsWith('/') ? joinUrl : '/' + joinUrl;

                const res = await fetch(finalJoinUrl, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playerName: userName, roomId: rId.toUpperCase() })
                });
                const data = await res.json();
                if (data.error) throw data.error;
                pNum = parseInt(data.playerNum);
                connect();
            } catch (e) { document.getElementById('status').innerText = e; }
        }

        function connect() {
            const auth = new URLSearchParams(window.location.search).get('auth');
            const configCp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
            const wsPath = auth ? `${configCp}/ws?auth=${auth}` : `${configCp}/ws`;
            const finalWsPath = wsPath.startsWith('/') ? wsPath : '/' + wsPath;
            const socket = new SockJS(finalWsPath);
            stomp = Stomp.over(socket);
            stomp.debug = null;
            stomp.connect({}, () => {
                stomp.subscribe('/topic/rps/' + rId, (m) => update(JSON.parse(m.body)));
                stomp.send("/app/rps/" + rId + "/subscribe", {}, "{}");
            });
        }

        function update(s) {
            document.getElementById('status').innerText = "ARENA ACTIVE";
            if (s.status === 'opponent_left') {
                document.getElementById('status').innerText = "OPPONENT LEFT";
                document.getElementById('waitArea').style.display = 'none';
                document.getElementById('gameArea').style.display = 'block';
                document.getElementById('choiceGrid').style.display = 'none';
                document.getElementById('waitingMsg').style.display = 'none';
                document.getElementById('resultBlock').style.display = 'block';
                document.getElementById('roundResult').innerText = "Opponent left the game! Arena closed.";
                document.getElementById('nextBtn').style.display = 'none';
                return;
            }
            if (s.status === 'waiting') {
                document.getElementById('status').innerText = "GAME LOBBY";
                document.getElementById('waitArea').style.display = 'block';
                document.getElementById('roomCode').innerText = rId;
                document.getElementById('gameArea').style.display = 'none';
                
                document.getElementById('lobbyP1').innerText = "Player 1: " + (s.player1 || "Waiting...");
                document.getElementById('lobbyP2').innerText = "Player 2: " + (s.player2 || "Waiting...");
                
                if (pNum === 1 && s.player2) {
                    document.getElementById('startBattleBtn').style.display = 'block';
                } else {
                    document.getElementById('startBattleBtn').style.display = 'none';
                }
            } else {
                document.getElementById('waitArea').style.display = 'none';
                document.getElementById('gameArea').style.display = 'block';
                document.getElementById('p1Name').innerText = s.player1;
                document.getElementById('p2Name').innerText = s.player2;
                document.getElementById('p1Score').innerText = s.p1Score;
                document.getElementById('p2Score').innerText = s.p2Score;

                const myChosen = pNum === 1 ? s.p1Chosen : s.p2Chosen;
                if (s.lastResult) {
                    document.getElementById('choiceGrid').style.display = 'none';
                    document.getElementById('waitingMsg').style.display = 'none';
                    document.getElementById('resultBlock').style.display = 'block';
                    document.getElementById('p1Choice').innerText = s.p1Choice;
                    document.getElementById('p2Choice').innerText = s.p2Choice;
                    document.getElementById('roundResult').innerText = s.lastResult === 'draw' ? "DRAW!" : (s.lastResult === 'p1' ? s.player1 : s.player2) + " WINS!";
                    
                    if (pNum === 1) document.getElementById('nextBtn').style.display = 'block';
                    
                    // Reward
                    if (s.lastResult === 'draw') GameRewards.award('Rock Paper Scissors', 'PLAY');
                    else if ((s.lastResult === 'p1' && pNum === 1) || (s.lastResult === 'p2' && pNum === 2)) GameRewards.award('Rock Paper Scissors', 'WIN');
                    else GameRewards.award('Rock Paper Scissors', 'PLAY');
                } else if (myChosen) {
                    document.getElementById('choiceGrid').style.display = 'none';
                    document.getElementById('waitingMsg').style.display = 'block';
                    document.getElementById('resultBlock').style.display = 'none';
                } else {
                    document.getElementById('choiceGrid').style.display = 'flex';
                    document.getElementById('waitingMsg').style.display = 'none';
                    document.getElementById('resultBlock').style.display = 'none';
                }
            }
        }

        function makeChoice(c) { stomp.send("/app/rps/" + rId + "/choice", {}, JSON.stringify({ playerNum: pNum, choice: c })); }
        function nextRound() { stomp.send("/app/rps/" + rId + "/nextRound", {}, "{}"); }
        function startBattle() { stomp.send("/app/rps/" + rId + "/start", {}, "{}"); }

        init();
        
        window.addEventListener('beforeunload', () => {
            if (stomp && stomp.connected && rId && pNum) {
                stomp.send("/app/rps/" + rId + "/leave", {}, JSON.stringify({ playerNum: pNum }));
            }
        });
        // ]]>
    </script>
</body>
</html>
