<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Crush | Zentrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 40%, #1a0533 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Nunito', sans-serif;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 0;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255, 100, 200, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 0% 100%, rgba(100, 50, 255, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 100, 200, 0.8), 0 4px 0 #9b00ff, 0 8px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #scoreboard {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 8px 24px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .score-box .label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box .value {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            color: #fff;
        }

        #board-wrap {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 16px;
            backdrop-filter: blur(6px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            gap: 4px;
        }

        .cell {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
            position: relative;
            user-select: none;
            background: rgba(255, 255, 255, 0.04);
        }

        .cell:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        .cell.selected {
            outline: 3px solid #fff;
            outline-offset: 2px;
            transform: scale(1.12);
            filter: brightness(1.3) drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
            z-index: 10;
        }

        .cell.match {
            animation: pop 0.35s ease-out forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(1.2);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .cell.hint {
            border: 3px solid gold !important;
            transform: scale(1.1);
            animation: pulse 0.6s ease-in-out infinite alternate;
            z-index: 5;
        }

        @keyframes pulse {
            from {
                filter: brightness(1);
            }

            to {
                filter: brightness(1.5) drop-shadow(0 0 8px gold);
            }
        }

        #message {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 22px;
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            text-shadow: 0 0 20px rgba(255, 200, 0, 1);
            text-align: center;
            padding: 20px;
        }

        #message.show {
            opacity: 1;
        }

        #controls {
            display: flex;
            gap: 12px;
            margin-top: 18px;
        }

        button {
            font-family: 'Fredoka One', cursive;
            font-size: 1rem;
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.1s;
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.97);
        }

        #btn-new {
            background: linear-gradient(135deg, #ff6eb4, #ff3d7f);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 60, 120, 0.4);
        }

        #btn-hint {
            background: linear-gradient(135deg, #ffd700, #ff9500);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 150, 0, 0.4);
        }

        #btn-hint:disabled {
            background: #444;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .exit-btn {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Fredoka One', cursive;
            transition: 0.3s;
            border: none;
        }

        .exit-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            animation: floatUp 1.2s ease-out forwards;
            z-index: 100;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-120px) scale(0.3);
                opacity: 0;
            }
        }

        @media (max-width: 600px), (max-height: 700px) {
            h1 { font-size: 2rem; margin-bottom: 5px; }
            #scoreboard { gap: 15px; margin-bottom: 10px; }
            .score-box { padding: 5px 12px; }
            .score-box .value { font-size: 1.2rem; }
            #board {
                grid-template-columns: repeat(8, 40px);
                grid-template-rows: repeat(8, 40px);
                gap: 2px;
            }
            .cell {
                width: 40px;
                height: 40px;
                font-size: 20px;
                border-radius: 8px;
            }
            #board-wrap { padding: 8px; }
        }
    </style>
</head>

<body>

    <h1>🍬 Candy Crush</h1>

    <div id="scoreboard">
        <div class="score-box">
            <div class="label">Score</div>
            <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="label">Best</div>
            <div class="value" id="best">0</div>
        </div>
        <div class="score-box">
            <div class="label">Moves</div>
            <div class="value" id="moves">30</div>
        </div>
        <div class="score-box">
            <div class="label">Hints</div>
            <div class="value" id="hints">3</div>
        </div>
    </div>

    <div id="board-wrap">
        <div id="board"></div>
        <div id="message"></div>
    </div>

    <div id="controls">
        <button id="btn-new" onclick="initBoard()">🔀 New Game</button>
        <button id="btn-hint" onclick="showHint()">💡 Hint</button>
        <a th:href="@{/games}" class="exit-btn">Exit Game</a>
    </div>

    <script th:inline="none">
        /*<![CDATA[*/
        const COLS = 8, ROWS = 8;
        const CANDIES = ['🍭', '🍬', '🍫', '🍡', '🧁', '🍩', '🍦'];
        let board = [], selected = null, score = 0, best = parseInt(localStorage.getItem('candyBest')) || 0, movesLeft = 30, hintsLeft = 3;
        let busy = false, hintCells = [];

        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const movesEl = document.getElementById('moves');
        const hintsEl = document.getElementById('hints');
        const msgEl = document.getElementById('message');
        const hintBtn = document.getElementById('btn-hint');

        function idx(r, c) { return r * COLS + c; }

        function initBoard() {
            score = 0; movesLeft = 30; hintsLeft = 3;
            selected = null; busy = false;
            updateHUD();
            msgEl.classList.remove('show');
            msgEl.style.pointerEvents = 'none';

            do {
                board = [];
                for (let r = 0; r < ROWS; r++)
                    for (let c = 0; c < COLS; c++) {
                        let candy;
                        do {
                            candy = CANDIES[Math.floor(Math.random() * CANDIES.length)];
                        } while (
                            (c >= 2 && board[idx(r, c - 1)] === candy && board[idx(r, c - 2)] === candy) ||
                            (r >= 2 && board[idx(r - 1, c)] === candy && board[idx(r - 2, c)] === candy)
                        );
                        board.push(candy);
                    }
            } while (!findValidMoves().length);

            render();
        }

        function render() {
            boardEl.innerHTML = '';
            board.forEach((candy, i) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = candy;
                cell.dataset.i = i;
                cell.addEventListener('click', () => onCellClick(i));
                boardEl.appendChild(cell);
            });
        }

        function cellEl(i) { return boardEl.children[i]; }

        function onCellClick(i) {
            if (busy || movesLeft <= 0) return;
            clearHint();

            if (selected === null) {
                selected = i;
                cellEl(i).classList.add('selected');
                return;
            }

            if (selected === i) {
                cellEl(i).classList.remove('selected');
                selected = null;
                return;
            }

            const r1 = Math.floor(selected / COLS), c1 = selected % COLS;
            const r2 = Math.floor(i / COLS), c2 = i % COLS;

            cellEl(selected).classList.remove('selected');

            if (Math.abs(r1 - r2) + Math.abs(c1 - c2) !== 1) {
                selected = i;
                cellEl(i).classList.add('selected');
                return;
            }

            const prev = selected;
            selected = null;
            swap(prev, i, true);
        }

        async function swap(a, b, playerMove) {
            busy = true;
            [board[a], board[b]] = [board[b], board[a]];

            const matches = findMatches();
            if (matches.length === 0 && playerMove) {
                [board[a], board[b]] = [board[b], board[a]];
                busy = false;
                return;
            }

            if (playerMove) { movesLeft--; updateHUD(); }

            render();
            await resolveMatches();
            checkGameOver();
            busy = false;
        }

        function findMatches() {
            const matched = new Set();
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS - 2; c++) {
                    const i = idx(r, c);
                    if (board[i] && board[i] === board[i + 1] && board[i] === board[i + 2]) {
                        let len = 3;
                        while (c + len < COLS && board[i] === board[idx(r, c + len)]) len++;
                        for (let k = 0; k < len; k++) matched.add(idx(r, c + k));
                    }
                }
            for (let c = 0; c < COLS; c++)
                for (let r = 0; r < ROWS - 2; r++) {
                    const i = idx(r, c);
                    if (board[i] && board[i] === board[i + COLS] && board[i] === board[i + 2 * COLS]) {
                        let len = 3;
                        while (r + len < ROWS && board[i] === board[idx(r + len, c)]) len++;
                        for (let k = 0; k < len; k++) matched.add(idx(r + k, c));
                    }
                }
            return [...matched];
        }

        async function resolveMatches() {
            let matches = findMatches();
            let combo = 0;
            while (matches.length) {
                combo++;
                matches.forEach(i => {
                    const el = cellEl(i);
                    if (el) el.classList.add('match');
                    spawnParticle(i, board[i]);
                });
                score += matches.length * 10 * combo;
                updateHUD();

                await delay(350);

                matches.forEach(i => { board[i] = null; });
                gravity();
                fillBoard();
                render();
                await delay(250);
                matches = findMatches();
            }
        }

        function gravity() {
            for (let c = 0; c < COLS; c++) {
                let empty = ROWS - 1;
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (board[idx(r, c)] !== null) {
                        board[idx(empty, c)] = board[idx(r, c)];
                        if (empty !== r) board[idx(r, c)] = null;
                        empty--;
                    }
                }
                while (empty >= 0) { board[idx(empty, c)] = null; empty--; }
            }
        }

        function fillBoard() {
            for (let i = 0; i < ROWS * COLS; i++)
                if (board[i] === null)
                    board[i] = CANDIES[Math.floor(Math.random() * CANDIES.length)];
        }

        function findValidMoves() {
            const valid = [];
            const trySwap = (a, b) => {
                [board[a], board[b]] = [board[b], board[a]];
                if (findMatches().length) valid.push([a, b]);
                [board[a], board[b]] = [board[b], board[a]];
            };
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS; c++) {
                    if (c < COLS - 1) trySwap(idx(r, c), idx(r, c + 1));
                    if (r < ROWS - 1) trySwap(idx(r, c), idx(r + 1, c));
                }
            return valid;
        }

        function showHint() {
            if (busy || hintsLeft <= 0) return;
            clearHint();
            const valid = findValidMoves();
            if (!valid.length) return;
            
            // Show only ONE random move from valid ones
            const pick = valid[Math.floor(Math.random() * valid.length)];
            hintCells = pick;
            pick.forEach(i => { const el = cellEl(i); if (el) el.classList.add('hint'); });
            
            hintsLeft--;
            updateHUD();
            
            setTimeout(clearHint, 2000);
        }

        function clearHint() {
            hintCells.forEach(i => { const el = cellEl(i); if (el) el.classList.remove('hint'); });
            hintCells = [];
        }

        function checkGameOver() {
            if (movesLeft <= 0) {
                if (score > best) { best = score; bestEl.textContent = best; localStorage.setItem('candyBest', best); }
                showMessage('Game Over! 😢\nScore: ' + score);
                return;
            }
            if (!findValidMoves().length) {
                showMessage('No moves! Shuffling... 🔀');
                setTimeout(initBoard, 1800);
            }
        }

        function showMessage(text) {
            msgEl.textContent = text;
            msgEl.classList.add('show');
            msgEl.style.whiteSpace = 'pre-line';
            setTimeout(() => msgEl.classList.remove('show'), 2500);
        }

        function updateHUD() {
            scoreEl.textContent = score;
            bestEl.textContent = best;
            movesEl.textContent = movesLeft;
            hintsEl.textContent = hintsLeft;
            if (hintsLeft <= 0) hintBtn.disabled = true;
            else hintBtn.disabled = false;
        }

        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        function spawnParticle(cellIdx, emoji) {
            const el = cellEl(cellIdx);
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = emoji;
            p.style.left = rect.left + rect.width / 2 - 10 + 'px';
            p.style.top = rect.top + rect.height / 2 - 10 + 'px';
            document.body.appendChild(p);
            p.addEventListener('animationend', () => p.remove());
        }

        initBoard();
        /*]]>*/
    </script>
</body>

</html>
