<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo King | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- SockJS + STOMP (WebSocket) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <meta name="context-path" th:content="@{/}">

    <style>
        /* ... existing styles ... */
        .lobby-overlay {
            position: fixed;
            inset: 0;
            background: rgba(13, 13, 26, 0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .lobby-card {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .lobby-input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        .btn-lobby {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--red) 0%, #ff5c8a 100%);
            color: #fff;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-lobby:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4);
        }

        .room-info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            color: #fff;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

    <body th:data-username="${user != null ? user.username : 'Player'}" th:data-context-path="@{/}">

    <div id="lobbyOverlay" class="lobby-overlay">
        <h1>LUDO MULTIPLAYER</h1>
        <div class="lobby-card">
            <input type="text" id="playerNameInput" th:value="${user != null ? user.username : ''}" 
                   placeholder="Your Name" class="lobby-input">
            <button class="btn-lobby" onclick="createRoom()">Create New Table</button>
            <div style="margin: 10px 0; font-size: 14px; font-weight: 600; color: #666; text-align: center;">OR</div>
            <input type="text" id="roomCodeInput" placeholder="Enter Table Code" class="lobby-input">
            <button class="btn-lobby" style="background: linear-gradient(135deg, var(--blue) 0%, #4ea8de 100%);" onclick="joinRoom()">Join Table</button>
        </div>
        <a th:href="@{/games}" class="back-btn" style="color: #666; margin-top: 20px; text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Games</a>
    </div>

    <div id="roomInfo" class="room-info" style="display: none;">
        Table: <span id="displayRoomId" style="color: var(--yellow); font-weight: 800;"></span>
    </div>

    <style>
        /* ---- LAYOUT ---- */
        .game-layout {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        /* ---- BOARD ---- */
        #board {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow:
                0 0 0 3px rgba(255, 255, 255, 0.08),
                0 0 40px rgba(0, 0, 0, 0.9),
                0 0 80px rgba(29, 123, 207, 0.25),
                0 0 120px rgba(231, 57, 70, 0.12);
        }

        #boardCanvas {
            display: block;
            cursor: pointer;
        }

        /* ---- SIDEBAR ---- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 195px;
            flex-shrink: 0;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--pc, transparent) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .player-card.active {
            border-color: var(--pc, var(--accent));
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px color-mix(in srgb, var(--pc, var(--accent)) 50%, transparent),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
        }

        .player-card.active::before {
            opacity: 0.12;
        }

        .pc-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--pc, #fff);
            box-shadow: 0 0 10px var(--pc, #fff);
            flex-shrink: 0;
            position: relative;
        }

        .pc-dot::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
        }

        .pc-info .pc-name {
            font-weight: 900;
            font-size: 0.85rem;
            color: #fff;
            line-height: 1.1;
        }

        .pc-info .pc-pieces {
            font-size: 0.7rem;
            color: #888;
            margin-top: 2px;
        }

        .pc-turn-badge {
            margin-left: auto;
            background: var(--pc, #fff);
            color: #000;
            font-size: 0.6rem;
            font-weight: 900;
            padding: 2px 7px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .player-card.active .pc-turn-badge {
            opacity: 1;
        }

        /* Dice Section */
        #diceSection {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.09);
            border-radius: 16px;
            padding: 16px 14px;
            text-align: center;
        }

        #currentPlayerLabel {
            font-weight: 800;
            font-size: 1rem;
            color: #fff;
            margin-bottom: 12px;
            transition: color 0.3s;
            letter-spacing: 0.5px;
        }

        .dice-wrapper {
            position: relative;
            width: 72px;
            height: 72px;
            margin: 0 auto 14px;
            perspective: 200px;
        }

        #dice {
            width: 72px;
            height: 72px;
            background: linear-gradient(145deg, #ffffff 0%, #e8e8e8 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            box-shadow:
                0 6px 0 rgba(0, 0, 0, 0.3),
                0 8px 20px rgba(0, 0, 0, 0.5),
                inset 0 2px 0 rgba(255, 255, 255, 0.8);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            color: #111;
            border: none;
            position: relative;
        }

        #dice:hover:not(.disabled) {
            transform: translateY(-2px) scale(1.05);
        }

        #dice:active:not(.disabled) {
            transform: translateY(2px) scale(0.96);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.3), 0 4px 10px rgba(0, 0, 0, 0.5), inset 0 2px 0 rgba(255, 255, 255, 0.8);
        }

        #dice.rolling {
            animation: diceRoll 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes diceRoll {
            0% {
                transform: rotateX(0deg) rotateY(0deg) scale(1);
            }

            15% {
                transform: rotateX(180deg) rotateY(90deg) scale(1.15);
            }

            30% {
                transform: rotateX(360deg) rotateY(180deg) scale(0.9);
            }

            50% {
                transform: rotateX(270deg) rotateY(270deg) scale(1.1);
            }

            70% {
                transform: rotateX(450deg) rotateY(360deg) scale(0.95);
            }

            85% {
                transform: rotateX(540deg) rotateY(450deg) scale(1.05);
            }

            100% {
                transform: rotateX(720deg) rotateY(540deg) scale(1);
            }
        }

        #rollBtn {
            background: linear-gradient(135deg, #f7b731 0%, #e63946 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Fredoka One', cursive;
            font-size: 1.05rem;
            padding: 11px 28px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(180, 30, 50, 0.5), 0 6px 20px rgba(231, 57, 70, 0.35);
            letter-spacing: 1px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        #rollBtn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25) 0%, transparent 60%);
            pointer-events: none;
        }

        #rollBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(180, 30, 50, 0.5), 0 10px 24px rgba(231, 57, 70, 0.45);
        }

        #rollBtn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(180, 30, 50, 0.5), 0 4px 12px rgba(231, 57, 70, 0.3);
        }

        #rollBtn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            color: #bbb;
            font-size: 0.78rem;
            margin-top: 10px;
            min-height: 18px;
            font-weight: 700;
            letter-spacing: 0.3px;
            transition: all 0.3s;
        }

        #status.capture {
            color: #e63946;
            animation: pulse 0.5s;
        }

        #status.rollAgain {
            color: #f7b731;
            animation: pulse 0.5s;
        }

        #status.good {
            color: #2dc653;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.05)
            }
        }

        .exit-btn {
            display: block;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #aaa;
            padding: 9px 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.82rem;
            transition: all 0.2s;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .exit-btn:hover {
            background: rgba(255, 255, 255, 0.09);
            color: #fff;
        }

        /* ---- OVERLAY ---- */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .game-modal {
            background: linear-gradient(160deg, #1a1a2e 0%, #0f1428 100%);
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 36px 32px;
            text-align: center;
            max-width: 420px;
            width: 92%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 60px rgba(29, 123, 207, 0.15);
        }

        .game-modal h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #f7b731, #e63946);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-modal p {
            color: #aaa;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }

        .section-label {
            color: #666;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .option-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 18px;
        }

        .opt-btn {
            padding: 9px 18px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: #ccc;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .opt-btn:hover {
            border-color: rgba(255, 255, 255, 0.25);
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .opt-btn.sel {
            border-color: #f7b731;
            background: rgba(247, 183, 49, 0.14);
            color: #f7b731;
            box-shadow: 0 0 12px rgba(247, 183, 49, 0.25);
        }

        .start-btn {
            background: linear-gradient(135deg, #2dc653 0%, #1d7bcf 100%);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-family: 'Fredoka One', cursive;
            font-size: 1.25rem;
            padding: 14px 44px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 rgba(10, 80, 30, 0.4), 0 6px 24px rgba(45, 198, 83, 0.35);
            letter-spacing: 1px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .start-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            pointer-events: none;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(10, 80, 30, 0.4), 0 10px 30px rgba(45, 198, 83, 0.45);
        }

        /* Winner modal */
        #winModal {
            display: none;
        }

        #winnerBadge {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 4px solid;
            box-shadow: 0 0 30px currentColor;
            animation: winPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes winPop {
            0% {
                transform: scale(0) rotate(-20deg)
            }

            100% {
                transform: scale(1) rotate(0)
            }
        }

        #winnerText {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            margin: 4px 0 8px;
            animation: winPop 0.7s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .win-msg {
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.92rem;
        }

        /* Toast notification */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: rgba(20, 20, 40, 0.95);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 22px;
            color: #fff;
            font-weight: 800;
            font-size: 0.9rem;
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 14px;
            border-radius: 2px;
            opacity: 0;
            animation: confettiFall 2.5s ease-out forwards;
            pointer-events: none;
            z-index: 150;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0
            }
        }
    </style>
    <h1>🎲 LUDO KING</h1>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Overlay -->
    <div id="overlay">
        <!-- Start Modal -->
        <div class="game-modal" id="startModal">
            <h2>🎲 Ludo King</h2>
            <p>Set up your game and let's play!</p>
            <div class="section-label">Game Mode</div>
            <div class="option-group" id="modeSelect">
                <button class="opt-btn sel" data-mode="pvp">👥 Human vs Human</button>
                <button class="opt-btn" data-mode="pvc">🤖 vs Computer</button>
            </div>
            <div class="section-label">Number of Players</div>
            <div class="option-group" id="playerCountSelect">
                <button class="opt-btn sel" data-n="2">2 Players</button>
                <button class="opt-btn" data-n="3">3 Players</button>
                <button class="opt-btn" data-n="4">4 Players</button>
            </div>
            <button class="start-btn" id="startBtn">🚀 Start Game</button>
            <div style="margin-top:14px;">
                <a th:href="@{/games}" class="exit-btn">← Exit to Games</a>

        </div>

            <button class="start-btn" onclick="location.reload()">🎲 Play Again</button>

                <a th:href="@{/games}" class="exit-btn">← Exit to Games</a>
            </div>

    </div>

    <div class="game-layout">
        <div id="board">
            <canvas id="boardCanvas"></canvas>
        </div>
        <div class="sidebar" id="sidebar">
            <div id="playerCards"></div>
            <div id="diceSection">
                <div id="currentPlayerLabel">Red's Turn</div>
                <div class="dice-wrapper">
                    <div id="dice" onclick="if(!diceDisabled)rollDice()">⚀</div>
                </div>
                <button id="rollBtn" onclick="rollDice()" disabled>Roll Dice</button>
                <div id="status" class="good">Ready to roll</div>
            </div>
            <a th:href="@{/games}" class="exit-btn">← Exit Game</a>
        </div>
    </div>

    <script type="text/javascript" th:inline="none">
        // <![CDATA[
        const getUniqueGuestName = () => {
            const baseName = document.body.dataset.username || 'Player';
            if (baseName !== 'Player') return baseName;
            let guestName = sessionStorage.getItem('ludoGuestName');
            if (!guestName) {
                guestName = 'Guest_' + Math.floor(1000 + Math.random() * 9000);
                sessionStorage.setItem('ludoGuestName', guestName);
            }
            return guestName;
        };
        const userName = getUniqueGuestName();
        const cp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
        // Set initial values once DOM is ready
        let _ludoInitDone = false;
        function ludoInitOnce() {
            if (_ludoInitDone) return;
            _ludoInitDone = true;
            const input = document.getElementById('playerNameInput');
            if (input && !input.value) input.value = userName;
            
            const rId = new URLSearchParams(window.location.search).get('room');
            if (rId) {
                document.getElementById('roomCodeInput').value = rId;
                setTimeout(joinRoom, 500);
            }
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', ludoInitOnce);
        } else {
            ludoInitOnce();
        }
const BOARD_SIZE = Math.min(520, window.innerWidth * 0.92);
        const C = BOARD_SIZE / 15;
        const canvas = document.getElementById('boardCanvas');
        canvas.width = BOARD_SIZE;
        canvas.height = BOARD_SIZE;
        document.getElementById('board').style.width = BOARD_SIZE + 'px';
        document.getElementById('board').style.height = BOARD_SIZE + 'px';
        const ctx = canvas.getContext('2d');

        const COLORS = ['#e63946', '#1d7bcf', '#2dc653', '#f7b731'];
        const NAMES = ['Red', 'Blue', 'Green', 'Yellow'];
        const FACES = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        // ---- CORRECTED TRACK: 52 cells ----
        // Each element is [col, row]
        const TRACK = [
            // Red start column going up: col=6, rows 14→9
            [6, 14], [6, 13], [6, 12], [6, 11], [6, 10], [6, 9],
            // Left arm: row=8 going left
            [5, 8], [4, 8], [3, 8], [2, 8], [1, 8], [0, 8],
            // Corner top-left: row 7 going up, then right
            [0, 7], [0, 6],
            // Top arm: row=6 going right
            [1, 6], [2, 6], [3, 6], [4, 6], [5, 6],
            // Up to top: col=6 going up
            [6, 5], [6, 4], [6, 3], [6, 2], [6, 1], [6, 0],
            // Top right corner
            [7, 0], [8, 0],
            // Right arm top going down
            [8, 1], [8, 2], [8, 3], [8, 4], [8, 5],
            // Row 6 going right
            [9, 6], [10, 6], [11, 6], [12, 6], [13, 6], [14, 6],
            // Corner right: col 14 row 7-8
            [14, 7], [14, 8],
            // Right arm going left: row=8
            [13, 8], [12, 8], [11, 8], [10, 8], [9, 8],
            // col 8 going down
            [8, 9], [8, 10], [8, 11], [8, 12], [8, 13], [8, 14],
            // Bottom: row 14
            [7, 14]
        ];
        // 52 cells total ✓

        // Home straights (6 cells each, excluding center)
        function getHomeStraight(pi, step) {
            // step 0..5, step 5 = center approach
            if (pi === 0) return [7, 13 - step];
            if (pi === 1) return [1 + step, 7];
            if (pi === 2) return [7, 1 + step];
            if (pi === 3) return [13 - step, 7];
        }

        // Starting track positions (which TRACK index each player starts at)
        const STARTS = [0, 13, 26, 39];

        // Safe squares (star positions on track indices)
        const SAFE_SQUARES = new Set([0, 8, 13, 21, 26, 34, 39, 47]);

        // Base positions (visual centers) for the 4 pieces in each player's home zone
        const BASES = [
            [{ c: 1.5, r: 11.5 }, { c: 3.5, r: 11.5 }, { c: 1.5, r: 13.5 }, { c: 3.5, r: 13.5 }], // Red (bottom-left)
            [{ c: 1.5, r: 1.5 }, { c: 3.5, r: 1.5 }, { c: 1.5, r: 3.5 }, { c: 3.5, r: 3.5 }],     // Blue (top-left)
            [{ c: 10.5, r: 1.5 }, { c: 12.5, r: 1.5 }, { c: 10.5, r: 3.5 }, { c: 12.5, r: 3.5 }], // Green (top-right)
            [{ c: 10.5, r: 11.5 }, { c: 12.5, r: 11.5 }, { c: 10.5, r: 13.5 }, { c: 12.5, r: 13.5 }] // Yellow (bottom-right)
        ];

        let state = {
            mode: 'pvp', numPlayers: 2,
            activeSlots: [0, 2], currentSlotIndex: 0,
            currentPlayer: 0,
            diceValue: 0, diceRolled: false,
            pieces: Array.from({ length: 4 }, () => Array.from({ length: 4 }, () => ({ pos: -1 }))),
            playerTypes: Array(4).fill('inactive'),
            isGameOver: false,
            moveableIndices: [],
            roomId: null,
            status: 'waiting',
            playerIndex: -1 // -1 = local, 0-3 = network player
        };

        let diceDisabled = true;
        let animating = false;
        let stompClient = null;

        // ---- MULTIPLAYER ----
        async function createRoom() {
            const playerName = document.getElementById('playerNameInput').value.trim();
            if (!playerName) return alert("Enter your name");
            const auth = new URLSearchParams(window.location.search).get('auth');
            const configCp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
            const path = auth ? `${configCp}/api/ludo/create?auth=${auth}` : `${configCp}/api/ludo/create`;
            const finalPath = path.startsWith('/') ? path : '/' + path;
            
            try {
                const res = await fetch(finalPath, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playerName })
                });
                if (!res.ok) throw new Error("Failed to create room");
                const data = await res.json();
                state.roomId = data.roomId;
                state.playerIndex = data.playerIndex;
                if (data.status) syncState(data); // Apply initial state
                initMultiplayer();
            } catch (err) {
                console.error(err);
                alert("Error creating room: " + err.message);
            }
        }

        async function joinRoom() {
            const playerName = document.getElementById('playerNameInput').value.trim();
            const rId = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            if (!playerName || !rId) return alert("Enter name and code");
            const auth = new URLSearchParams(window.location.search).get('auth');
            const configCp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
            const path = auth ? `${configCp}/api/ludo/join?auth=${auth}` : `${configCp}/api/ludo/join`;
            const finalPath = path.startsWith('/') ? path : '/' + path;

            try {
                const res = await fetch(finalPath, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playerName, roomId: rId })
                });
                if (!res.ok) throw new Error("Failed to join room");
                const data = await res.json();
                if (data.error) return alert(data.error);
                state.roomId = data.roomId;
                state.playerIndex = data.playerIndex;
                if (data.status) syncState(data); // Apply initial state
                initMultiplayer();
            } catch (err) {
                console.error(err);
                alert("Error joining room: " + err.message);
            }
        }

        function initMultiplayer() {
            document.getElementById('lobbyOverlay').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('roomInfo').style.display = 'block';
            document.getElementById('displayRoomId').innerText = state.roomId;
            
            if (rafId) cancelAnimationFrame(rafId);
            render();
            
            connectWebSocket();
        }

        function connectWebSocket() {
            const auth = new URLSearchParams(window.location.search).get('auth');
            const configCp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
            const wsPath = auth ? `${configCp}/ws?auth=${auth}` : `${configCp}/ws`;
            const finalWsPath = wsPath.startsWith('/') ? wsPath : '/' + wsPath;
            const socket = new SockJS(finalWsPath);
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/ludo/' + state.roomId, function (msg) {
                    const roomState = JSON.parse(msg.body);
                    syncState(roomState);
                });
                stompClient.subscribe('/topic/ludo/' + state.roomId + '/roll', function (msg) {
                    const payload = JSON.parse(msg.body);
                    animateDiceRoll(payload.val);
                });
                stompClient.send("/app/ludo/" + state.roomId + "/subscribe", {}, "{}");
            });
        }

        function syncState(roomState) {
            console.log("Syncing State:", roomState);
            // Map backend players to frontend pieces
            roomState.players.forEach((p, pi) => {
                if (p.name) {
                    NAMES[pi] = p.name;
                    state.playerTypes[pi] = 'human';
                } else {
                    state.playerTypes[pi] = 'inactive';
                }
                p.pieces.forEach((pos, i) => {
                    if (state.pieces[pi] && state.pieces[pi][i]) {
                        state.pieces[pi][i].pos = pos;
                    }
                });
            });

            state.currentPlayer = roomState.currentPlayer;
            state.diceValue = roomState.diceValue;
            state.diceRolled = roomState.diceRolled;
            
            // Only show slots with players
            state.activeSlots = roomState.players.filter(p => p.name !== "").map(p => p.index);
            if (state.activeSlots.length === 0) state.activeSlots = [0];

            // Update currentSlotIndex to match currentPlayer
            const slotIdx = state.activeSlots.indexOf(state.currentPlayer);
            if (slotIdx !== -1) state.currentSlotIndex = slotIdx;

            if (state.status === 'waiting' && roomState.status === 'active') {
                if (rafId) cancelAnimationFrame(rafId);
                render();
            }
            if (state.status === 'finished' || roomState.status === 'finished') {
                state.status = 'finished';
                checkWin(); // Show win modal
                return;
            }
            state.status = roomState.status;

            // Compute moveable pieces if it's my turn and dice has been rolled
            if (state.diceRolled && state.currentPlayer === state.playerIndex) {
                const moveable = [];
                state.pieces[state.currentPlayer].forEach((p, i) => {
                    if (canPieceMove(state.currentPlayer, i)) moveable.push(i);
                });
                state.moveableIndices = moveable;
                if (moveable.length === 0) {
                    setStatus('No valid moves!', '');
                    showToast(`${NAMES[state.currentPlayer]} rolled ${state.diceValue} â€” no moves`);
                    // Auto-advance turn after a delay â€” send a skip to server
                    setTimeout(() => {
                        if (stompClient && state.roomId) {
                            stompClient.send("/app/ludo/" + state.roomId + "/skip", {}, JSON.stringify({ playerIndex: state.playerIndex }));
                        }
                    }, 1200);
                } else {
                    setStatus(`Rolled ${state.diceValue} â€” choose a piece!`, 'good');
                }
            } else {
                state.moveableIndices = [];
            }

            // Fallback: Ensure dice face matches state if not currently animating
            const diceEl = document.getElementById('dice');
            if (state.diceRolled && !diceEl.classList.contains('rolling')) {
                diceEl.textContent = FACES[state.diceValue - 1] || '⚀';
            }

            buildPlayerCards();
            updateTurnUI();
        }

        function animateDiceRoll(val) {
            const diceEl = document.getElementById('dice');
            diceEl.classList.add('rolling');
            let frame = 0;
            const interval = setInterval(() => {
                diceEl.textContent = FACES[Math.floor(Math.random() * 6)];
                frame++;
                if (frame > 8) {
                    clearInterval(interval);
                    diceEl.textContent = FACES[val - 1];
                    diceEl.classList.remove('rolling');
                }
            }, 60);
        }

        // ---- BOARD DRAWING ----
        function drawBoard() {
            const s = BOARD_SIZE;
            // Background
            ctx.fillStyle = '#f5f0e8';
            ctx.fillRect(0, 0, s, s);

            // Colored quadrants / bases
            drawBaseZone(0, 0, COLORS[0]);      // Red: col0-5, row9-14
            drawBaseZone(1, 0, COLORS[1]);      // Blue: col0-5, row0-5 â€” needs custom draw
            drawBaseZone(2, 9, COLORS[2]);      // Green: col9-14, row0-5
            drawBaseZone(3, 9, COLORS[3]);      // Yellow: col9-14, row9-14

            // Actually let's draw all 4 correctly:
            // Red: bottom-left → col 0-5, row 9-14
            fillZone(0, 9, 6, 6, COLORS[0]);
            // Blue: top-left → col 0-5, row 0-5
            fillZone(0, 0, 6, 6, COLORS[1]);
            // Green: top-right → col 9-14, row 0-5
            fillZone(9, 0, 6, 6, COLORS[2]);
            // Yellow: bottom-right → col 9-14, row 9-14
            fillZone(9, 9, 6, 6, COLORS[3]);

            // White inner squares in each base
            fillRect(1, 10, 4, 4, '#fff');
            fillRect(1, 1, 4, 4, '#fff');
            fillRect(10, 1, 4, 4, '#fff');
            fillRect(10, 10, 4, 4, '#fff');

            // Base circles
            BASES.forEach((bases, pi) => {
                bases.forEach(b => {
                    drawCircle(b.c * C, b.r * C, C * 0.38, COLORS[pi] + '55', COLORS[pi], 2);
                    // inner glow circle
                    drawCircle(b.c * C, b.r * C, C * 0.22, COLORS[pi] + '33', null, 0);
                });
            });

            // Track cells
            TRACK.forEach((cell, i) => {
                const [col, row] = cell;
                let fill = '#fff';
                // Colored start squares
                const si = STARTS.indexOf(i);
                if (si !== -1) fill = COLORS[si] + '55';
                // Home straights coloring
                for (let pi = 0; pi < 4; pi++) {
                    const hs = STARTS[pi];
                    const relIdx = ((i - hs) % 52 + 52) % 52;
                }
                ctx.fillStyle = fill;
                ctx.fillRect(col * C, row * C, C, C);
                ctx.strokeStyle = '#c8c0b0';
                ctx.lineWidth = 0.8;
                ctx.strokeRect(col * C, row * C, C, C);

                // Star on safe squares
                if (SAFE_SQUARES.has(i) && si === -1) {
                    ctx.font = `${C * 0.55}px serif`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillStyle = 'rgba(80,60,0,0.5)';
                    ctx.fillText('★', col * C + C / 2, row * C + C / 2);
                }
                // Start square arrow
                if (si !== -1) {
                    ctx.font = `${C * 0.55}px serif`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillStyle = COLORS[si];
                    const arrows = ['↑', '→', '↓', '←'];
                    ctx.fillText(arrows[si], col * C + C / 2, row * C + C / 2);
                }
            });

            // Home straights (colored lanes)
            const homeColors = [COLORS[0], COLORS[1], COLORS[2], COLORS[3]];
            for (let pi = 0; pi < 4; pi++) {
                for (let step = 0; step < 5; step++) {
                    const hs = getHomeStraight(pi, step);
                    ctx.fillStyle = homeColors[pi] + '44';
                    ctx.fillRect(hs[0] * C, hs[1] * C, C, C);
                    ctx.strokeStyle = '#c8c0b0';
                    ctx.lineWidth = 0.8;
                    ctx.strokeRect(hs[0] * C, hs[1] * C, C, C);
                }
            }

            // Center triangle quadrants
            const cx = 7.5 * C, cy = 7.5 * C;
            // Top: Green
            drawTri([6 * C, 6 * C], [9 * C, 6 * C], [cx, cy], COLORS[2]);
            // Right: Yellow
            drawTri([9 * C, 6 * C], [9 * C, 9 * C], [cx, cy], COLORS[3]);
            // Bottom: Red
            drawTri([9 * C, 9 * C], [6 * C, 9 * C], [cx, cy], COLORS[0]);
            // Left: Blue
            drawTri([6 * C, 9 * C], [6 * C, 6 * C], [cx, cy], COLORS[1]);

            // Center star
            ctx.font = `${C * 1.2}px serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.fillText('★', cx, cy);

            // Board border
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 3;
            ctx.strokeRect(0, 0, s, s);
        }

        function fillZone(col, row, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(col * C, row * C, w * C, h * C);
        }
        function fillRect(col, row, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(col * C + 1, row * C + 1, w * C - 2, h * C - 2);
        }
        function drawBaseZone(pi, cOff, color) { }
        function drawTri(p1, p2, p3, color) {
            ctx.beginPath();
            ctx.moveTo(p1[0], p1[1]);
            ctx.lineTo(p2[0], p2[1]);
            ctx.lineTo(p3[0], p3[1]);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }
        function drawCircle(x, y, r, fill, stroke, lw) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            if (fill) { ctx.fillStyle = fill; ctx.fill(); }
            if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
        }

        // ---- PIECE DRAWING ----
        function getPieceXY(pi, pieceIdx, piece) {
            if (piece.pos === -1) {
                const b = BASES[pi][pieceIdx];
                return [b.c * C, b.r * C];
            } else if (piece.pos < 52) {
                const globalIdx = (STARTS[pi] + piece.pos) % 52;
                const cell = TRACK[globalIdx];
                return [cell[0] * C + C / 2, cell[1] * C + C / 2];
            } else if (piece.pos < 58) {
                const hs = getHomeStraight(pi, piece.pos - 52);
                return [hs[0] * C + C / 2, hs[1] * C + C / 2];
            } else {
                return [7.5 * C, 7.5 * C];
            }
        }

        // Group pieces on same cell for stacking display
        function drawPieces() {
            const slots = state.activeSlots || [0, 1, 2, 3];
            slots.forEach(pi => {
                state.pieces[pi].forEach((piece, idx) => {
                    if (piece.pos === 57) return;
                    const [cx, cy] = getPieceXY(pi, idx, piece);

                    // Offset if multiple pieces share same global cell
                    let ox = 0, oy = 0;
                    const globalIdx = piece.pos >= 0 && piece.pos < 52 ? (STARTS[pi] + piece.pos) % 52 : -1;
                    let sameCell = 0, myOrder = 0;
                    slots.forEach(ppi => {
                        state.pieces[ppi].forEach((pp2, ii) => {
                            if (pp2.pos >= 0 && pp2.pos < 52) {
                                const gi2 = (STARTS[ppi] + pp2.pos) % 52;
                                if (gi2 === globalIdx) {
                                    if (ppi === pi && ii === idx) myOrder = sameCell;
                                    sameCell++;
                                }
                            }
                        });
                    });
                    if (sameCell > 1) {
                        const offsets = [[-0.18, -0.18], [0.18, -0.18], [-0.18, 0.18], [0.18, 0.18]];
                        const o = offsets[myOrder % 4];
                        if (o) { ox = o[0] * C; oy = o[1] * C; }
                    }

                    const px = cx + ox, py = cy + oy;
                    const isMoveable = state.currentPlayer === pi && state.diceRolled && state.moveableIndices.includes(idx);
                    const r = C * 0.38;

                    // Glow behind moveable pieces
                    if (isMoveable) {
                        const t = Date.now() / 500;
                        const glow = ctx.createRadialGradient(px, py, 0, px, py, r * 2.2);
                        glow.addColorStop(0, `rgba(255,255,255,${0.35 + Math.sin(t) * 0.15})`);
                        glow.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.beginPath();
                        ctx.arc(px, py, r * 2.2, 0, Math.PI * 2);
                        ctx.fillStyle = glow;
                        ctx.fill();
                    }

                    // Shadow
                    ctx.save();
                    ctx.shadowColor = 'rgba(0,0,0,0.55)';
                    ctx.shadowBlur = 8;
                    ctx.shadowOffsetY = 3;

                    // Piece body gradient
                    const grad = ctx.createRadialGradient(px - r * 0.3, py - r * 0.3, r * 0.1, px, py, r);
                    grad.addColorStop(0, lightenColor(COLORS[pi], 50));
                    grad.addColorStop(0.55, COLORS[pi]);
                    grad.addColorStop(1, darkenColor(COLORS[pi], 35));
                    ctx.beginPath();
                    ctx.arc(px, py, r, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.restore();

                    // Outline
                    ctx.beginPath();
                    ctx.arc(px, py, r, 0, Math.PI * 2);
                    ctx.strokeStyle = isMoveable ? '#ffffff' : darkenColor(COLORS[pi], 25);
                    ctx.lineWidth = isMoveable ? 2.5 : 1.5;
                    ctx.stroke();

                    // Gloss highlight
                    ctx.beginPath();
                    ctx.arc(px - r * 0.25, py - r * 0.32, r * 0.23, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.fill();

                    // Moveable indicator: draw a bold UP arrow ABOVE the piece
                    if (isMoveable) {
                        const t = Date.now() / 400;
                        const bounce = Math.sin(t) * 3;
                        const ax = px, ay = py - r - 8 - bounce;
                        const aw = r * 0.55, ah = r * 0.7;
                        ctx.save();
                        ctx.shadowColor = 'rgba(0,0,0,0.6)';
                        ctx.shadowBlur = 6;
                        // Arrow triangle pointing up
                        ctx.beginPath();
                        ctx.moveTo(ax, ay - ah * 0.6);
                        ctx.lineTo(ax + aw, ay + ah * 0.4);
                        ctx.lineTo(ax - aw, ay + ah * 0.4);
                        ctx.closePath();
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                        ctx.strokeStyle = COLORS[pi];
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        // Arrow stem
                        ctx.fillStyle = '#ffffff';
                        ctx.strokeStyle = COLORS[pi];
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.rect(ax - aw * 0.35, ay + ah * 0.4 - 1, aw * 0.7, ah * 0.45);
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                    }
                });
            });
        }

        function lightenColor(hex, amt) {
            const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amt);
            const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amt);
            const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amt);
            return `rgb(${r},${g},${b})`;
        }
        function darkenColor(hex, amt) {
            const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - amt);
            const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - amt);
            const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - amt);
            return `rgb(${r},${g},${b})`;
        }

        // ---- RENDER LOOP ----
        let rafId = null;
        function render() {
            ctx.clearRect(0, 0, BOARD_SIZE, BOARD_SIZE);
            drawBoard();
            drawPieces();
            rafId = requestAnimationFrame(render);
        }

        // ---- PLAYER SLOT ASSIGNMENT ----
        // Slots: 0=Red(bottom-left), 1=Blue(top-left), 2=Green(top-right), 3=Yellow(bottom-right)
        // 2 players: Red(0) vs Green(2) = diagonal opposites
        // 3 players: Red(0), Blue(1), Green(2)
        // 4 players: all four
        function getActiveSlots(n) {
            if (n === 2) return [0, 2];
            if (n === 3) return [0, 1, 2];
            return [0, 1, 2, 3];
        }

        // ---- GAME INIT ----
        function initGame(mode, n) {
            state.mode = mode; state.numPlayers = n;
            state.activeSlots = getActiveSlots(n);
            state.currentSlotIndex = 0;
            state.currentPlayer = state.activeSlots[0];
            state.isGameOver = false;
            state.diceRolled = false; state.diceValue = 0; state.moveableIndices = [];
            state.pieces = Array.from({ length: 4 }, () => Array.from({ length: 4 }, () => ({ pos: -1 })));
            state.playerTypes = Array(4).fill('inactive');
            state.activeSlots.forEach((slot, i) => {
                if (mode === 'pvc' && i > 0) state.playerTypes[slot] = 'computer';
                else state.playerTypes[slot] = 'human';
            });
            buildPlayerCards();
            updateTurnUI();
            if (rafId) cancelAnimationFrame(rafId);
            render();
            if (state.playerTypes[state.currentPlayer] === 'computer') setTimeout(doComputerTurn, 1200);
        }

        function buildPlayerCards() {
            const cont = document.getElementById('playerCards');
            cont.innerHTML = '';
            state.activeSlots.forEach((slot, i) => {
                const d = document.createElement('div');
                d.className = 'player-card' + (slot === state.currentPlayer ? ' active' : '');
                d.id = 'pc' + slot;
                d.style.setProperty('--pc', COLORS[slot]);
                const isHuman = state.playerTypes[slot] === 'human';
                const tag = (state.mode === 'pvc') ? (isHuman ? ' 👤' : ' 🤖') : '';
                d.innerHTML = `<div class="pc-dot"></div>
      <div class="pc-info">
        <div class="pc-name">${NAMES[slot]}${tag}</div>
        <div class="pc-pieces" id="pcpieces${slot}">4 at base</div>
      </div>
      <div class="pc-turn-badge">Turn</div>`;
                cont.appendChild(d);
            });
        }

        function updatePlayerCards() {
            state.activeSlots.forEach(slot => {
                const card = document.getElementById('pc' + slot);
                if (!card) return;
                card.className = 'player-card' + (slot === state.currentPlayer ? ' active' : '');
                const pc = state.pieces[slot];
                const atBase = pc.filter(p => p.pos === -1).length;
                const atHome = pc.filter(p => p.pos >= 57).length;
                const onBoard = 4 - atBase - atHome;
                const parts = [];
                if (atHome > 0) parts.push(`${atHome} home`);
                if (onBoard > 0) parts.push(`${onBoard} on board`);
                if (atBase > 0) parts.push(`${atBase} at base`);
                document.getElementById('pcpieces' + slot).textContent = parts.join(', ') || 'All done!';
            });
        }

        // ---- TURN LOGIC ----
        function updateTurnUI() {
            const pi = state.currentPlayer;
            const label = document.getElementById('currentPlayerLabel');
            label.textContent = NAMES[pi] + (state.playerTypes[pi] === 'computer' ? ' (CPU)' : '') + "'s Turn";
            label.style.color = COLORS[pi];
            const rollBtn = document.getElementById('rollBtn');
            const isCPU = state.playerTypes[pi] === 'computer';
            
            // In multiplayer: disable if not my turn OR dice already rolled
            // In local: disable if dice already rolled OR CPU turn
            if (state.playerIndex !== -1) {
                // Multiplayer mode
                diceDisabled = (state.currentPlayer !== state.playerIndex) || state.diceRolled;
            } else {
                // Local mode
                diceDisabled = state.diceRolled || isCPU;
            }
            rollBtn.disabled = diceDisabled;
            updatePlayerCards();
            if (!state.diceRolled && !diceDisabled) setStatus('Ready to roll', 'good');
        }

        function setStatus(msg, cls = '') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = cls || '';
        }

        function rollDice() {
            if (state.diceRolled || state.isGameOver || animating) return;
            
            // If multiplayer, check if it's my turn
            if (state.playerIndex !== -1 && state.currentPlayer !== state.playerIndex) {
                 return showToast("Not your turn!");
            }

            const val = Math.floor(Math.random() * 6) + 1;
            
            if (state.playerIndex !== -1) {
                // Send to server
                stompClient.send("/app/ludo/" + state.roomId + "/roll", {}, JSON.stringify({ playerIndex: state.playerIndex, val: val }));
            } else {
                // Local logic
                executeRoll(val);
            }
        }

        function executeRoll(val) {
            state.diceValue = val;
            state.diceRolled = true;
            diceDisabled = true;
            document.getElementById('rollBtn').disabled = true;

            // Animate dice
            const diceEl = document.getElementById('dice');
            diceEl.classList.add('rolling');
            let frame = 0;
            const interval = setInterval(() => {
                diceEl.textContent = FACES[Math.floor(Math.random() * 6)];
                frame++;
                if (frame > 8) { clearInterval(interval); diceEl.textContent = FACES[val - 1]; diceEl.classList.remove('rolling'); }
            }, 60);

            setTimeout(() => {
                const pi = state.currentPlayer;
                const moveable = [];
                state.pieces[pi].forEach((p, i) => { if (canPieceMove(pi, i)) moveable.push(i); });
                state.moveableIndices = moveable;

                if (moveable.length === 0) {
                    setStatus('No valid moves!');
                    showToast(`${NAMES[pi]} rolled ${val} â€” no moves`);
                    setTimeout(nextPlayer, 1200);
                } else {
                    setStatus(`Rolled ${val} â€” choose a piece!`, 'good');
                    if (state.playerTypes[pi] === 'computer') {
                        setTimeout(() => doComputerMove(moveable), 900);
                    }
                }
                updateTurnUI();
            }, 700);
        }

        function canPieceMove(pi, idx) {
            const p = state.pieces[pi][idx];
            const v = state.diceValue;
            if (p.pos === -1) return v === 6;
            if (p.pos >= 57) return false;
            if (p.pos + v > 57) return false;
            return true;
        }

        function movePiece(pi, idx) {
            if (animating) return;
            const piece = state.pieces[pi][idx];
            const val = state.diceValue;
            
            const oldPos = piece.pos;
            let newPos;
            if (piece.pos === -1) newPos = 0;
            else newPos = piece.pos + val;

            if (state.playerIndex !== -1) {
                // Send to server
                stompClient.send("/app/ludo/" + state.roomId + "/move", {}, JSON.stringify({ 
                    playerIndex: pi, 
                    pieceIndex: idx,
                    newPos: newPos 
                }));
            } else {
                // Local logic
                executeMove(pi, idx);
            }
        }

        function executeMove(pi, idx) {
            const piece = state.pieces[pi][idx];
            const val = state.diceValue;
            animating = true;
            state.moveableIndices = [];

            if (piece.pos === -1) piece.pos = 0;
            else piece.pos += val;

            // Capture check
            if (piece.pos < 52) {
                const globalIdx = (STARTS[pi] + piece.pos) % 52;
                if (!SAFE_SQUARES.has(globalIdx)) {
                    let captured = false;
                    state.pieces.forEach((opp, op) => {
                        if (op === pi) return;
                        opp.forEach(op2 => {
                            if (op2.pos >= 0 && op2.pos < 52) {
                                const og = (STARTS[op] + op2.pos) % 52;
                                if (og === globalIdx) {
                                    op2.pos = -1;
                                    captured = true;
                                    showToast(`💥 ${NAMES[pi]} captured ${NAMES[op]}!`, COLORS[pi]);
                                    setStatus('Captured!', 'capture');
                                }
                            }
                        });
                    });
                    if (!captured) setStatus('Piece moved!', 'good');
                }
            }

            if (piece.pos === 57) {
                setStatus('🏠 Piece reached home!', 'good');
                showToast(`🏠 ${NAMES[pi]}'s piece is home!`, COLORS[pi]);
            }

            setTimeout(() => {
                animating = false;
                checkWin();
                if (!state.isGameOver) {
                    if (val === 6) {
                        state.diceRolled = false;
                        setStatus('🎲 Rolled 6 â€” roll again!', 'rollAgain');
                        showToast(`${NAMES[pi]} rolled 6 â€” roll again!`, COLORS[pi]);
                        updateTurnUI();
                        if (state.playerTypes[state.currentPlayer] === 'computer') setTimeout(doComputerTurn, 1100);
                    } else {
                        nextPlayer();
                    }
                }
            }, 200);
        }

        function doComputerTurn() {
            if (state.isGameOver || state.diceRolled) return;
            rollDice();
        }

        function doComputerMove(moveable) {
            // Smarter AI: prefer capturing, then entering, then advancing
            const pi = state.currentPlayer;
            let best = moveable[0];
            let bestScore = -999;
            moveable.forEach(idx => {
                const p = state.pieces[pi][idx];
                let score = 0;
                const newPos = (p.pos === -1) ? 0 : p.pos + state.diceValue;
                if (p.pos === -1) score += 10; // enter board
                if (newPos >= 57) score += 50; // reach home
                // check capture
                if (newPos < 52) {
                    const gi = (STARTS[pi] + newPos) % 52;
                    state.pieces.forEach((opp, op) => {
                        if (op === pi) return;
                        opp.forEach(op2 => {
                            if (op2.pos >= 0 && op2.pos < 52) {
                                const og = (STARTS[op] + op2.pos) % 52;
                                if (og === gi && !SAFE_SQUARES.has(gi)) score += 30;
                            }
                        });
                    });
                }
                score += newPos * 0.1; // advance furthest
                if (score > bestScore) { bestScore = score; best = idx; }
            });
            movePiece(pi, best);
        }

        function nextPlayer() {
            state.currentSlotIndex = (state.currentSlotIndex + 1) % state.activeSlots.length;
            state.currentPlayer = state.activeSlots[state.currentSlotIndex];
            state.diceRolled = false;
            state.moveableIndices = [];
            updateTurnUI();
            if (state.playerTypes[state.currentPlayer] === 'computer') {
                setStatus('CPU is thinking...', '');
                setTimeout(doComputerTurn, 1200);
            }
        }

        function checkWin() {
            const pi = state.currentPlayer;
            if (state.pieces[pi].every(p => p.pos >= 57)) {
                state.isGameOver = true;
                cancelAnimationFrame(rafId);
                render();
                launchConfetti();
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'flex';
                    document.getElementById('startModal').style.display = 'none';
                    const wm = document.getElementById('winModal');
                    wm.style.display = 'block';
                    const wb = document.getElementById('winnerBadge');
                    wb.style.color = COLORS[pi];
                    wb.style.borderColor = COLORS[pi];
                    wb.style.boxShadow = `0 0 30px ${COLORS[pi]}`;
                    const wt = document.getElementById('winnerText');
                    const isHuman = state.playerTypes[pi] === 'human';
                    wt.textContent = NAMES[pi] + (isHuman ? '' : ' (CPU)') + ' WINS! 🎉';
                    wt.style.color = COLORS[pi];
                }, 400);
            }
        }

        // ---- CLICK HANDLER ----
        canvas.addEventListener('click', e => {
            if (!state.diceRolled || state.playerTypes[state.currentPlayer] === 'computer' || animating) return;
            const rect = canvas.getBoundingClientRect();
            const sx = BOARD_SIZE / rect.width, sy = BOARD_SIZE / rect.height;
            const mx = (e.clientX - rect.left) * sx, my = (e.clientY - rect.top) * sy;
            const pi = state.currentPlayer;
            let picked = -1;
            state.pieces[pi].forEach((piece, idx) => {
                if (!state.moveableIndices.includes(idx)) return;
                const [px, py] = getPieceXY(pi, idx, piece);
                const dist = Math.hypot(mx - px, my - py);
                if (dist < C * 0.5) picked = idx;
            });
            if (picked !== -1) movePiece(pi, picked);
        });

        // ---- TOAST ----
        let toastTimer = null;
        function showToast(msg, color = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.borderColor = color ? `${color}55` : 'rgba(255,255,255,0.15)';
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
        }
        
        function initLocalIfNoRoom() {
            const rId = new URLSearchParams(window.location.search).get('room');
            if (!rId && !state.roomId) {
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('startModal').style.display = 'block';
            }
        }

        // ---- CONFETTI ----
        function launchConfetti() {
            const colors = ['#e63946', '#1d7bcf', '#2dc653', '#f7b731', '#fff', '#FF69B4', '#00BFFF'];
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-piece';
                p.style.cssText = `
      left:${Math.random() * 100}vw;
      top:-20px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      animation-delay:${Math.random() * 1.5}s;
      animation-duration:${1.8 + Math.random() * 1.5}s;
      width:${8 + Math.random() * 8}px;
      height:${10 + Math.random() * 12}px;
      transform:rotate(${Math.random() * 360}deg);
    `;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }
        }

        // ---- MODAL SETUP ----
        document.querySelectorAll('.opt-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                this.parentElement.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel'));
                this.classList.add('sel');
            });
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            const mode = document.querySelector('#modeSelect .opt-btn.sel').dataset.mode;
            const n = parseInt(document.querySelector('#playerCountSelect .opt-btn.sel').dataset.n);
            initGame(mode, n);
            document.getElementById('overlay').style.display = 'none';
        });

        // Initial board draw
        drawBoard();
        initLocalIfNoRoom();

        // ]]>
    </script>
</body>
