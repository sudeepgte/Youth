<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Redeem Reward | Zentrix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --surface: #111111;
            --primary: #f84464;
            --accent: #ffd700;
            --text: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
        }

        p {
            color: var(--text-muted);
            margin: 0 0 20px 0;
        }

        .reward-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .reward-card strong {
            color: var(--text);
            display: block;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        
        .reward-card .detail {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent), #f59e0b);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .alert-error {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">
        <i class="fas fa-store"></i>
    </div>
    
    <h1>Partner Redemption Portal</h1>
    
    <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}">Success</div>

    <div th:if="${reward != null}">
        <div class="reward-card">
            <span style="font-size:12px; color:var(--accent); text-transform:uppercase; font-weight:700; display:block; margin-bottom:5px;">Sponsored By</span>
            <strong th:text="${reward.secretReward.businessName}">Business Name</strong>
            <div class="detail" th:text="${reward.secretReward.category}">Category</div>
            
            <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <span style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:5px;">Reward</span>
                <strong style="color:var(--primary);" th:text="${reward.secretReward.rewardName}">Free Burger</strong>
                <div class="detail" style="margin-bottom:5px;" th:text="${reward.secretReward.description}">Description</div>
                <div class="detail" style="font-size:0.8rem; font-style:italic;" th:if="${reward.secretReward.terms}" th:text="'T&C: ' + ${reward.secretReward.terms}">T&C</div>
            </div>
            
            <div style="margin-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span style="color:var(--text-muted); font-size:0.9rem;">Status</span>
                    <span th:if="${reward.status == 'AVAILABLE'}" style="color:#10b981; font-weight:700;">AVAILABLE</span>
                    <span th:if="${reward.status == 'REDEEMED'}" style="color:#aaa; font-weight:700;">REDEEMED</span>
                </div>
                <div style="display:flex; justify-content:space-between;">
                    <span style="color:var(--text-muted); font-size:0.9rem;">Customer</span>
                    <span style="color:#fff; font-weight:600;" th:text="${reward.user.username}">Username</span>
                </div>
            </div>
        </div>

        <form th:if="${reward.status == 'AVAILABLE'}" th:action="@{/rewards/redeem/{code}(code=${reward.rewardCode})}" method="post">
            <button type="submit" class="btn">Confirm Redemption</button>
        </form>
        
        <button th:if="${reward.status != 'AVAILABLE'}" type="button" class="btn" disabled>Already Redeemed</button>
    </div>
</div>

</body>
</html>
