<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario - Realistic | Zentrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a0a00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }

        #outer-frame {
            position: relative;
            background: linear-gradient(180deg, #2a1500 0%, #1a0c00 100%);
            border-radius: 18px;
            padding: 14px 14px 10px;
            box-shadow:
                0 0 0 3px #5a3a10,
                0 0 0 5px #3a2000,
                0 8px 60px rgba(0, 0, 0, .95),
                0 0 80px rgba(200, 100, 20, .08),
                inset 0 2px 0 rgba(255, 200, 100, .15);
        }

        /* Bezel screws */
        .screw {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #aaa 0%, #555 50%, #222 100%);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .3);
        }

        .screw::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 70%;
            height: 1px;
            background: rgba(0, 0, 0, .5);
        }

        .screw.tl {
            top: 6px;
            left: 6px;
        }

        .screw.tr {
            top: 6px;
            right: 6px;
        }

        .screw.bl {
            bottom: 6px;
            left: 6px;
        }

        .screw.br {
            bottom: 6px;
            right: 6px;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px 8px;
            background: linear-gradient(180deg, #0a0500 0%, #060300 100%);
            border-radius: 6px 6px 0 0;
            border-bottom: 2px solid #3a2000;
        }

        .hud-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 80px;
        }

        .hud-label {
            font-size: 7px;
            color: #cc8800;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 11px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 200, 0, .6);
        }

        .hud-center {
            text-align: center;
        }

        .hud-coins {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #ffdd00;
            text-shadow: 0 0 8px rgba(255, 220, 0, .8);
        }

        .coin-icon {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 35% 35%, #ffe066 0%, #ffaa00 60%, #cc7700 100%);
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(255, 200, 0, .6);
            display: inline-block;
        }

        #canvas-wrap {
            position: relative;
            line-height: 0;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            cursor: default;
        }

        #screen-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            /* CRT scanline effect */
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 3px,
                    rgba(0, 0, 0, .06) 3px,
                    rgba(0, 0, 0, .06) 4px);
            border-radius: 0;
        }

        /* Screen glass reflection */
        #screen-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, .04) 0%,
                    transparent 40%,
                    transparent 60%,
                    rgba(255, 255, 255, .02) 100%);
        }

        #game-over-screen,
        #start-screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(0, 0, 0, .82);
            backdrop-filter: blur(2px);
        }

        #game-over-screen h2,
        #start-screen h2 {
            font-size: 18px;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255, 50, 50, .8), 2px 2px 0 #880000;
            animation: blink .8s step-end infinite;
        }

        #start-screen h2 {
            font-size: 20px;
            color: #ffdd00;
            text-shadow: 0 0 20px rgba(255, 220, 0, .9), 3px 3px 0 #886600;
            animation: none;
        }

        #start-screen .subtitle {
            font-size: 8px;
            color: #ff6600;
            letter-spacing: 2px;
        }

        #start-screen .press-start {
            font-size: 9px;
            color: #ffffff;
            animation: blink 1s step-end infinite;
            margin-top: 8px;
        }

        @keyframes blink {
            50% {
                opacity: 0
            }
        }

        .go-score {
            font-size: 10px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, .5);
        }

        .play-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            padding: 10px 22px;
            background: linear-gradient(180deg, #ff6600 0%, #cc3300 100%);
            color: #fff;
            border: 2px solid #ff8800;
            border-bottom: 4px solid #881100;
            border-right: 3px solid #aa2200;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 80, 0, .4);
            transition: transform .1s;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .play-btn:active {
            transform: translateY(2px);
            border-bottom: 2px solid #881100;
        }

        /* Mobile controls */
        #mobile-controls {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 4px;
            background: #060300;
            border-radius: 0 0 6px 6px;
            border-top: 2px solid #3a2000;
        }

        @media (max-width:700px) {
            #mobile-controls {
                display: flex;
            }
        }

        .d-pad {
            display: grid;
            grid-template-areas: ". up ." "left . right" ". down .";
            gap: 2px;
        }

        .dpad-btn {
            width: 32px;
            height: 32px;
            background: linear-gradient(180deg, #444 0%, #222 100%);
            border: 1px solid #666;
            border-bottom: 3px solid #111;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            color: #aaa;
        }

        .dpad-btn:active {
            border-bottom: 1px solid #111;
            transform: translateY(2px);
        }

        .dpad-up {
            grid-area: up
        }

        .dpad-left {
            grid-area: left
        }

        .dpad-right {
            grid-area: right
        }

        .dpad-down {
            grid-area: down
        }

        .action-btns {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-jump {
            background: radial-gradient(circle at 40% 35%, #ff6644 0%, #cc2200 70%);
            color: #fff;
            box-shadow: 0 4px 0 #881100;
        }

        .btn-jump:active {
            box-shadow: 0 1px 0 #881100;
            transform: translateY(3px);
        }

        .btn-run {
            background: radial-gradient(circle at 40% 35%, #ffcc00 0%, #cc8800 70%);
            color: #fff;
            box-shadow: 0 4px 0 #886600;
        }

        .btn-run:active {
            box-shadow: 0 1px 0 #886600;
            transform: translateY(3px);
        }

        /* Lives display */
        .lives-display {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .life-icon {
            width: 14px;
            height: 14px;
            opacity: 0.9;
        }

        .exit-btn {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .exit-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
    <script th:src="@{/js/game-rewards.js}"></script>
</head>

<body>

    <div id="outer-frame">
        <div class="screw tl"></div>
        <div class="screw tr"></div>
        <div class="screw bl"></div>
        <div class="screw br"></div>

        <div id="hud">
            <div class="hud-group">
                <span class="hud-label">MARIO</span>
                <span class="hud-value" id="hud-score">000000</span>
            </div>
            <div class="hud-group hud-center">
                <div class="hud-coins">
                    <span class="coin-icon"></span>
                    <span id="hud-coins">x00</span>
                </div>
                <div style="font-size:7px;color:#888;margin-top:3px;letter-spacing:1px;">WORLD</div>
                <div class="hud-value" style="font-size:9px;" id="hud-world">1-1</div>
            </div>
            <div class="hud-group" style="align-items:flex-end;">
                <span class="hud-label">TIME</span>
                <span class="hud-value" id="hud-time">400</span>
            </div>
        </div>

        <div id="canvas-wrap">
            <canvas id="c" width="768" height="432"></canvas>
            <div id="screen-overlay"></div>

            <div id="start-screen">
                <h2>SUPER MARIO</h2>
                <div class="subtitle">★ WORLD 1-1 ★</div>
                <canvas id="mario-preview" width="80" height="80"
                    style="image-rendering:pixelated;margin:8px 0;"></canvas>
                <div class="press-start">PRESS SPACE OR CLICK TO START</div>
                <button class="play-btn" id="start-btn">&#9654; START GAME</button>
                <div style="margin-top: 10px;">
                    <a th:href="@{/games}" class="exit-btn">Exit Game</a>
                </div>
            </div>

            <div id="game-over-screen" style="display:none;">
                <h2>GAME OVER</h2>
                <div class="go-score">SCORE: <span id="final-score">0</span></div>
                <div class="go-score" style="margin-top: 5px; color: #ffdd00;">BEST: <span id="best-score">0</span></div>
                <button class="play-btn" id="restart-btn" style="margin-top: 10px;">&#9654; TRY AGAIN</button>
                <div style="margin-top: 10px;">
                    <a th:href="@{/games}" class="exit-btn">Exit Game</a>
                </div>
            </div>
        </div>

        <div id="mobile-controls">
            <div class="d-pad">
                <div class="dpad-btn dpad-up" id="mb-up">&#9650;</div>
                <div class="dpad-btn dpad-left" id="mb-left">&#9664;</div>
                <div class="dpad-btn dpad-right" id="mb-right">&#9654;</div>
                <div class="dpad-btn dpad-down" id="mb-down">&#9660;</div>
            </div>
            <div style="font-size:8px;color:#555;text-align:center;">
                <div style="color:#cc8800;margin-bottom:4px;">LIVES</div>
                <div id="lives-display" style="color:#fff;font-size:10px;">♥♥♥</div>
            </div>
            <div class="action-btns">
                <button class="action-btn btn-run" id="mb-run">B</button>
                <button class="action-btn btn-jump" id="mb-jump">A</button>
            </div>
        </div>
    </div>

    <script th:inline="none">
        /*<![CDATA[*/
        // ════════════════════════════════════════════════════
        //   SUPER MARIO  &mdash;  Full Game Engine
        // ════════════════════════════════════════════════════

        const C = document.getElementById('c');
        const ctx = C.getContext('2d');
        const W = 768, H = 432;

        // ── Constants ──────────────────────────────────────
        const TILE = 32;
        const GRAVITY = 0.55;
        const JUMP_FORCE = -13.5;
        const RUN_SPEED = 4.2;
        const WALK_SPEED = 2.6;
        const MAX_FALL = 14;
        const FRICTION = 0.82;
        const LEVEL_WIDTH = 6400;

        // ── Palette ────────────────────────────────────────
        const PAL = {
            sky1: '#5c94fc', sky2: '#3060c0',
            ground1: '#c84c0c', ground2: '#a83000', ground3: '#f8b878',
            brick1: '#c84c0c', brick2: '#8b3000',
            qblock1: '#f8c038', qblock2: '#c08000', qblock3: '#f8f0c8',
            pipe1: '#54d818', pipe2: '#3ab810', pipe3: '#c8fca8',
            cloud1: '#fcfcfc', cloud2: '#e8e8e8',
            mario_hat: '#cc0000', mario_skin: '#ffcc88', mario_shirt: '#cc0000',
            mario_overall: '#0000cc', mario_shoe: '#5c3a14',
            goomba1: '#c84c0c', goomba2: '#7a2a00', goomba_eye: '#111',
            coin: '#f8c038', coin2: '#c08000',
            flag: '#54d818', pole: '#aaa',
            star1: '#f8d800', star2: '#c09000',
        };

        // ── State ─────────────────────────────────────────
        let keys = {};
        let gameState = 'start'; // start | playing | dead | gameover | win
        let score = 0, coins = 0, lives = 3, timeLeft = 400;
        let timeTimer = 0;
        let cameraX = 0;
        let particles = [];
        let coinAnims = [];
        let frameCount = 0;
        let jumpPressed = false;
        let bestScore = parseInt(localStorage.getItem('marioBest')) || 0;

        // ── Mario ──────────────────────────────────────────
        const mario = {
            x: 80, y: H - TILE * 3,
            w: 28, h: 32,
            vx: 0, vy: 0,
            onGround: false,
            dir: 1, // 1=right, -1=left
            running: false,
            dead: false,
            deadTimer: 0,
            invincible: 0,
            animFrame: 0,
            animTimer: 0,
            Big: false,
        };

        // ── Level Layout ────────────────────────────────────
        // Tiles: G=ground, B=brick, Q=question, P=pipe(bot), p=pipe(top), _=air, E=end flag
        const GROUND_Y = H - TILE * 2; // top of ground row

        // Build level
        let platforms = [];
        let bricks = [];
        let qblocks = [];
        let pipes = [];
        let enemies = [];
        let coinItems = [];
        let flagX = 5900;

        function buildLevel() {
            platforms = []; bricks = []; qblocks = []; pipes = []; enemies = []; coinItems = [];

            // Full ground with some gaps
            for (let x = 0; x < LEVEL_WIDTH; x += TILE) {
                // gaps
                if ((x >= 1600 && x < 1760) || (x >= 2560 && x < 2688) || (x >= 3200 && x < 3264)) continue;
                platforms.push({ x, y: GROUND_Y, w: TILE, h: TILE * 2, type: 'ground' });
            }

            // Floating platforms
            const fp = [
                { x: 256, y: GROUND_Y - TILE * 4, w: TILE * 3 }, { x: 512, y: GROUND_Y - TILE * 5, w: TILE * 2 },
                { x: 800, y: GROUND_Y - TILE * 4, w: TILE * 4 }, { x: 1024, y: GROUND_Y - TILE * 6, w: TILE * 2 },
                { x: 1280, y: GROUND_Y - TILE * 4, w: TILE * 3 }, { x: 1850, y: GROUND_Y - TILE * 4, w: TILE * 5 },
                { x: 2100, y: GROUND_Y - TILE * 5, w: TILE * 3 }, { x: 2800, y: GROUND_Y - TILE * 4, w: TILE * 4 },
                { x: 3300, y: GROUND_Y - TILE * 5, w: TILE * 3 }, { x: 3600, y: GROUND_Y - TILE * 6, w: TILE * 2 },
                { x: 3900, y: GROUND_Y - TILE * 4, w: TILE * 5 }, { x: 4200, y: GROUND_Y - TILE * 3, w: TILE * 3 },
                { x: 4500, y: GROUND_Y - TILE * 5, w: TILE * 4 }, { x: 4800, y: GROUND_Y - TILE * 4, w: TILE * 2 },
                { x: 5100, y: GROUND_Y - TILE * 5, w: TILE * 3 }, { x: 5400, y: GROUND_Y - TILE * 3, w: TILE * 6 },
            ];
            fp.forEach(p => {
                for (let x = p.x; x < p.x + p.w; x += TILE)
                    platforms.push({ x, y: p.y, w: TILE, h: TILE, type: 'stone' });
            });

            // Bricks
            const bs = [
                { x: 384, y: GROUND_Y - TILE * 4 }, { x: 416, y: GROUND_Y - TILE * 4 }, { x: 448, y: GROUND_Y - TILE * 4 },
                { x: 576, y: GROUND_Y - TILE * 5 }, { x: 608, y: GROUND_Y - TILE * 5 },
                { x: 1152, y: GROUND_Y - TILE * 4 }, { x: 1184, y: GROUND_Y - TILE * 4 }, { x: 1216, y: GROUND_Y - TILE * 4 },
                { x: 1920, y: GROUND_Y - TILE * 5 }, { x: 1952, y: GROUND_Y - TILE * 5 },
                { x: 2400, y: GROUND_Y - TILE * 4 }, { x: 2432, y: GROUND_Y - TILE * 4 },
                { x: 3072, y: GROUND_Y - TILE * 4 }, { x: 3104, y: GROUND_Y - TILE * 4 }, { x: 3136, y: GROUND_Y - TILE * 4 },
                { x: 4096, y: GROUND_Y - TILE * 4 }, { x: 4128, y: GROUND_Y - TILE * 4 },
                { x: 4700, y: GROUND_Y - TILE * 5 }, { x: 4732, y: GROUND_Y - TILE * 5 }, { x: 4764, y: GROUND_Y - TILE * 5 },
            ];
            bs.forEach(b => bricks.push({ x: b.x, y: b.y, w: TILE, h: TILE, hit: false, hitAnim: 0 }));

            // Question blocks (with coins)
            const qs = [
                { x: 416, y: GROUND_Y - TILE * 4 }, { x: 704, y: GROUND_Y - TILE * 5 }, { x: 736, y: GROUND_Y - TILE * 5 },
                { x: 1120, y: GROUND_Y - TILE * 4 }, { x: 1248, y: GROUND_Y - TILE * 4 },
                { x: 2048, y: GROUND_Y - TILE * 5 }, { x: 2080, y: GROUND_Y - TILE * 5 },
                { x: 2688, y: GROUND_Y - TILE * 4 }, { x: 3264, y: GROUND_Y - TILE * 5 },
                { x: 3840, y: GROUND_Y - TILE * 5 }, { x: 4160, y: GROUND_Y - TILE * 4 },
                { x: 4864, y: GROUND_Y - TILE * 5 }, { x: 5200, y: GROUND_Y - TILE * 4 },
            ];
            qs.forEach(q => qblocks.push({ x: q.x, y: q.y, w: TILE, h: TILE, hit: false, hitAnim: 0, bounceY: 0 }));

            // Coins on ground
            const cs = [
                200, 232, 264, 320, 352, 520, 552, 600, 680, 720, 760,
                900, 940, 980, 1060, 1100, 1140, 1400, 1440, 1480,
                1860, 1900, 1940, 2150, 2200, 2250, 2900, 2940, 2980,
                3340, 3380, 3700, 3740, 3780, 4050, 4090, 4130,
                4520, 4560, 4600, 4640, 4920, 4960, 5000, 5120, 5160,
            ];
            cs.forEach(x => coinItems.push({ x, y: GROUND_Y - TILE * 2.5, w: 14, h: 18, collected: false, animT: Math.random() * Math.PI * 2 }));

            // Pipes
            const pp = [
                { x: 640, h: 2 }, { x: 960, h: 3 }, { x: 1344, h: 2 },
                { x: 1984, h: 3 }, { x: 2496, h: 2 }, { x: 2816, h: 3 },
                { x: 3456, h: 2 }, { x: 3744, h: 3 }, { x: 4288, h: 2 },
                { x: 4640, h: 3 }, { x: 5056, h: 2 }, { x: 5312, h: 3 },
                { x: 5600, h: 2 }, { x: 5760, h: 4 },
            ];
            pp.forEach(p => pipes.push({ x: p.x, y: GROUND_Y - TILE * p.h - 8, w: TILE * 2, h: TILE * p.h + 8, headY: GROUND_Y - TILE * p.h - 8 }));

            // Enemies (Goombas)
            const es = [
                320, 480, 700, 850, 1050, 1200, 1350, 1550, 1880, 2050,
                2200, 2400, 2650, 2900, 3050, 3300, 3500, 3700, 3900,
                4100, 4300, 4500, 4700, 4900, 5100, 5300, 5500, 5700,
            ];
            es.forEach(x => enemies.push({
                x, y: GROUND_Y - TILE, w: 30, h: 30,
                vx: -1.2, vy: 0, onGround: false,
                dead: false, deadTimer: 0, squished: false,
                animT: 0, dir: -1,
            }));
        }

        // ── Collision ──────────────────────────────────────
        function rectOverlap(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function getAllSolids() {
            const solids = [...platforms];
            bricks.forEach(b => { if (!b.hit) solids.push(b); });
            qblocks.forEach(q => { if (!q.hit) solids.push({ ...q, y: q.y + q.bounceY }); });
            pipes.forEach(p => solids.push(p));
            return solids;
        }

        function resolveY(entity, solids) {
            entity.y += entity.vy;
            entity.onGround = false;
            for (const s of solids) {
                if (rectOverlap(entity, s)) {
                    if (entity.vy > 0) { // falling
                        entity.y = s.y - entity.h;
                        entity.vy = 0;
                        entity.onGround = true;
                    } else if (entity.vy < 0) { // rising
                        entity.y = s.y + s.h;
                        entity.vy = 0;
                        // hit block from below
                        if (entity === mario) {
                            hitBlock(s, solids);
                        }
                    }
                }
            }
        }

        function resolveX(entity, solids) {
            entity.x += entity.vx;
            for (const s of solids) {
                if (rectOverlap(entity, s)) {
                    if (entity.vx > 0) entity.x = s.x - entity.w;
                    else if (entity.vx < 0) entity.x = s.x + s.w;
                    entity.vx *= -1;
                }
            }
        }

        function hitBlock(s, solids) {
            // Check qblock
            const q = qblocks.find(q => q === s || (!q.hit && q.x === s.x && q.y === s.y));
            if (q && !q.hit) {
                q.hit = true; q.hitAnim = 8; q.bounceY = 0;
                spawnCoinAnim(q.x + TILE / 2, q.y);
                addScore(200); coins++;
                updateHUD(); return;
            }
            // Check brick
            const b = bricks.find(b => b === s || (!b.hit && b.x === s.x && b.y === s.y));
            if (b && !b.hit) {
                b.hit = true;
                spawnBrickParts(b.x + TILE / 2, b.y);
                addScore(50);
            }
        }

        // ── Particles ──────────────────────────────────────
        function spawnBrickParts(x, y) {
            for (let i = 0; i < 8; i++) {
                const a = (Math.random() * Math.PI * 2);
                particles.push({
                    x, y, vx: Math.cos(a) * 3 + ((i < 4) ? -2 : 2), vy: Math.sin(a) * 3 - 4,
                    w: 8, h: 6, color: PAL.brick1, life: 1, decay: .04, gravity: 0.3, rot: Math.random() * 6.28
                });
            }
        }

        function spawnCoinAnim(x, y) {
            coinAnims.push({ x, y, vy: -8, life: 1, decay: .03 });
        }

        function spawnDeathParts(x, y) {
            for (let i = 0; i < 12; i++) {
                const a = (i / 12) * Math.PI * 2;
                particles.push({
                    x, y, vx: Math.cos(a) * 4, vy: Math.sin(a) * 4 - 3,
                    w: 6, h: 6, color: PAL.mario_hat, life: 1, decay: .025, gravity: 0.25, rot: 0
                });
            }
        }

        // ── Camera ─────────────────────────────────────────
        function updateCamera() {
            const target = mario.x - W * 0.35;
            cameraX += (target - cameraX) * 0.12;
            cameraX = Math.max(0, Math.min(LEVEL_WIDTH - W, cameraX));
        }

        // ── Background drawing ────────────────────────────
        function drawBackground() {
            // Sky gradient
            const sky = ctx.createLinearGradient(0, 0, 0, H);
            sky.addColorStop(0, '#3060c0');
            sky.addColorStop(0.5, '#5c94fc');
            sky.addColorStop(1, '#8ab4f8');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, H);

            // Sun
            const sx = W - 80 - (cameraX * 0.05) % W;
            drawSun(sx, 60);

            // Mountains (far parallax)
            drawMountains(cameraX * 0.1);

            // Clouds (parallax)
            const cloudData = [
                { bx: 200, y: 60, s: 1.2 }, { bx: 500, y: 40, s: 0.9 }, { bx: 900, y: 70, s: 1.4 },
                { bx: 1300, y: 50, s: 1.1 }, { bx: 1700, y: 65, s: 0.8 }, { bx: 2100, y: 45, s: 1.3 },
                { bx: 2600, y: 55, s: 1.0 }, { bx: 3000, y: 40, s: 1.2 }, { bx: 3500, y: 70, s: 0.9 },
                { bx: 4000, y: 50, s: 1.1 }, { bx: 4600, y: 60, s: 1.3 }, { bx: 5200, y: 45, s: 0.8 },
            ];
            cloudData.forEach(cd => {
                const cx = (cd.bx - cameraX * 0.4 + LEVEL_WIDTH) % LEVEL_WIDTH - LEVEL_WIDTH * 0.1;
                if (cx > -200 && cx < W + 200) drawCloud(cx, cd.y, cd.s);
            });

            // Bushes
            const bushData = [150, 400, 750, 1100, 1500, 1900, 2300, 2700, 3100, 3500, 3900, 4300, 4700, 5100, 5500];
            bushData.forEach(bx => {
                const px = bx - cameraX;
                if (px > -100 && px < W + 100) drawBush(px, GROUND_Y + 2);
            });

            // Hills
            const hillData = [80, 600, 1200, 1800, 2400, 3000, 3600, 4200, 4800, 5400];
            hillData.forEach((hx, i) => {
                const px = hx - cameraX;
                if (px > -200 && px < W + 200) drawHill(px, GROUND_Y, i % 2 === 0 ? 1.2 : 0.9);
            });
        }

        function drawSun(x, y) {
            ctx.save();
            // glow
            const g = ctx.createRadialGradient(x, y, 10, x, y, 60);
            g.addColorStop(0, 'rgba(255,240,180,.3)');
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, 60, 0, Math.PI * 2); ctx.fill();
            // rays
            ctx.strokeStyle = 'rgba(255,230,150,.25)'; ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const a = i * Math.PI / 4 + (frameCount * 0.003);
                ctx.beginPath(); ctx.moveTo(x + Math.cos(a) * 28, y + Math.sin(a) * 28);
                ctx.lineTo(x + Math.cos(a) * 55, y + Math.sin(a) * 55); ctx.stroke();
            }
            // main
            const sg = ctx.createRadialGradient(x - 6, y - 6, 2, x, y, 22);
            sg.addColorStop(0, '#fff9e0'); sg.addColorStop(0.5, '#ffe880'); sg.addColorStop(1, '#ffc030');
            ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawMountains(offset) {
            const mts = [
                { x: 0, h: 160, w: 220 }, { x: 180, h: 130, w: 180 }, { x: 340, h: 180, w: 260 },
                { x: 560, h: 140, w: 200 }, { x: 720, h: 190, w: 240 },
            ];
            ctx.save();
            mts.forEach(m => {
                const mx = (m.x - offset * 0.5 + 1600) % 1600 - 100;
                if (mx < -300 || mx > W + 300) return;
                // shadow side
                ctx.fillStyle = '#3a5a8a';
                ctx.beginPath(); ctx.moveTo(mx, GROUND_Y);
                ctx.lineTo(mx + m.w * 0.5, GROUND_Y - m.h);
                ctx.lineTo(mx + m.w, GROUND_Y); ctx.closePath(); ctx.fill();
                // light side
                const mg = ctx.createLinearGradient(mx, GROUND_Y - m.h, mx + m.w, GROUND_Y);
                mg.addColorStop(0, '#5a7aaa'); mg.addColorStop(0.4, '#7a9ac8'); mg.addColorStop(1, '#3a5a8a');
                ctx.fillStyle = mg;
                ctx.beginPath(); ctx.moveTo(mx, GROUND_Y);
                ctx.lineTo(mx + m.w * 0.4, GROUND_Y - m.h);
                ctx.lineTo(mx + m.w * 0.5, GROUND_Y - m.h);
                ctx.lineTo(mx + m.w, GROUND_Y); ctx.closePath(); ctx.fill();
                // snow cap
                ctx.fillStyle = 'rgba(255,255,255,.8)';
                ctx.beginPath(); ctx.moveTo(mx + m.w * 0.5, GROUND_Y - m.h);
                ctx.lineTo(mx + m.w * 0.42, GROUND_Y - m.h + 22);
                ctx.lineTo(mx + m.w * 0.58, GROUND_Y - m.h + 22); ctx.closePath(); ctx.fill();
            });
            ctx.restore();
        }

        function drawCloud(x, y, scale) {
            ctx.save();
            ctx.translate(x, y); ctx.scale(scale, scale);
            // shadow
            ctx.fillStyle = 'rgba(0,0,80,.06)';
            ctx.beginPath(); ctx.ellipse(4, 6, 40, 14, 0, 0, Math.PI * 2); ctx.fill();
            // cloud body
            const cg = ctx.createRadialGradient(0, -5, 5, 0, 0, 50);
            cg.addColorStop(0, '#ffffff'); cg.addColorStop(0.7, '#f0f0f0'); cg.addColorStop(1, '#dde');
            ctx.fillStyle = cg;
            ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2);
            ctx.arc(-22, 6, 13, 0, Math.PI * 2);
            ctx.arc(22, 6, 14, 0, Math.PI * 2);
            ctx.arc(-10, 8, 10, 0, Math.PI * 2);
            ctx.arc(10, 8, 11, 0, Math.PI * 2);
            ctx.fill();
            // highlight
            ctx.fillStyle = 'rgba(255,255,255,.6)';
            ctx.beginPath(); ctx.ellipse(-4, -8, 12, 6, -.3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawBush(x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#2a8800';
            ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2);
            ctx.arc(-20, 4, 13, 0, Math.PI * 2);
            ctx.arc(20, 4, 14, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#3aaa00';
            ctx.beginPath(); ctx.arc(-4, -4, 14, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,.08)';
            ctx.beginPath(); ctx.ellipse(-6, -8, 7, 4, -.3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawHill(x, y, scale) {
            ctx.save();
            ctx.translate(x, y); ctx.scale(scale, 1);
            const hg = ctx.createRadialGradient(-20, -60, 10, 0, 0, 100);
            hg.addColorStop(0, '#5ab82a'); hg.addColorStop(0.5, '#3a8a18'); hg.addColorStop(1, '#286010');
            ctx.fillStyle = hg;
            ctx.beginPath(); ctx.arc(0, 0, 80, Math.PI, Math.PI * 2, false); ctx.closePath(); ctx.fill();
            // grass top
            ctx.fillStyle = '#6cd430';
            ctx.beginPath(); ctx.ellipse(0, -3, 80, 12, 0, Math.PI, Math.PI * 2, false); ctx.fill();
            ctx.restore();
        }

        // ── Tile rendering ────────────────────────────────
        function drawGround(x, y, w, h, type) {
            const px = x - cameraX;
            if (px + w < -TILE || px > W + TILE) return;

            if (type === 'ground') {
                // Top face (grass)
                const gg = ctx.createLinearGradient(0, y, 0, y + 10);
                gg.addColorStop(0, '#5ab82a'); gg.addColorStop(1, '#3a8a10');
                ctx.fillStyle = gg; ctx.fillRect(px, y, w, 10);
                // Dirt body
                const dg = ctx.createLinearGradient(0, y + 10, 0, y + h);
                dg.addColorStop(0, '#c84c0c'); dg.addColorStop(0.5, '#a83000'); dg.addColorStop(1, '#7a1a00');
                ctx.fillStyle = dg; ctx.fillRect(px, y + 10, w, h - 10);
                // Texture dots
                ctx.fillStyle = 'rgba(0,0,0,.1)';
                for (let i = 0; i < 3; i++)
                    ctx.fillRect(px + 6 + i * 10, y + 16, 3, 3);
                // Edge highlight
                ctx.fillStyle = 'rgba(255,255,255,.15)'; ctx.fillRect(px, y, w, 1);
                ctx.fillStyle = 'rgba(0,0,0,.2)'; ctx.fillRect(px, y + h - 1, w, 1);
                ctx.fillStyle = 'rgba(0,0,0,.1)'; ctx.fillRect(px + w - 1, y, 1, h);
            } else {
                // Stone platform
                const sg = ctx.createLinearGradient(0, y, 0, y + h);
                sg.addColorStop(0, '#aaa'); sg.addColorStop(0.4, '#888'); sg.addColorStop(1, '#555');
                ctx.fillStyle = sg; ctx.fillRect(px, y, w, h);
                ctx.fillStyle = 'rgba(255,255,255,.15)'; ctx.fillRect(px, y, w, 3);
                ctx.fillStyle = 'rgba(0,0,0,.2)'; ctx.fillRect(px, y + h - 2, w, 2);
                ctx.strokeStyle = 'rgba(0,0,0,.15)'; ctx.lineWidth = 1;
                ctx.strokeRect(px + .5, y + .5, w - 1, h - 1);
            }
        }

        function drawBrick(b) {
            if (b.hit) return;
            const px = b.x - cameraX;
            if (px + TILE < -TILE || px > W + TILE) return;
            const y = b.y;
            // Brick gradient
            const bg = ctx.createLinearGradient(0, y, 0, y + TILE);
            bg.addColorStop(0, '#e06030'); bg.addColorStop(0.4, '#c84c0c'); bg.addColorStop(1, '#8b2800');
            ctx.fillStyle = bg; ctx.fillRect(px, y, TILE, TILE);
            // Mortar lines
            ctx.fillStyle = 'rgba(0,0,0,.25)';
            ctx.fillRect(px, y + TILE / 2 - 1, TILE, 2);
            ctx.fillRect(px + TILE / 4 - 1, y, 2, TILE / 2);
            ctx.fillRect(px + TILE * 3 / 4 - 1, y + TILE / 2, 2, TILE / 2);
            ctx.fillRect(px, y, 2, TILE); ctx.fillRect(px + TILE - 2, y, 2, TILE);
            ctx.fillRect(px, y, TILE, 2); ctx.fillRect(px, y + TILE - 2, TILE, 2);
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,.2)'; ctx.fillRect(px + 3, y + 3, TILE - 6, 4);
        }

        function drawQBlock(q) {
            const px = q.x - cameraX;
            if (px + TILE < -TILE || px > W + TILE) return;
            const y = q.y + q.bounceY;
            if (q.hit) {
                ctx.fillStyle = '#3a1a05'; ctx.fillRect(px, y, TILE, TILE);
                ctx.strokeStyle = '#7a3a10'; ctx.strokeRect(px + .5, y + .5, TILE - 1, TILE - 1);
                return;
            }
            const timer = (frameCount % 40) / 40;
            const qg = ctx.createLinearGradient(0, y, 0, y + TILE);
            qg.addColorStop(0, '#f8e080'); qg.addColorStop(0.5, '#c08000'); qg.addColorStop(1, '#805000');
            ctx.fillStyle = qg; ctx.fillRect(px, y, TILE, TILE);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center';
            ctx.fillText('?', px + TILE / 2, y + TILE * 0.8);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1 + Math.sin(timer * 6.28);
            ctx.strokeRect(px + 3, y + 3, TILE - 6, TILE - 6);
        }

        function drawPipe(p) {
            const px = p.x - cameraX;
            if (px + p.w < -TILE || px > W + TILE) return;
            // Body
            const pg = ctx.createLinearGradient(px, 0, px + p.w, 0);
            pg.addColorStop(0, '#2a6a08'); pg.addColorStop(0.3, '#54d818'); pg.addColorStop(0.5, '#c8fca8'); pg.addColorStop(0.7, '#3ab810'); pg.addColorStop(1, '#1a3a05');
            ctx.fillStyle = pg; ctx.fillRect(px, p.y, p.w, p.h);
            // Head
            ctx.fillRect(px - 4, p.headY, p.w + 8, 24);
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(px - 4, p.headY, p.w + 8, 24);
            ctx.strokeRect(px, p.y, p.w, p.h);
        }

        function drawCoin(c) {
            if (c.collected) return;
            const px = c.x - cameraX;
            if (px + c.w < -TILE || px > W + TILE) return;
            const timer = (frameCount + c.x) % 60;
            const sw = Math.abs(Math.sin(timer / 60 * Math.PI * 2));
            ctx.save();
            ctx.translate(px + c.w / 2, c.y + c.h / 2);
            ctx.scale(sw, 1);
            const cg = ctx.createRadialGradient(0, 0, 1, 0, 0, 10);
            cg.addColorStop(0, '#fff'); cg.addColorStop(0.6, '#ffdd00'); cg.addColorStop(1, '#cc8800');
            ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(0, 0, c.w / 2, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function drawEnemy(e) {
            if (e.dead && e.squished && e.deadTimer < 0) return;
            const px = e.x - cameraX;
            if (px + e.w < -TILE || px > W + TILE) return;
            ctx.save();
            ctx.translate(px + e.w / 2, e.y + e.h);
            if (e.squished) ctx.scale(1.5, 0.2);
            else {
                const walk = Math.sin(frameCount * 0.2) * 5;
                ctx.rotate(walk * 0.02);
            }
            // Head/Body
            const eg = ctx.createRadialGradient(0, -15, 5, 0, -15, 20);
            eg.addColorStop(0, '#e06030'); eg.addColorStop(1, '#8b2800');
            ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(0, -15, 15, 0, Math.PI * 2); ctx.fill();
            // Eyes
            ctx.fillStyle = '#fff'; ctx.fillRect(-6, -22, 4, 8); ctx.fillRect(2, -22, 4, 8);
            ctx.fillStyle = '#000'; ctx.fillRect(-5, -18, 2, 4); ctx.fillRect(3, -18, 2, 4);
            ctx.restore();
        }

        // ── Mario Rendering ────────────────────────────────
        function drawMario() {
            if (mario.dead && mario.deadTimer < 20) return;
            ctx.save();
            ctx.translate(mario.x - cameraX + mario.w / 2, mario.y + mario.h / 2);
            if (mario.dir === -1) ctx.scale(-1, 1);
            ctx.translate(-mario.w / 2, -mario.h / 2);

            const big = mario.big ? 1.4 : 1;
            if (mario.big) ctx.scale(1, 1.5);

            const color = mario.invincible > 0 && frameCount % 4 < 2 ? '#fff' : PAL.mario_hat;

            // Hat
            ctx.fillStyle = color; ctx.fillRect(4, 0, 20, 6); ctx.fillRect(18, 2, 8, 4);
            // Face
            ctx.fillStyle = PAL.mario_skin; ctx.fillRect(6, 6, 16, 10);
            // Hair
            ctx.fillStyle = '#5c3a14'; ctx.fillRect(4, 8, 4, 4); ctx.fillRect(6, 12, 6, 2);
            // Eye
            ctx.fillStyle = '#000'; ctx.fillRect(18, 8, 2, 4);
            // Shirt/Body
            ctx.fillStyle = color; ctx.fillRect(6, 16, 16, 10);
            // Overalls
            ctx.fillStyle = PAL.mario_overall; ctx.fillRect(6, 22, 16, 6); ctx.fillRect(8, 16, 4, 8); ctx.fillRect(16, 16, 4, 8);
            // Shoes
            ctx.fillStyle = '#5c3a14'; ctx.fillRect(4, 28, 8, 4); ctx.fillRect(16, 28, 8, 4);

            ctx.restore();
        }

        // ── HUD etc ────────────────────────────────────────
        function updateHUD() {
            document.getElementById('hud-score').textContent = String(score).padStart(6, '0');
            document.getElementById('hud-coins').innerText = 'x' + coins.toString().padStart(2, '0');
            document.getElementById('hud-time').textContent = Math.max(0, Math.floor(timeLeft));
            document.getElementById('final-score').textContent = score;
        }

        let lastScoreAwarded = 0;
        function addScore(n) {
            score += n;
            updateHUD();
            
            // 1 coin per 1000 points rule
            const currentMilestone = Math.floor(score / 1000);
            const lastMilestone = Math.floor(lastScoreAwarded / 1000);
            
            if (currentMilestone > lastMilestone) {
                // Award points specifically for the increase in milestones
                const pointsToAward = (currentMilestone - lastMilestone) * 1000;
                GameRewards.awardScore('Super Mario', pointsToAward);
                lastScoreAwarded = score;
            }
        }

        // ── Update ────────────────────────────────────────
        function update() {
            frameCount++;
            if (gameState === 'playing') {
                // Time
                timeLeft -= 0.05;
                if (timeLeft <= 0) die();

                // Mario physics
                if (keys['ArrowLeft'] || keys['a']) { mario.vx -= 0.5; mario.dir = -1; }
                else if (keys['ArrowRight'] || keys['d']) { mario.vx += 0.5; mario.dir = 1; }
                else { mario.vx *= FRICTION; if (Math.abs(mario.vx) < 0.1) mario.vx = 0; }

                const speedLimit = keys['Shift'] ? RUN_SPEED : WALK_SPEED;
                if (mario.vx > speedLimit) mario.vx = speedLimit;
                if (mario.vx < -speedLimit) mario.vx = -speedLimit;

                if (keys['ArrowUp'] || keys['w'] || keys[' ']) {
                    if (mario.onGround && !jumpPressed) {
                        mario.vy = JUMP_FORCE;
                        mario.onGround = false;
                    }
                    jumpPressed = true;
                } else {
                    jumpPressed = false;
                    if (mario.vy < 0) {
                        mario.vy *= 0.5; // Variable jump height
                    }
                }

                mario.vy += GRAVITY;
                if (mario.vy > MAX_FALL) mario.vy = MAX_FALL;

                const solids = getAllSolids();
                resolveX(mario, solids);
                resolveY(mario, solids);

                if (mario.y > H) die();
                if (mario.x < 0) mario.x = 0;
                if (mario.x > flagX) { 
                    gameState = 'win'; 
                    GameRewards.award('Super Mario', 'WIN'); // Level Clear Reward
                    setTimeout(() => location.reload(), 3000); 
                }

                updateCamera();

                // Enemies
                enemies.forEach(e => {
                    if (e.dead) { e.deadTimer--; return; }
                    e.vy += GRAVITY;
                    resolveX(e, solids);
                    resolveY(e, solids);
                    // Collision with Mario
                    if (rectOverlap(mario, e)) {
                        if (mario.vy > 1 && mario.y < e.y) { // Stomp
                            e.dead = true; e.squished = true; e.deadTimer = 30;
                            mario.vy = -8; addScore(100);
                        } else if (mario.invincible <= 0) {
                            die();
                        }
                    }
                });

                // Coins
                coinItems.forEach(c => {
                    if (!c.collected && rectOverlap(mario, c)) {
                        c.collected = true; coins++; addScore(200); updateHUD();
                    }
                });

                if (mario.invincible > 0) mario.invincible--;
            } else if (gameState === 'dead') {
                mario.vy += 0.5; mario.y += mario.vy;
                if (mario.y > H + 100) {
                    lives--;
                    if (lives <= 0) { 
                        gameState = 'gameover'; 
                        if (score > bestScore) {
                            bestScore = score;
                            localStorage.setItem('marioBest', bestScore);
                        }
                        document.getElementById('best-score').textContent = bestScore;
                        document.getElementById('game-over-screen').style.display = 'flex'; 
                        GameRewards.award('Super Mario', 'PLAY'); // Participation reward
                    }
                    else { resetMario(); }
                }
            }

            // Particles
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.life -= p.decay; p.rot += 0.1;
            });
            particles = particles.filter(p => p.life > 0);

            // Coin anims
            coinAnims.forEach(c => {
                c.y += c.vy; c.vy += 0.5; c.life -= c.decay;
            });
            coinAnims = coinAnims.filter(c => c.life > 0);
        }

        function die() {
            if (gameState === 'playing') {
                gameState = 'dead'; mario.vy = -10; spawnDeathParts(mario.x, mario.y);
            }
        }

        function resetMario() {
            mario.x = cameraX + 50; mario.y = 0; mario.vx = 0; mario.vy = 0;
            mario.big = false; mario.invincible = 60; mario.dead = false;
            gameState = 'playing'; timeLeft = 400;
        }

        // ── Input ──────────────────────────────────────────
        window.onkeydown = e => {
            keys[e.key] = true;
            if (gameState === 'start') startGame();
            if (e.key === 'r' && gameState === 'gameover') location.reload();
        };
        window.onkeyup = e => keys[e.key] = false;

        // Mobile
        document.getElementById('mb-left').onpointerdown = () => keys['a'] = true;
        document.getElementById('mb-left').onpointerup = () => keys['a'] = false;
        document.getElementById('mb-right').onpointerdown = () => keys['d'] = true;
        document.getElementById('mb-right').onpointerup = () => keys['d'] = false;
        document.getElementById('mb-jump').onpointerdown = () => keys['w'] = true;
        document.getElementById('mb-jump').onpointerup = () => keys['w'] = false;

        // ── Loop ──────────────────────────────────────────
        function startGame() {
            gameState = 'playing';
            document.getElementById('start-screen').style.display = 'none';
            buildLevel();
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = () => location.reload();

        function loop() {
            update();
            drawBackground();
            platforms.forEach(p => drawGround(p.x, p.y, p.w, p.h, p.type));
            bricks.forEach(drawBrick);
            qblocks.forEach(drawQBlock);
            pipes.forEach(drawPipe);
            coinItems.forEach(drawCoin);
            enemies.forEach(drawEnemy);
            drawMario();
            // Particles
            particles.forEach(p => {
                ctx.save(); ctx.translate(p.x - cameraX, p.y); ctx.rotate(p.rot);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                ctx.restore();
            });
            // Coin anims
            coinAnims.forEach(c => {
                ctx.save(); ctx.translate(c.x - cameraX, c.y);
                const scale = c.life * 2; ctx.scale(scale, scale);
                ctx.fillStyle = '#ffdd00'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });
            requestAnimationFrame(loop);
        }

        // Preview Mario
        const pC = document.getElementById('mario-preview');
        const pCtx = pC.getContext('2d');
        function drawPreview() {
            pCtx.clearRect(0, 0, 80, 80);
            pCtx.save(); pCtx.scale(2.5, 2.5);
            // Simple Mario draw
            pCtx.fillStyle = '#cc0000'; pCtx.fillRect(4, 0, 20, 6); pCtx.fillRect(18, 2, 8, 4);
            pCtx.fillStyle = '#ffcc88'; pCtx.fillRect(6, 6, 16, 10);
            pCtx.fillStyle = '#5c3a14'; pCtx.fillRect(4, 8, 4, 4); pCtx.fillRect(6, 12, 6, 2);
            pCtx.fillStyle = '#000'; pCtx.fillRect(18, 8, 2, 4);
            pCtx.fillStyle = '#cc0000'; pCtx.fillRect(6, 16, 16, 10);
            pCtx.fillStyle = '#0000cc'; pCtx.fillRect(6, 22, 16, 6); pCtx.fillRect(8, 16, 4, 8); pCtx.fillRect(16, 16, 4, 8);
            pCtx.fillStyle = '#5c3a14'; pCtx.fillRect(4, 28, 8, 4); pCtx.fillRect(16, 28, 8, 4);
            pCtx.restore();
            requestAnimationFrame(drawPreview);
        }
        drawPreview();

        loop();
        /*]]>*/
    </script>
</body>
