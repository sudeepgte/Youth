<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 18px 60px rgba(55, 65, 81, 0.16);
            width: 100%;
            max-width: 400px;
        }

        .login-container h2 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            background-color: #fff;
            color: var(--text-primary);
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--gradient-1);
            color: var(--text-primary);
            border: 1px solid rgba(55, 65, 81, 0.12);
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 800;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 40px rgba(55, 65, 81, 0.16);
        }

        .register-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 14px;
        }

        .register-link a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 800;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div style="position: absolute; top: 30px; left: 30px; z-index: 10;">
        <a href="/home" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-primary); text-decoration: none; font-weight: 700; background: rgba(255,255,255,0.8); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s;">
            <i class="fas fa-arrow-left"></i> Back to Website
        </a>
    </div>

    <div class="login-container">
        <h2>Welcome Back</h2>

        <!-- ✅ Logged out successfully -->
        <div th:if="${param.loggedOut}"
             style="color: #15803d; background: rgba(21,128,61,0.08); border: 1.5px solid #86efac; padding: 12px 14px; border-radius: 10px; text-align: center; margin-bottom: 1rem; font-weight: 600; font-size: 14px; display:flex; align-items:center; gap:8px; justify-content:center;">
            <i class="fas fa-check-circle"></i> You've been logged out successfully. Please sign in again.
        </div>

        <!-- ⚠️ Session expired / token revoked -->
        <div th:if="${param.expired}"
             style="color: #92400e; background: rgba(245,158,11,0.08); border: 1.5px solid #fcd34d; padding: 12px 14px; border-radius: 10px; text-align: center; margin-bottom: 1rem; font-weight: 600; font-size: 14px; display:flex; align-items:center; gap:8px; justify-content:center;">
            <i class="fas fa-clock"></i> Your session has expired. Please log in again to continue.
        </div>

        <!-- ❌ Wrong credentials -->
        <div th:if="${param.error}"
            style="color: #ff4444; background-color: rgba(255, 68, 68, 0.1); border: 1px solid #ff4444; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 1rem;">
            Invalid username or password.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <div style="display:flex; justify-content:space-between; margin-bottom: 0.5rem;">
                    <label for="password" style="margin-bottom:0;">Password</label>
                    <a href="/forgot-password" style="font-size: 13px; font-weight: 700; color: var(--primary); text-decoration: none;">Forgot Password?</a>
                </div>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>
        <div class="register-link">
            Don't have an account? <a href="/register">Register</a>
        </div>
    </div>



</body>

</html>
