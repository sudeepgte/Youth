<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Music | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --card-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.5);
            --dashboard-nav-height: 64px;
        }

        html, body {
            overflow-x: clip !important;
        }

        body {
            background: var(--bg-gradient) !important;
            color: var(--text-primary) !important;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.8) !important;
            border-bottom: 1px solid var(--glass-border) !important;
        }

        .navbar .logo, .navbar .nav-links a {
            color: #0284c7 !important;
        }

        h1, h2, h3, h4, h5, h6 {
            color: var(--text-primary) !important;
        }
        
        span, p, div {
            color: var(--text-secondary);
        }
        
        .card div {
            color: inherit;
        }

        .card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px; color: var(--text-primary); }
        .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 18px; }

        /* Responsive Dashboard Container and Sidebar Styling */
        .dashboard-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            max-width: 1440px;
            margin: calc(var(--dashboard-nav-height) + 24px) auto 0;
            padding: 0 20px;
        }

        .dashboard-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--dashboard-nav-height);
            z-index: 1100;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 30px rgba(15, 23, 42, 0.05);
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 0 24px;
        }

        .dashboard-spacer {
            flex: 1 1 auto;
            min-width: 8px;
        }

        .dashboard-logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.6px;
            color: var(--text-primary);
            flex: 0 0 auto;
            text-decoration: none;
        }

        .dashboard-nav-links {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            gap: 18px;
            flex: 0 0 auto;
            margin-left: auto;
        }

        .sidebar {
            position: sticky;
            top: 90px;
            height: calc(100vh - 110px);
            align-self: start;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: hidden;
            padding-right: 5px;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: var(--text-secondary);
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: var(--gradient-1);
            color: #ffffff;
            box-shadow: 0 8px 20px -6px rgba(59, 130, 246, 0.4);
            transform: translateX(4px);
        }

        .sidebar-link:hover i,
        .sidebar-link.active i {
            color: #ffffff !important;
        }

        .sidebar-link i {
            width: 25px;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .mobile-menu-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
            padding: 0;
            display: none;
        }

        .mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1150;
            display: none;
        }

        .mobile-menu-overlay.active {
            display: block;
        }

        @media (max-width: 992px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                left: -270px;
                top: 0;
                bottom: 0;
                width: 250px;
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(20px);
                z-index: 1200;
                box-shadow: 4px 0 30px rgba(0, 0, 0, 0.1);
                transition: left 0.3s ease;
                padding: 30px 20px 20px;
                height: 100vh;
                overflow-y: auto;
            }

            .sidebar.mobile-open {
                left: 0;
            }

            .mobile-menu-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="mobile-menu-overlay" onclick="document.querySelector('.sidebar').classList.remove('mobile-open'); this.classList.remove('active'); document.body.style.overflow = '';"></div>

    <nav class="dashboard-navbar">
        <button class="mobile-menu-btn" onclick="const s=document.querySelector('.sidebar'); if(s) { s.classList.toggle('mobile-open'); const isOpen = s.classList.contains('mobile-open'); document.body.style.overflow = isOpen ? 'hidden' : ''; } const o=document.querySelector('.mobile-menu-overlay'); if(o) o.classList.toggle('active');">
            <i class="fas fa-bars"></i>
        </button>
        <a class="dashboard-logo" th:href="@{/admin}">Zentrix <span style="font-size: 14px; font-weight: 500; opacity: 0.8; color: var(--primary);">Admin</span></a>

        <div class="dashboard-spacer"></div>
        <div class="dashboard-nav-links">
            <a th:href="@{/dashboard}" class="btn btn-outline" style="border: 1px solid rgba(2, 132, 199, 0.4); color: #0284c7 !important; border-radius: 10px; padding: 8px 16px; text-decoration: none; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;">
                <i class="fas fa-arrow-left"></i> App
            </a>
            <a th:href="@{/logout}" class="btn btn-primary" style="background: linear-gradient(135deg, #f84464, #ff6b9d); color: #fff !important; border-radius: 10px; padding: 8px 18px; text-decoration: none; font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px;">Logout</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <a th:href="@{/admin}" class="sidebar-link"><i class="fas fa-chart-line" style="color: inherit;"></i> Overview</a>
            <a th:href="@{/events/admin/manage}" class="sidebar-link"><i class="fas fa-calendar-alt" style="color: inherit;"></i> Manage Events</a>
            <a th:href="@{/admin/music}" class="sidebar-link active"><i class="fas fa-music" style="color: inherit;"></i> Review Music</a>
            <a th:href="@{/admin/battles}" class="sidebar-link"><i class="fas fa-fire" style="color: inherit;"></i> Manage Battles</a>
            <a th:href="@{/events/admin/create}" class="sidebar-link"><i class="fas fa-plus-circle" style="color: inherit;"></i> Create Event</a>
            
            <div style="border-top: 1px solid rgba(0,0,0,0.08); margin: 15px 0;"></div>
            
            <a th:href="@{/dashboard}" class="sidebar-link"><i class="fas fa-arrow-left" style="color: inherit;"></i> Back to App</a>
            <a th:href="@{/logout}" class="sidebar-link" style="color: #ff4444;"><i class="fas fa-sign-out-alt" style="color: inherit;"></i> Logout</a>
        </aside>

        <!-- Main Content -->
        <main class="social-feed" style="max-width: 100%; padding-bottom: 60px;">
    <h1 style="margin-bottom: 10px;">Pending track approvals</h1>
    <div style="color: var(--text-secondary); font-size: 13px; margin-bottom: 18px;">
        Approve only if the uploader owns rights / uses a valid license.
    </div>

    <div class="grid">
        <div th:each="t : ${pendingTracks}" class="card">
            <div style="display:flex; justify-content:space-between; gap: 12px; align-items:flex-start;">
                <div>
                    <div style="font-weight: 900; font-size: 16px;" th:text="${t.title}">Title</div>
                    <div style="color: var(--text-secondary); font-size: 12px;">
                        <span th:text="${t.artistName}">Artist</span>
                        <span style="opacity:0.6;"> • </span>
                        <span th:text="${t.licenseName}">License</span>
                    </div>
                    <div style="color: var(--text-secondary); font-size: 12px; margin-top: 6px;">
                        Uploader:
                        <span th:text="${t.uploader != null ? t.uploader.username : 'Unknown'}">uploader</span>
                    </div>
                    <div th:if="${t.licenseUrl != null and !#strings.isEmpty(t.licenseUrl)}" style="margin-top: 6px;">
                        <a th:href="${t.licenseUrl}" target="_blank" style="font-size: 12px; color: var(--accent); text-decoration: none;">
                            <i class="fas fa-link"></i> License link
                        </a>
                    </div>
                </div>
            </div>

            <audio controls preload="metadata" style="width: 100%; margin-top: 12px;">
                <source th:src="@{'/admin/music/preview/' + ${t.id}}" th:type="${t.contentType}">
            </audio>

            <div style="display:flex; gap: 10px; margin-top: 12px;">
                <form th:action="@{'/admin/music/' + ${t.id} + '/approve'}" method="post" style="flex:1;">
                    <button class="nav-btn" type="submit" style="width:100%; background: rgba(16,185,129,0.18); border:1px solid rgba(16,185,129,0.35); color: #047857;">
                        <i class="fas fa-check"></i> Approve
                    </button>
                </form>
                <form th:action="@{'/admin/music/' + ${t.id} + '/reject'}" method="post" style="flex:1;">
                    <button class="nav-btn" type="submit" style="width:100%; background: rgba(231,76,60,0.16); border:1px solid rgba(231,76,60,0.35); color: #b91c1c;">
                        <i class="fas fa-times"></i> Reject
                    </button>
                </form>
            </div>
        </div>

        <div th:if="${pendingTracks == null or pendingTracks.isEmpty()}" class="card" style="grid-column: 1 / -1;">
            <div style="color: var(--text-secondary); text-align:center; padding: 10px;">
                No pending uploads right now.
            </div>
        </div>
    </div>
        </main>
    </div>
</body>
</html>
