<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-container {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 18px 60px rgba(55, 65, 81, 0.16);
            width: 100%;
            max-width: 400px;
        }

        .register-container h2 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            background-color: #fff;
            color: var(--text-primary);
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: var(--gradient-1);
            color: var(--text-primary);
            border: 1px solid rgba(55, 65, 81, 0.12);
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 800;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 1rem;
        }

        .btn-register:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 40px rgba(55, 65, 81, 0.16);
        }

        .login-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 14px;
        }

        .login-link a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 800;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 30px; left: 30px; z-index: 10;">
        <a href="/home" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-primary); text-decoration: none; font-weight: 700; background: rgba(255,255,255,0.8); padding: 10px 16px; border-radius: 12px; border: 1px solid var(--glass-border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s;">
            <i class="fas fa-arrow-left"></i> Back to Website
        </a>
    </div>

<div class="register-container">
    <h2>Create Account</h2>
    <div th:if="${param.error == 'duplicate'}" style="background-color: #fce8e8; border: 1px solid #f5c2c2; color: #a94442; padding: 10px; border-radius: 4px; margin-bottom: 1rem; text-align: center;">
        Username already exists.
    </div>
    <div th:if="${param.error == 'duplicate_email'}" style="background-color: #fce8e8; border: 1px solid #f5c2c2; color: #a94442; padding: 10px; border-radius: 4px; margin-bottom: 1rem; text-align: center;">
        Email address already in use.
    </div>
    <div th:if="${param.error == 'future_dob'}" style="background-color: #fce8e8; border: 1px solid #f5c2c2; color: #a94442; padding: 10px; border-radius: 4px; margin-bottom: 1rem; text-align: center;">
        Date of Birth cannot be in the future.
    </div>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" required>
        </div>

        <div class="form-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" th:field="*{dob}" required>
        </div>

        <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" th:field="*{gender}" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="collegeName"><i class="fas fa-university" style="color:var(--primary); margin-right:6px;"></i>College / Institution Name</label>
            <input type="text" id="collegeName" th:field="*{collegeName}" placeholder="e.g. IIT Bombay, VTU, Christ University" required>
        </div>

        <button type="submit" class="btn-register">Register</button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Sign In</a>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var today = new Date().toISOString().split('T')[0];
        document.getElementById("dob").setAttribute("max", today);
    });
</script>
</body>
</html>
