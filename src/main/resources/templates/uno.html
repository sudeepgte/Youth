<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Uno | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- React and Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- SockJS + STOMP (WebSocket) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <meta name="context-path" th:content="@{/}">

    <style>
        body {
            margin: 0;
            background-color: #060e0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        #root {
            min-height: 100vh;
        }
    </style>
</head>

    <body th:data-username="${user != null ? user.username : 'Player'}">
    <div id="root"></div>

    <script type="text/babel" th:inline="none">
        // <![CDATA[
        const getUniqueGuestName = () => {
            const baseName = document.body.dataset.username || 'Player';
            if (baseName !== 'Player') return baseName;
            let guestName = sessionStorage.getItem('unoGuestName');
            if (!guestName) {
                guestName = 'Guest_' + Math.floor(1000 + Math.random() * 9000);
                sessionStorage.setItem('unoGuestName', guestName);
            }
            return guestName;
        };
        const userName = getUniqueGuestName();
        const cp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        /* --- Constants & Helpers --- */
        const COLORS = ["red", "green", "blue", "yellow"];
        const THEME = {
            red: { main: "#d62828", light: "#f77f7f", dark: "#8b0000", text: "#fff" },
            green: { main: "#2d6a4f", light: "#74c69d", dark: "#1b4332", text: "#fff" },
            blue: { main: "#1d3557", light: "#6daed6", dark: "#0d1f33", text: "#fff" },
            yellow: { main: "#e9b000", light: "#ffd166", dark: "#a67700", text: "#1a1a1a" },
            wild: { main: "#1a1a2e", light: "#9b5de5", dark: "#0a0a18", text: "#fff" },
        };
        const SYMBOL = { Skip: "âŠ˜", Reverse: "↺", "Draw Two": "+2", Wild: "★", "Wild Draw Four": "★+4" };

        /* --- UI Components (SVG/ColorPicker/Toast) --- */
        function CardFace({ card, width = 72, height = 108 }) {
            if (!card) return null;
            const t = THEME[card.color] || THEME.wild;
            const isWild = card.color === "wild";
            const sym = SYMBOL[card.value] || card.value;
            const isAction = !!SYMBOL[card.value];
            const fontSize = isWild ? 10 : isAction ? (card.value === "Draw Two" ? 12 : 20) : 28;
            return (
                <svg width={width} height={height} viewBox="0 0 72 108" style={{ display: "block", filter: "drop-shadow(0 4px 12px #0009)" }}>
                    <defs>
                        <linearGradient id={`bg-${card.id}`} x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stopColor={t.light} />
                            <stop offset="100%" stopColor={t.dark} />
                        </linearGradient>
                        <linearGradient id={`oval-${card.id}`} x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stopColor={isWild ? "#fff" : t.main} stopOpacity="0.95" />
                            <stop offset="100%" stopColor={isWild ? "#ddd" : t.dark} stopOpacity="0.85" />
                        </linearGradient>
                        <radialGradient id={`shine-${card.id}`} cx="35%" cy="25%" r="60%">
                            <stop offset="0%" stopColor="#fff" stopOpacity="0.3" />
                            <stop offset="100%" stopColor="#fff" stopOpacity="0" />
                        </radialGradient>
                    </defs>
                    <rect x="0" y="0" width="72" height="108" rx="8" fill={`url(#bg-${card.id})`} />
                    {isWild && (
                        <circle cx="36" cy="54" r="22" fill="#1a1a2e" stroke="#fff" strokeWidth="2" />
                    )}
                    <rect x="2" y="2" width="68" height="104" rx="7" fill="none" stroke="#fff" strokeWidth="1.5" opacity="0.5" />
                    {!isWild && (
                        <ellipse cx="36" cy="54" rx="22" ry="34" fill={`url(#oval-${card.id})`} transform="rotate(-30 36 54)" opacity="0.95" />
                    )}
                    <text x="36" y={isWild ? 58 : 62} textAnchor="middle" fill={isWild ? "#fff" : t.text} fontSize={fontSize} fontFamily="'Arial Black', sans-serif" fontWeight="900" style={{ textShadow: "0 2px 4px #0006" }}>{sym}</text>
                    <text x="5" y="16" fill={t.text} fontSize={isAction || isWild ? 7 : 11} fontFamily="Arial Black" fontWeight="900" opacity="0.95">{sym}</text>
                    <rect x="0" y="0" width="72" height="108" rx="8" fill={`url(#shine-${card.id})`} />
                </svg>
            );
        }

        function CardBack({ width = 72, height = 108, small = false }) {
            const w = small ? 44 : width, h = small ? 66 : height;
            return (
                <svg width={w} height={h} viewBox="0 0 72 108" style={{ display: "block", filter: "drop-shadow(0 3px 8px #0008)" }}>
                    <rect x="0" y="0" width="72" height="108" rx="8" fill="#c1121f" />
                    <text x="36" y="60" textAnchor="middle" fill="#fff" fontSize="16" fontFamily="Arial Black" fontWeight="900" opacity="0.9">UNO</text>
                </svg>
            );
        }

        function ColorPicker({ onPick }) {
            return (
                <div style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }}>
                    <div style={{ background: "linear-gradient(145deg,#1c1c2e,#2a2a4a)", borderRadius: 20, padding: 36, textAlign: "center", boxShadow: "0 20px 60px #000a", backdropFilter: "blur(10px)" }}>
                        <div style={{ color: "#fff", fontSize: 22, fontWeight: 900, marginBottom: 24 }}>CHOSE COLOR</div>
                        <div style={{ display: "flex", gap: 16, justifyContent: "center" }}>
                            {COLORS.map(c => (
                                <button key={c} onClick={() => onPick(c)} style={{ width: 70, height: 70, borderRadius: 35, background: THEME[c].main, border: "none", cursor: "pointer", color: "#fff", fontWeight: 900 }}>{c.toUpperCase()}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        /* --- Lobby Component --- */
        function UnoLobby({ onStart }) {
            const [name, setName] = useState(userName);
            const [roomCode, setRoomCode] = useState("");

            return (
                <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#060e0a" }}>
                    <h1 style={{ fontSize: 60, marginBottom: 40, background: "linear-gradient(135deg,#e63946,#f1faee)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>UNO MULTIPLAYER</h1>
                    <div style={{ background: "rgba(255,255,255,0.05)", padding: 40, borderRadius: 24, width: "100%", maxWidth: 400, border: "1px solid rgba(255,255,255,0.1)" }}>
                        <input className="lobby-input" type="text" placeholder="Your Name" value={name} onChange={e => setName(e.target.value)} style={{ width: "100%", padding: 14, borderRadius: 12, background: "#111", border: "1px solid #333", color: "#fff", marginBottom: 20 }} />
                        <button onClick={() => onStart("create", { name })} style={{ width: "100%", padding: 14, borderRadius: 12, background: "#d62828", border: "none", color: "#fff", fontWeight: 900, cursor: "pointer", marginBottom: 10 }}>CREATE TABLE</button>
                        <div style={{ textAlign: "center", color: "#555", margin: "10px 0" }}>OR</div>
                        <input className="lobby-input" type="text" placeholder="Table Code" value={roomCode} onChange={e => setRoomCode(e.target.value)} style={{ width: "100%", padding: 14, borderRadius: 12, background: "#111", border: "1px solid #333", color: "#fff", marginBottom: 20 }} />
                        <button onClick={() => onStart("join", { name, roomCode })} style={{ width: "100%", padding: 14, borderRadius: 12, background: "#1d3557", border: "none", color: "#fff", fontWeight: 900, cursor: "pointer" }}>JOIN TABLE</button>
                    </div>
                    <a th:href="@{/games}" style={{ marginTop: 20, color: "#666", textDecoration: "none" }}>← Back to Games</a>
                </div>
            );
        }

        /* --- Main Game Component --- */
        function UnoGame() {
            const roomParam = new URLSearchParams(window.location.search).get('room');
            const [roomState, setRoomState] = useState(null);
            const [roomId, setRoomId] = useState(null); 
            const [initializing, setInitializing] = useState(!!roomParam);
            const [playerIndex, setPlayerIndex] = useState(-1);
            const [pickingColor, setPickingColor] = useState(null);
            const stompClient = useRef(null);

            useEffect(() => {
                if (roomParam && roomId === null) {
                    handleStart("join", { name: userName, roomCode: roomParam });
                }
            }, []);

            const connectWebSocket = useCallback((rId, pIdx) => {
                const auth = new URLSearchParams(window.location.search).get('auth');
                const configCp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
                const wsPath = auth ? `${configCp}/ws?auth=${auth}` : `${configCp}/ws`;
                const finalWsPath = wsPath.startsWith('/') ? wsPath : '/' + wsPath;
                const socket = new SockJS(finalWsPath);
                stompClient.current = Stomp.over(socket);
                stompClient.current.connect({}, () => {
                    stompClient.current.subscribe(`/topic/uno/${rId}/player/${pIdx}`, (msg) => {
                        setRoomState(JSON.parse(msg.body));
                    });
                    stompClient.current.send(`/app/uno/${rId}/subscribe`, {}, "{}");
                });
            }, []);

            const handleStart = async (type, data) => {
                const configCp = (document.querySelector('meta[name="context-path"]')?.content || '').replace(/\/$/, '');
                const path = type === 'create' ? `${configCp}/api/uno/create` : `${configCp}/api/uno/join`;
                const finalPath = path.startsWith('/') ? path : '/' + path;
                const body = type === 'create' ? { playerName: data.name } : { playerName: data.name, roomId: data.roomCode };
                const res = await fetch(finalPath, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                const json = await res.json();
                setInitializing(false);
                if (json.error) return alert(json.error);
                
                setRoomId(json.roomId);
                setPlayerIndex(json.playerIndex);
                if (json.players) setRoomState(json); // Use initial state from REST
                
                connectWebSocket(json.roomId, json.playerIndex);
            };

            const handlePlay = (card) => {
                if (roomState.currentPlayer !== playerIndex || roomState.status !== 'active') return;
                const canPlay = card.color === "wild" || card.color === roomState.currentColor || card.value === roomState.topCard.value;
                if (!canPlay) return;

                if (card.color === "wild") {
                    setPickingColor(card);
                } else {
                    stompClient.current.send(`/app/uno/${roomId}/play`, {}, JSON.stringify({ playerIndex, cardId: card.id, chosenColor: null }));
                }
            };

            const handleColorPick = (color) => {
                stompClient.current.send(`/app/uno/${roomId}/play`, {}, JSON.stringify({ playerIndex, cardId: pickingColor.id, chosenColor: color }));
                setPickingColor(null);
            };

            const handleDraw = () => {
                if (roomState.currentPlayer !== playerIndex || roomState.status !== 'active') return;
                stompClient.current.send(`/app/uno/${roomId}/draw`, {}, JSON.stringify({ playerIndex }));
            };

            if (initializing) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", background:"#060e0a" }}>Initializing Match...</div>;
            if (!roomId) return <UnoLobby onStart={handleStart} />;
            if (!roomState || playerIndex === -1) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>Connecting to Table...</div>;

            const myData = roomState.players[playerIndex];
            if (!myData) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff" }}>Syncing Player Data...</div>;
            
            const colT = THEME[roomState.currentColor] || THEME.wild;

            return (
                <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#060e0a", padding: 20 }}>
                    <div style={{ position: "absolute", top: 20, right: 20, background: "#fff2", padding: "8px 16px", borderRadius: 20 }}>Table: <span style={{ color: "#d62828", fontWeight: 900 }}>{roomId}</span></div>
                    
                    <div style={{ color: colT.main, textTransform: "uppercase", fontWeight: 900, fontSize: 14, marginBottom: 10 }}>{roomState.currentColor} Active</div>
                    <div style={{ color: "#fff", background: "#fff1", padding: "10px 20px", borderRadius: 12, marginBottom: 20 }}>{roomState.lastMessage}</div>

                    <div style={{ display: "flex", gap: 40, alignItems: "center", marginBottom: 40 }}>
                        <div onClick={handleDraw} style={{ cursor: "pointer", textAlign: "center" }}>
                            <CardBack />
                            <div style={{ color: "#fff6", fontSize: 10, marginTop: 4 }}>DRAW PILE</div>
                        </div>
                        <div style={{ textAlign: "center" }}>
                            <CardFace card={roomState.topCard} />
                            <div style={{ color: "#fff6", fontSize: 10, marginTop: 4 }}>DISCARD PILE</div>
                        </div>
                    </div>

                    <div style={{ width: "100%", maxWidth: 800 }}>
                        <div style={{ display: "flex", justifyContent: "center", gap: 10, flexWrap: "wrap" }}>
                            {myData.hand.map(card => (
                                <div key={card.id} onClick={() => handlePlay(card)} style={{ cursor: "pointer", transition: "transform 0.2s" }} onMouseEnter={e => e.currentTarget.style.transform = "translateY(-10px)"} onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}>
                                    <CardFace card={card} />
                                </div>
                            ))}
                        </div>
                    </div>

                    <div style={{ marginTop: 40, display: "flex", gap: 20 }}>
                        {roomState.players.map((p, i) => (
                            <div key={i} style={{ opacity: roomState.currentPlayer === i ? 1 : 0.4, border: roomState.currentPlayer === i ? `2px solid ${colT.main}` : "1px solid #333", padding: "10px 20px", borderRadius: 12, textAlign: "center" }}>
                                <div style={{ color: "#fff", fontWeight: 700 }}>{p.name} {i === playerIndex ? "(You)" : ""}</div>
                                <div style={{ color: "#aaa", fontSize: 12 }}>{p.cardCount} cards</div>
                            </div>
                        ))}
                    </div>

                    {pickingColor && <ColorPicker onPick={handleColorPick} />}
                    {roomState.status === 'finished' && (
                        <div style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <div style={{ textAlign: "center" }}>
                                <div style={{ fontSize: 60, color: "#fff", fontWeight: 900 }}>{roomState.lastMessage}</div>
                                <button onClick={() => location.reload()} style={{ padding: "14px 40px", borderRadius: 12, background: "#d62828", border: "none", color: "#fff", fontWeight: 900, marginTop: 20 }}>PLAY AGAIN</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UnoGame />);
        // ]]>
    </script>
</body>

</html>
