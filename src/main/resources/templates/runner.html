<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Surfers | Zentrix Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0ea5e9;
            --secondary: #a855f7;
            --accent: #facc15;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-dark: rgba(0, 0, 0, 0.4);
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #020617;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            user-select: none;
        }

        /* --- Glassmorphism HUD --- */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .hud-card {
            background: var(--glass-dark);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 24px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .hud-card.neon-blue { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        .hud-card.neon-gold { border-color: var(--accent); box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }
        .hud-card.neon-purple { border-color: var(--secondary); box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }

        .score-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .score-label {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: -4px;
        }

        .score-value {
            font-family: 'Fredoka One', cursive;
            font-size: 2.4rem;
            line-height: 1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* --- Overlays & Menus --- */
        #overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, rgba(15, 23, 42, 0.4) 0%, rgba(2, 6, 23, 0.9) 100%);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .glass-menu {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 48px;
            padding: 60px 40px;
            text-align: center;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-title {
            font-family: 'Fredoka One', cursive;
            font-size: 4.5rem;
            line-height: 0.9;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 30%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.5));
            text-transform: uppercase;
        }

        .btn-premium {
            background: #fff;
            color: #000;
            border: none;
            padding: 22px 40px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            border-radius: 24px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.2), 0 20px 40px rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            z-index: 105;
            pointer-events: auto;
        }

        .btn-premium:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 0 rgba(0, 0, 0, 0.2), 0 25px 50px rgba(255, 255, 255, 0.3);
            background: var(--neon-blue);
            color: #fff;
        }

        .btn-premium:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 10px 0 #991b1b, 0 20px 40px rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: #f43f5e;
            box-shadow: 0 14px 0 #991b1b, 0 25px 50px rgba(239, 68, 68, 0.4);
        }

        /* --- Loading Screen --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .loader-content {
            text-align: center;
        }

        .neon-logo {
            font-family: 'Fredoka One', cursive;
            font-size: 5rem;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
            margin-bottom: 40px;
            animation: neonPulse 2s infinite;
        }

        .progress-track {
            width: 320px;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-blue), var(--secondary));
            box-shadow: 0 0 20px var(--neon-blue);
            transition: width 0.4s ease;
        }

        /* --- Powerup UI --- */
        #powerup-ui {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-dark);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            align-items: center;
            gap: 15px;
            min-width: 280px;
        }

        .p-bar-track {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .p-bar-fill {
            height: 100%;
            width: 100%;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- Animations --- */
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes neonPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .control-item { display: flex; align-items: center; gap: 8px; justify-content: center; }
        .kbd { background: rgba(255, 255, 255, 0.1); padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; font-family: 'Fredoka One'; }

        /* --- Speed Lines --- */
        #speed-lines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(255, 255, 255, 0.1) 100%);
            mask-image: repeating-conic-gradient(from 0deg, #000 0deg 10deg, transparent 10deg 20deg);
            -webkit-mask-image: repeating-conic-gradient(from 0deg, #000 0deg 10deg, transparent 10deg 20deg);
            transition: opacity 0.5s;
        }

        #speed-lines.active {
            opacity: 1;
            animation: speedSpin 0.2s infinite linear;
        }

        @keyframes speedSpin {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- Reward Reveal --- */
        #reward-reveal {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            animation: popIn 0.5s ease;
        }

        .reward-item {
            font-family: 'Fredoka One', cursive;
            font-size: 5rem;
            color: var(--accent);
            text-shadow: 0 0 30px rgba(250, 204, 21, 0.5);
            margin-bottom: 40px;
        }

        .mystery-box-ui {
            width: 180px;
            height: 180px;
            border: 8px solid var(--secondary);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 8rem;
            color: var(--secondary);
            cursor: pointer;
            margin: 40px auto;
            transition: all 0.3s ease;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
        }

        .mystery-box-ui:hover {
            transform: scale(1.1) rotate(5deg);
            background: rgba(168, 85, 247, 0.1);
        }

        /* --- Mobile Controls Styling --- */
        #mobile-controls-container {
            display: none;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 360px;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            z-index: 150;
            pointer-events: none;
        }

        .mobile-control-btn {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            transition: transform 0.1s, background 0.2s, border-color 0.2s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #btn-left { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        #btn-right { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        #btn-jump { border-color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); width: 80px; height: 80px; font-size: 2.2rem; }

        .mobile-control-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 1024px), (pointer: coarse) {
            #mobile-controls-container {
                display: flex;
            }
            #powerup-ui {
                bottom: 140px !important;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>

<body>
    <div id="speed-lines"></div>

    <div id="loader">
        <div class="loader-content">
            <div class="neon-logo">ZENTRIX</div>
            <div class="progress-track">
                <div class="progress-bar" id="progress-fill"></div>
            </div>
            <p style="margin-top: 20px; font-weight: 800; letter-spacing: 4px; color: rgba(255,255,255,0.4);">SYNCING NEURAL LINK...</p>
        </div>
    </div>

    <div id="ui-container">
        <div id="top-hud">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div class="hud-card neon-gold">
                    <i class="fas fa-coins" style="color: var(--accent); font-size: 1.5rem;"></i>
                    <span class="score-value" id="coin-val" style="color: var(--accent);">0</span>
                </div>
                <div class="hud-card neon-purple" id="box-hud" style="display: none;">
                    <i class="fas fa-box-open" style="color: var(--secondary); font-size: 1.5rem;"></i>
                    <span class="score-value" id="box-val" style="color: var(--secondary);">0</span>
                </div>
            </div>
            
            <div class="hud-card neon-blue">
                <div class="score-display">
                    <span class="score-label">TOP SCORE</span>
                    <span class="score-value" id="score-val">000000</span>
                </div>
            </div>
        </div>

        <div id="powerup-ui">
            <i id="p-icon" class="fas fa-bolt" style="color: var(--neon-blue); font-size: 1.2rem;"></i>
            <div class="p-bar-track">
                <div id="powerup-fill" class="p-bar-fill"></div>
            </div>
    </div>

    <!-- Mobile Controls Interface -->
    <div id="mobile-controls-container">
        <button id="btn-left" class="mobile-control-btn"><i class="fas fa-arrow-left"></i></button>
        <button id="btn-jump" class="mobile-control-btn"><i class="fas fa-arrow-up"></i></button>
        <button id="btn-right" class="mobile-control-btn"><i class="fas fa-arrow-right"></i></button>
    </div>

    <div id="overlay">
        <!-- Main Menu -->
        <div class="glass-menu" id="start-menu">
            <h1 class="game-title">Zentrix<br>Surfers</h1>
            <p style="color: rgba(255,255,255,0.4); margin-bottom: 30px; font-weight: 800; letter-spacing: 2px;">NEO-TOKYO RUNNER</p>
            
            <button class="btn-premium" id="start-btn">INITIALIZE RUN</button>
            
            <div class="controls-grid">
                <div class="control-item"><span class="kbd">A</span> <span class="kbd">D</span> MOVE</div>
                <div class="control-item"><span class="kbd">SPACE</span> JUMP</div>
                <div class="control-item"><span class="kbd">S</span> SLIDE</div>
            </div>
            
            <a th:href="@{/games}" style="display: block; margin-top: 30px; color: rgba(255,255,255,0.3); text-decoration: none; font-weight: 800; font-size: 0.8rem; letter-spacing: 2px;">RETURN TO HUB</a>
        </div>

        <!-- Mystery Box -->
        <div class="glass-menu" id="mystery-screen" style="display: none;">
            <h1 class="game-title" style="color: var(--secondary); filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.5));">DATA CACHE</h1>
            <div class="mystery-box-ui" id="box-opener" style="background: none; border-color: var(--secondary); color: var(--secondary); text-shadow: 0 0 20px var(--secondary);">?</div>
            <p id="boxes-left" style="color: rgba(255,255,255,0.5); font-weight: 800; letter-spacing: 2px;">1 CACHE REMAINING</p>
        </div>

        <!-- Game Over -->
        <div class="glass-menu" id="game-over" style="display: none;">
            <h1 class="game-title" style="color: var(--danger); filter: drop-shadow(0 0 20px rgba(239, 68, 68, 0.5));">SYSTEM CRASH</h1>
            <div style="margin: 30px 0;">
                <p style="color: rgba(255,255,255,0.4); font-weight: 800; letter-spacing: 2px;">FINAL SCORE</p>
                <div class="score-value" id="final-score" style="font-size: 4rem; color: #fff;">0</div>
            </div>
            <button class="btn-premium" id="restart-btn" style="background: var(--neon-blue); color: #fff;">REBOOT SYSTEM</button>
        </div>
    </div>

    <div id="reward-reveal" class="reward-reveal">
        <div class="reward-item" id="reward-text">+500 COINS</div>
        <button class="btn-premium" id="claim-btn" style="max-width: 320px; margin-top: 60px;">COLLECT DATA</button>
    </div>

    <script th:inline="none">
        /*<![CDATA[*/

        /**
         * ZENTRIX SURFERS - Hyper-Detail Edition
         * Procedural Texturing, Reflective Surfaces & Particle Effects
         */

        let scene, camera, renderer, clock;
        let particles = [];
        let lanes = [-4, 0, 4];
        let currentLane = 1, targetX = 0;
        let isJumping = false, isSliding = false, isFlying = false;
        let jumpVelocity = 0, slideTimer = 0;
        let totalScore = 0, coinCount = 0, collectedBoxes = 0;
        let speed = 1.15, baseSpeed = 1.15;
        let gameActive = false, frameCount = 0;
        let inspectorChase = 0; // 0: none, >0: timer
        let shakeAmount = 0;

        // Added missing declarations
        let player, humanoid;
        let trackChunks = [], scenery = [], obstacles = [], coins = [], powerups = [], trailPool = [];
        let buildings = [];

        // Post-processing
        let composer, bloomPass, fxaaPass;

        // Power-ups
        let activePowerup = null, powerupTimeLeft = 0;

        const COLORS = {
            sky: 0x020617,
            ground: 0x111827,
            rail: 0x3b82f6,
            sleeper: 0x1f2937,
            trains: [0x3b82f6, 0x8b5cf6, 0xec4899, 0xfacc15, 0xef4444],
            barrier: 0xfacc15,
            magnet: 0xec4899,
            jetpack: 0x0ea5e9,
            mystery: 0x8b5cf6,
            neonBlue: 0x00d2ff,
            neonPink: 0xff007f
        };

        const REWARDS = [
            { text: "+500 COINS", value: 500, type: "coins" },
            { text: "+1000 COINS", value: 1000, type: "coins" },
            { text: "SCORE BOOST!", value: 5000, type: "score" },
            { text: "MEGA WIN!", value: 2500, type: "coins" }
        ];

        // --- Procedural Texture Generation ---
        function createNoiseTexture(color1, color2, size = 128) {
            const canvas = document.createElement('canvas');
            canvas.width = canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color1;
            ctx.fillRect(0, 0, size, size);
            for(let i=0; i<size*size*0.1; i++) {
                ctx.fillStyle = color2;
                ctx.globalAlpha = Math.random() * 0.5;
                ctx.fillRect(Math.random()*size, Math.random()*size, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        const gritTexture = createNoiseTexture('#2d3436', '#111111');
        gritTexture.repeat.set(4, 4);
        const metalTexture = createNoiseTexture('#636e72', '#b2bec3');
        metalTexture.repeat.set(1, 4);

        function createGradientTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 0, 512);
            grad.addColorStop(0, '#00c6ff'); // Top
            grad.addColorStop(1, '#0072ff'); // Bottom
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 2, 512);
            return new THREE.CanvasTexture(canvas);
        }

        const skyTexture = createGradientTexture();

        // --- SHARED Geometries & Materials (Performance: avoid per-spawn allocations) ---
        const sharedCoinGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.35, 16);
        const sharedCoinMat = new THREE.MeshStandardMaterial({ color: 0xffde00, metalness: 1, roughness: 0, emissive: 0xffde00, emissiveIntensity: 4 });
        const sharedTrailGeo = new THREE.BoxGeometry(1.6, 3.2, 0.1);
        const sharedTrailMat = new THREE.MeshBasicMaterial({ color: COLORS.neonBlue, transparent: true, opacity: 0.4 });
        const sharedSleeperGeo = new THREE.BoxGeometry(4.6, 0.5, 1.8);
        const sharedSleeperMat = new THREE.MeshStandardMaterial({ color: 0x3d3d3d, map: metalTexture });
        const sharedRailGeo = new THREE.BoxGeometry(0.3, 0.7, 100);
        const sharedRailMat = new THREE.MeshStandardMaterial({ color: COLORS.rail, metalness: 0.9, map: metalTexture });
        const sharedParticleGeo = new THREE.SphereGeometry(0.2, 6, 6);
        const sharedBarrierLegGeo = new THREE.CylinderGeometry(0.25, 0.25, 6, 6);
        const sharedBarrierLegMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

        // --- Disposal Helper (prevents GPU memory leaks) ---
        function disposeMesh(obj) {
            if (!obj) return;
            if (obj.children) {
                for (let i = obj.children.length - 1; i >= 0; i--) disposeMesh(obj.children[i]);
            }
            if (obj.geometry && obj.geometry !== sharedCoinGeo && obj.geometry !== sharedTrailGeo && obj.geometry !== sharedSleeperGeo && obj.geometry !== sharedRailGeo && obj.geometry !== sharedParticleGeo && obj.geometry !== sharedBarrierLegGeo) {
                obj.geometry.dispose();
            }
            if (obj.material && obj.material !== sharedCoinMat && obj.material !== sharedTrailMat && obj.material !== sharedSleeperMat && obj.material !== sharedRailMat && obj.material !== sharedBarrierLegMat) {
                if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                else obj.material.dispose();
            }
            if (obj.isLight && obj.dispose) obj.dispose();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            scene.fog = new THREE.Fog(0x020617, 100, 500); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 16, 32);
            camera.lookAt(0, 5, -15);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.physicallyCorrectLights = true;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.25;
            document.body.appendChild(renderer.domElement);

            // Post-processing Setup
            const renderScene = new THREE.RenderPass(scene, camera);
            bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.35; // Increased threshold to glow only bright parts
            bloomPass.strength = 0.8;    // Reduced strength for clarity
            bloomPass.radius = 0.4;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // FXAA anti-aliasing (crisper edges)
            fxaaPass = new THREE.ShaderPass(THREE.FXAAShader);
            if (fxaaPass.material && fxaaPass.material.uniforms && fxaaPass.material.uniforms.resolution) {
                fxaaPass.material.uniforms.resolution.value.set(1 / window.innerWidth, 1 / window.innerHeight);
            }
            composer.addPass(fxaaPass);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(100, 200, 100);
            sun.castShadow = true;
            sun.shadow.mapSize.set(1024, 1024);
            scene.add(sun);

            const moon = new THREE.DirectionalLight(0x3b82f6, 0.8);
            moon.position.set(-100, 150, -100);
            scene.add(moon);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            scene.add(new THREE.HemisphereLight(0x8b5cf6, 0x000000, 0.6));

            clock = new THREE.Clock();

            createCharacter();
            createInspector();
            buildWorld();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);

            document.getElementById('start-btn').onclick = startGame;
            document.getElementById('restart-btn').onclick = startGame;
            document.getElementById('box-opener').onclick = openMysteryBox;
            document.getElementById('claim-btn').onclick = claimReward;

            // --- Mobile Controls Initialization ---
            let leftInterval = null;
            let rightInterval = null;

            function startMoveLeft() {
                if (!gameActive) return;
                if (currentLane > 0) {
                    currentLane--;
                    targetX = lanes[currentLane];
                }
                if (leftInterval) clearInterval(leftInterval);
                leftInterval = setInterval(() => {
                    if (currentLane > 0) {
                        currentLane--;
                        targetX = lanes[currentLane];
                    }
                }, 220); // Repeat interval for holding down
            }

            function stopMoveLeft() {
                if (leftInterval) {
                    clearInterval(leftInterval);
                    leftInterval = null;
                }
            }

            function startMoveRight() {
                if (!gameActive) return;
                if (currentLane < 2) {
                    currentLane++;
                    targetX = lanes[currentLane];
                }
                if (rightInterval) clearInterval(rightInterval);
                rightInterval = setInterval(() => {
                    if (currentLane < 2) {
                        currentLane++;
                        targetX = lanes[currentLane];
                    }
                }, 220);
            }

            function stopMoveRight() {
                if (rightInterval) {
                    clearInterval(rightInterval);
                    rightInterval = null;
                }
            }

            function triggerJump() {
                if (!gameActive) return;
                if (!isJumping && !isFlying) {
                    isJumping = true;
                    jumpVelocity = 0.85;
                }
            }

            const btnLeft = document.getElementById('btn-left');
            const btnRight = document.getElementById('btn-right');
            const btnJump = document.getElementById('btn-jump');
            const mobileContainer = document.getElementById('mobile-controls-container');

            if (btnLeft && btnRight && btnJump) {
                // Prevent gesture defaults (double-tap zoom, scrolling, etc.)
                const preventDefaultTouch = (e) => {
                    if (e.cancelable) e.preventDefault();
                };

                // Left Button
                btnLeft.addEventListener('pointerdown', (e) => {
                    preventDefaultTouch(e);
                    startMoveLeft();
                });
                btnLeft.addEventListener('pointerup', (e) => {
                    preventDefaultTouch(e);
                    stopMoveLeft();
                });
                btnLeft.addEventListener('pointercancel', (e) => {
                    preventDefaultTouch(e);
                    stopMoveLeft();
                });
                btnLeft.addEventListener('pointerleave', (e) => {
                    preventDefaultTouch(e);
                    stopMoveLeft();
                });

                // Right Button
                btnRight.addEventListener('pointerdown', (e) => {
                    preventDefaultTouch(e);
                    startMoveRight();
                });
                btnRight.addEventListener('pointerup', (e) => {
                    preventDefaultTouch(e);
                    stopMoveRight();
                });
                btnRight.addEventListener('pointercancel', (e) => {
                    preventDefaultTouch(e);
                    stopMoveRight();
                });
                btnRight.addEventListener('pointerleave', (e) => {
                    preventDefaultTouch(e);
                    stopMoveRight();
                });

                // Jump Button
                btnJump.addEventListener('pointerdown', (e) => {
                    preventDefaultTouch(e);
                    triggerJump();
                });

                // Extra safety for touch events
                btnLeft.addEventListener('touchstart', preventDefaultTouch, { passive: false });
                btnRight.addEventListener('touchstart', preventDefaultTouch, { passive: false });
                btnJump.addEventListener('touchstart', preventDefaultTouch, { passive: false });
            }

            if (mobileContainer) {
                // Prevent scrolling when touching the controls area
                mobileContainer.addEventListener('touchmove', (e) => {
                    if (e.cancelable) e.preventDefault();
                }, { passive: false });
            }

            let prog = 0;
            const iv = setInterval(() => {
                prog += 4.5;
                document.getElementById('progress-fill').style.width = prog + '%';
                if (prog >= 100) {
                    clearInterval(iv);
                    setTimeout(() => {
                        document.getElementById('loader').style.opacity = '0';
                        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                    }, 300);
                }
            }, 25);

            animate();
        }

        function buildWorld() {
            const createChunk = (z) => {
                const group = new THREE.Group();
                
                // Track Bed
                const ground = new THREE.Mesh(
                    new THREE.PlaneGeometry(60, 100), 
                    new THREE.MeshStandardMaterial({ 
                        color: 0x0f172a, 
                        roughness: 0.1, 
                        metalness: 0.5,
                        map: gritTexture 
                    })
                );
                ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true;
                group.add(ground);

                // Glow Lines for Road
                const edgeGlow = new THREE.Mesh(
                    new THREE.PlaneGeometry(0.5, 100),
                    new THREE.MeshBasicMaterial({ color: COLORS.rail })
                );
                edgeGlow.rotation.x = -Math.PI/2;
                edgeGlow.position.set(-15, 0.05, 0); group.add(edgeGlow);
                const edgeGlowR = edgeGlow.clone(); edgeGlowR.position.x = 15; group.add(edgeGlowR);

                const createBuilding = (x, z) => {
                    const h = 60 + Math.random() * 120;
                    const w = 25 + Math.random() * 15;
                    const bG = new THREE.BoxGeometry(w, h, 25);
                    const bM = new THREE.MeshStandardMaterial({ 
                        color: 0x020617, 
                        map: gritTexture,
                        roughness: 0.2,
                        metalness: 0.8
                    });
                    const b = new THREE.Mesh(bG, bM);
                    b.position.set(x, h/2, z);
                    b.castShadow = true; b.receiveShadow = true;
                    group.add(b);

                    // Vertical Neon Stripe
                    const stripeG = new THREE.BoxGeometry(0.5, h, 0.5);
                    const stripeM = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? COLORS.neonBlue : COLORS.neonPink });
                    const stripe = new THREE.Mesh(stripeG, stripeM);
                    stripe.position.set(x + (x > 0 ? -w/2-0.1 : w/2+0.1), h/2, Math.random()*20-10);
                    group.add(stripe);

                    // Building Top Glow (Neon look)
                    const tG = new THREE.BoxGeometry(w + 0.5, 2, 25.5);
                    const tM = new THREE.MeshBasicMaterial({ color: stripeM.color });
                    const topGlow = new THREE.Mesh(tG, tM);
                    topGlow.position.set(x, h, z);
                    group.add(topGlow);

                    // Random Windows
                    const windowColors = [0x00d2ff, 0xff007f, 0xfacc15, 0xffffff];
                    const sharedWinGeo = new THREE.PlaneGeometry(2, 3);
                    for(let i=0; i<Math.floor(h/12); i++) {
                        if (Math.random() > 0.5) {
                            const wM = new THREE.MeshBasicMaterial({ color: windowColors[Math.floor(Math.random()*windowColors.length)] });
                            const win = new THREE.Mesh(sharedWinGeo, wM);
                            win.position.set(x > 0 ? -w/2-0.2 : w/2+0.2, 15 + i*10, Math.random()*20 - 10);
                            win.rotation.y = x > 0 ? -Math.PI/2 : Math.PI/2;
                            group.add(win);
                        }
                    }
                };

                for(let i=0; i<3; i++) {
                    createBuilding(-35, -50 + i*40);
                    createBuilding(35, -50 + i*40);
                }

                lanes.forEach(lx => {
                    // Sleepers (shared geometry/material)
                    for(let i=0; i<25; i++) {
                        const s = new THREE.Mesh(sharedSleeperGeo, sharedSleeperMat);
                        s.position.set(lx, 0.25, -50 + i*4); group.add(s);
                    }
                    // Rails (shared geometry/material)
                    const rL = new THREE.Mesh(sharedRailGeo, sharedRailMat);
                    rL.position.set(lx-1.6, 0.6, 0); group.add(rL);
                    const rR = rL.clone(); rR.position.x = lx+1.6; group.add(rR);

                    // High-Contrast Lane Lines (Visibility)
                    const lineG = new THREE.PlaneGeometry(0.35, 100);
                    const lineM = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
                    const lineL = new THREE.Mesh(lineG, lineM);
                    lineL.rotation.x = -Math.PI/2; lineL.position.set(lx - 2.5, 0.35, 0); group.add(lineL);
                    const lineR = lineL.clone(); lineR.position.x = lx + 2.5; group.add(lineR);
                });

                group.position.z = z; scene.add(group);
                return group;
            };
            for(let i=0; i<6; i++) trackChunks.push(createChunk(-i*100));

            for(let i=0; i<12; i++) {
                const s = new THREE.Mesh(new THREE.BoxGeometry(100, 8, 25), new THREE.MeshStandardMaterial({ color: 0x1e272e }));
                s.position.set(0, 50, -i * 200); scene.add(s); scenery.push(s);
            }
        }

            const lane = lanes[Math.floor(Math.random() * 3)];

            let type = 'train';
            if (r < 0.3) type = 'barrier_low';
            else if (r < 0.5) type = 'barrier_high';
            
            let mesh;
            if (type === 'train') {
                const g = new THREE.Group();
                const color = COLORS.trains[Math.floor(Math.random()*COLORS.trains.length)];
                
                // Sleek Train Body
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(4.8, 8, 45), 
                    new THREE.MeshStandardMaterial({ color, metalness: 0.9, roughness: 0.1 })

                // Emissive Headlights (no PointLight - bloom handles glow)
                const lightG = new THREE.CircleGeometry(0.8, 12);
                const lightM = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const l1 = new THREE.Mesh(lightG, lightM);
                l1.position.set(-1.4, 6, 22.6); g.add(l1);
                const l2 = l1.clone(); l2.position.x = 1.4; g.add(l2);
                
                const win = new THREE.Mesh(new THREE.BoxGeometry(4.2, 2.5, 0.2), new THREE.MeshStandardMaterial({ color: 0x00d2ff, emissive: 0x00d2ff, emissiveIntensity: 2 }));
                win.position.set(0, 5.5, 22.6); g.add(win);
                
                if (Math.random() > 0.5) {
                    const ramp = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.5, 18), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                    ramp.rotation.x = -Math.PI/10; ramp.position.set(0, 4.2, 28);
                    g.add(ramp); g.hasRamp = true;

                mesh = g; mesh.position.set(lane, 0, -550);

        function startGame() {
            // Reset state immediately to prevent crashes and high-score carryover
            totalScore = 0; coinCount = 0; collectedBoxes = 0; 
            speed = baseSpeed; frameCount = 0; gameTime = 0;
            gameActive = true; 
            
            currentLane = 1; targetX = lanes[currentLane];
            if (player) player.position.set(targetX, 0, 0);
            isJumping = isSliding = isFlying = false;
            activePowerup = null; powerupTimeLeft = 0;
            if (player && player.jetpack) player.jetpack.visible = false;
            
            document.getElementById('score-val').textContent = "000000";
            document.getElementById('coin-val').textContent = "0";
            document.getElementById('powerup-ui').style.display = 'none';
            document.getElementById('box-hud').style.display = 'none';
            
            obstacles.forEach(o => scene.remove(o.mesh)); obstacles = [];
            coins.forEach(c => scene.remove(c)); coins = [];
            powerups.forEach(p => scene.remove(p.mesh)); powerups = [];
            
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('mystery-screen').style.display = 'none';
            document.getElementById('reward-reveal').style.display = 'none';
            
            // Immediate spawn kickstart
            spawnObstacle();
            spawnCoins();
        }
        function onKeyDown(e) {
            if (!gameActive) return;
            if ((e.key === 'a' || e.key === 'ArrowLeft') && currentLane > 0) { currentLane--; targetX = lanes[currentLane]; }
            if ((e.key === 'd' || e.key === 'ArrowRight') && currentLane < 2) { currentLane++; targetX = lanes[currentLane]; }
            if ((e.key === ' ' || e.key === 'w' || e.key === 'ArrowUp') && !isJumping && !isFlying) { isJumping = true; jumpVelocity = 0.85; }
            if ((e.key === 's' || e.key === 'ArrowDown') && !isFlying) {
                if (isJumping) jumpVelocity = -1.3;
                else if (!isSliding) { isSliding = true; slideTimer = 0.95; player.scale.y = 0.45; }
            }
        }

        let gameTime = 0;
        function update(delta) {
            const animTime = Date.now() * 0.008; // Use a more stable time base
            
            // Resting Animation (Idle breathing/bobbing)
            if (!gameActive) {
                if (humanoid) {
                    humanoid.position.y = Math.sin(animTime * 0.5) * 0.1;
                    if (humanoid.L_arm) humanoid.L_arm.rotation.x = Math.sin(animTime * 0.5) * 0.15;
                    if (humanoid.R_arm) humanoid.R_arm.rotation.x = -Math.sin(animTime * 0.5) * 0.15;
                }
                return;
            }

            gameTime += delta;
            frameCount++;
            
            speed += 0.00018 * delta * 60;
            const worldMove = speed * 160 * delta;
            totalScore += Math.floor(speed * delta * 800); 
            document.getElementById('score-val').textContent = String(totalScore).padStart(6, '0');
            document.getElementById('coin-val').textContent = coinCount;

            const leanTarget = (targetX - player.position.x) * 0.12;
            player.rotation.z += (leanTarget - player.rotation.z) * 0.18;
            player.position.x += (targetX - player.position.x) * 0.25;

            // Character State Animations
            const L_leg = humanoid.L_leg || humanoid.getObjectByName('L_leg');
            const R_leg = humanoid.R_leg || humanoid.getObjectByName('R_leg');
            const L_arm = humanoid.L_arm || humanoid.getObjectByName('L_arm');
            const R_arm = humanoid.R_arm || humanoid.getObjectByName('R_arm');

            if (isFlying) {
                player.position.y += (32 - player.position.y) * 0.1;
                player.rotation.x = Math.sin(gameTime * 10) * 0.12;
                if(L_leg) L_leg.rotation.x = 0.2; if(R_leg) R_leg.rotation.x = 0.2;
                if(L_arm) L_arm.rotation.x = -0.2; if(R_arm) R_arm.rotation.x = -0.2;
            } else if (isJumping) {
                player.position.y += jumpVelocity; jumpVelocity -= 2.4 * delta;
                if (player.position.y <= 0) { player.position.y = 0; isJumping = false; }
                if(L_leg) L_leg.rotation.x = -0.5; if(R_leg) R_leg.rotation.x = 0.3;
            } else if (isSliding) {
                slideTimer -= delta;
                if (slideTimer <= 0) { isSliding = false; player.scale.y = 1; }
                if(L_leg) L_leg.rotation.x = -Math.PI/2.5; if(R_leg) R_leg.rotation.x = -Math.PI/2.5;
            } else {
                // RUN CYCLE
                const runS = animTime * 1.8;
                humanoid.position.y = Math.abs(Math.sin(runS)) * 0.5;
                if(L_leg) L_leg.rotation.x = Math.sin(runS) * 1.3;
                if(R_leg) R_leg.rotation.x = -Math.sin(runS) * 1.3;
                if(L_arm) L_arm.rotation.x = -Math.sin(runS) * 1.3;
                if(R_arm) R_arm.rotation.x = Math.sin(runS) * 1.3;
            }

            // Powerup Logic
            if (powerupTimeLeft > 0) {
                powerupTimeLeft -= delta;
                document.getElementById('powerup-fill').style.width = (powerupTimeLeft / 10 * 100) + '%';
                if (powerupTimeLeft <= 0) {
                    isFlying = false; player.jetpack.visible = false;
                    player.rotation.z = 0; activePowerup = null;
                    document.getElementById('powerup-ui').style.display = 'none';
                }
            }

            // Inspector Logic
            if (inspectorChase > 0) {
                inspectorChase -= delta;
                scene.inspector.visible = true;
                scene.inspector.position.x = player.position.x;
                // Follow closely behind player
                scene.inspector.position.z = 10 + Math.sin(gameTime * 15) * 1.5;
                if (inspectorChase <= 0) scene.inspector.visible = false;
            }
            // Neon Core Pulsing (Safe Check)
            const coreMesh = humanoid.children.find(c => 
                c.isMesh && 
                c.geometry && 
                c.geometry.type === 'SphereGeometry' && 
                c.material && 
                c.material.color &&
                c.material.color.getHex() === 0x00d2ff
            );
            if (coreMesh) coreMesh.material.opacity = 0.4 + Math.sin(animTime * 4) * 0.4;

            // Motion Trails
            if (frameCount % 6 === 0) {
                const tMat = sharedTrailMat.clone();
                const trail = new THREE.Mesh(sharedTrailGeo, tMat);
                trail.position.copy(player.position);
                trail.position.y += 2;
                scene.add(trail);
                trailPool.push(trail);
            }
            for (let i = trailPool.length - 1; i >= 0; i--) {
                const tp = trailPool[i];
                tp.material.opacity -= 0.06;
                if (tp.material.opacity <= 0) {
                    scene.remove(tp);
                    tp.material.dispose();
                    trailPool.splice(i, 1);
                }
            }

            // Speed Lines UI
            document.getElementById('speed-lines').classList.toggle('active', speed > 1.35);

            // Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.mesh.position.z += worldMove;
                const dx = Math.abs(player.position.x - o.mesh.position.x);
                const dz = Math.abs(player.position.z - o.mesh.position.z);
                const dy = player.position.y;
                
                if (!isFlying) {
                    if (o.type === 'train') {
                        if (dx < 2.5 && dz < 25) {
                            if (o.mesh.hasRamp && dz > 12 && dz < 28) player.position.y = 13.5;
                            else if (dy < 11.5) { shakeAmount = 2.0; endGame(); }
                        }
                    } else if (o.type === 'barrier_low') {
                        if (dx < 2.5 && dz < 3.0) {
                            if (dy < 6) {
                                if (inspectorChase > 0) { shakeAmount = 2.0; endGame(); }
                                else { inspectorChase = 5; shakeAmount = 0.8; scene.remove(o.mesh); obstacles.splice(i, 1); continue; }
                            }
                        }
                    } else if (o.type === 'barrier_high') {
                        if (dx < 2.5 && dz < 3.0) {
                            if (!isSliding || dy > 1.5) { shakeAmount = 2.0; endGame(); }
                        }
                    }
                }
                if (o.mesh.position.z > 80) { scene.remove(o.mesh); disposeMesh(o.mesh); obstacles.splice(i, 1); }
            }

            // Coins
            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                c.position.z += worldMove;
                c.rotation.y += delta * 6;
                if (activePowerup === 'magnet' && c.position.z > -100) {
                    c.position.x += (player.position.x - c.position.x) * 0.45;
                    c.position.y += (player.position.y + 1.8 - c.position.y) * 0.45;
                }
                if (Math.abs(player.position.x - c.position.x) < 3.0 && Math.abs(player.position.z - c.position.z) < 4.5 && Math.abs(player.position.y + 2 - c.position.y) < 6) {
                    coinCount++; createBurst(c.position, 0xffde00);
                    scene.remove(c); coins.splice(i, 1);
                } else if (c.position.z > 80) { 
                    scene.remove(c); coins.splice(i, 1); 
                }
            }

            // Powerups
            for (let i = powerups.length - 1; i >= 0; i--) {
                const p = powerups[i];
                p.mesh.position.z += worldMove;
                p.mesh.rotation.y += delta * 3;
                if (Math.abs(player.position.x - p.mesh.position.x) < 3.0 && Math.abs(player.position.z - p.mesh.position.z) < 4.5 && Math.abs(player.position.y + 2 - p.mesh.position.y) < 6) {
                    if (p.type === 'mystery') {
                        collectedBoxes++;
                        document.getElementById('box-hud').style.display = 'flex';
                        document.getElementById('box-val').textContent = collectedBoxes;
                    } else {
                        activePowerup = p.type;
                        powerupTimeLeft = 10.0;
                        document.getElementById('powerup-ui').style.display = 'flex';
                        if (p.type === 'jetpack') { isFlying = true; player.jetpack.visible = true; }
                    }
                    createBurst(p.mesh.position, p.type === 'magnet' ? COLORS.magnet : COLORS.jetpack);
                    scene.remove(p.mesh); powerups.splice(i, 1);
                } else if (p.mesh.position.z > 80) { 
                    scene.remove(p.mesh); disposeMesh(p.mesh); powerups.splice(i, 1); 
                }
            }

            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.vel);
                p.vel.y -= 0.04;
                p.life -= 0.03;
                p.scale.setScalar(p.life);
                if (p.life <= 0) { scene.remove(p); p.material.dispose(); particles.splice(i, 1); }
            }

            const spawnRate = Math.max(15, Math.floor(65 / speed));
            if (frameCount % spawnRate === 0) spawnObstacle();
            if (frameCount % Math.floor(spawnRate / 2) === 0) spawnCoins();
            if (frameCount % 850 === 0) spawnPowerup();

            trackChunks.forEach(chunk => { chunk.position.z += worldMove; if (chunk.position.z > 100) chunk.position.z -= 600; });
            scenery.forEach(s => { s.position.z += worldMove; if (s.position.z > 50) s.position.z -= 2000; });
            
            // Camera Effects
            const targetCamY = isFlying ? 60 : 16;
            camera.position.y += (targetCamY - camera.position.y) * 0.05;
            camera.position.x += (player.position.x * 0.4 - camera.position.x) * 0.1;
            
            // Shake
            if (shakeAmount > 0) {
                camera.position.x += (Math.random()-0.5) * shakeAmount;
                camera.position.y += (Math.random()-0.5) * shakeAmount;
                shakeAmount *= 0.9;
            }

            // Camera Tilt
            const tilt = (targetX - player.position.x) * 0.05;
            camera.rotation.z += (tilt - camera.rotation.z) * 0.1;
            
            camera.fov = 75 + speed * 25; camera.updateProjectionMatrix();
        }

        function endGame() {
            gameActive = false;
            // Sync final score to backend
            saveGameResult("SCORE", totalScore);
            
            if (collectedBoxes > 0) {
                document.getElementById('overlay').classList.remove('hidden');
                document.getElementById('mystery-screen').style.display = 'flex';
                document.getElementById('boxes-left').textContent = collectedBoxes + " BOXES REMAINING";
            } else {
                showGameOver();
            }
        }

        function showGameOver() {
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('mystery-screen').style.display = 'none';
            document.getElementById('final-score').textContent = totalScore;
        }

        function openMysteryBox() {
            if (collectedBoxes <= 0) return;
            const reward = REWARDS[Math.floor(Math.random() * REWARDS.length)];
            document.getElementById('reward-text').textContent = reward.text;
            document.getElementById('reward-reveal').style.display = 'flex';
            if (reward.type === "coins") coinCount += reward.value;
            else totalScore += reward.value;
            collectedBoxes--;
        }

        function getContextPath() {
            const path = window.location.pathname;
            const match = path.match(/^\/([^\/]+)\/play-runner/);
            return match ? '/' + match[1] : '';
        }

        async function saveGameResult(type, scoreValue) {
            try {
                const response = await fetch(getContextPath() + '/api/games/reward', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        result: type,
                        gameName: "Zentrix Surfers",
                        score: String(scoreValue)
                    })
                });
                const contentType = response.headers.get('content-type') || '';
                let data = null;
                if (contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    const text = await response.text();
                    data = { message: text };
                }

                if (!response.ok) {
                    // Guest players can play without logging in; avoid noisy warnings in that case.
                    if (response.status !== 401) {
                        console.warn("Backend Sync failed:", response.status, data?.message || data);
                    }
                    return;
                }

                if (data && data.message) {
                    console.log("Backend Sync:", data.message);
                }
                if (data && data.coins !== undefined) {
                    document.getElementById('coin-val').textContent = data.coins;
                }
            } catch (e) {
                console.error("Failed to sync with backend:", e);
            }
        }

        function claimReward() {
            document.getElementById('reward-reveal').style.display = 'none';
            // Sync current score + reward to backend
            saveGameResult("SCORE", totalScore);
            
            if (collectedBoxes > 0) {
                document.getElementById('boxes-left').textContent = collectedBoxes + " BOXES REMAINING";
            } else {
                showGameOver();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            update(delta);
            composer.render();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            if (fxaaPass && fxaaPass.material && fxaaPass.material.uniforms && fxaaPass.material.uniforms.resolution) {
                fxaaPass.material.uniforms.resolution.value.set(1 / window.innerWidth, 1 / window.innerHeight);
            }
        }

        init();

        /*]]>*/
    </script>
</body>
