<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Leaderboard | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 18px; padding: 16px; }
        .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
        .row { display:flex; justify-content:space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--glass-border); }
        .row:last-child { border-bottom: none; }
        .rank { width: 28px; height: 28px; border-radius: 10px; display:flex; align-items:center; justify-content:center; font-weight: 900; background: rgba(0,0,0,0.06); border:1px solid var(--glass-border); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <!-- Mobile Sidebar Overlay -->
    <div class="mobile-menu-overlay" onclick="document.querySelector('.sidebar').classList.remove('mobile-open'); this.classList.remove('active');"></div>

    <nav class="dashboard-navbar">
        <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('mobile-open'); document.querySelector('.mobile-menu-overlay').classList.toggle('active');" style="display:none; background:none; border:none; color:var(--text-primary); font-size:20px; cursor:pointer; margin-right:15px; margin-left: 5px; padding: 0;">
            <i class="fas fa-bars"></i>
        </button>
        <a class="dashboard-logo" href="/home">Zentrix</a>
        <div class="dashboard-spacer"></div>
        <div class="dashboard-nav-links">
            <a href="/dashboard"><i class="fas fa-home"></i></a>
            <a href="/messages"><i class="fas fa-comment-dots"></i></a>
            <a href="/explore"><i class="fas fa-compass"></i></a>
            <div class="profile-dropdown">
                <a href="/profile">
                    <img th:src="${user != null and user.profilePhotoUrl != null ? user.profilePhotoUrl : 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=1780&auto=format&fit=crop'}"
                        class="user-avatar" style="width:32px; height:32px; border:none;">
                </a>
                <div class="dropdown-menu">
                    <a href="/profile" class="dropdown-item"><i class="fas fa-user-circle"></i> View Profile</a>
                    <a href="/settings" class="dropdown-item"><i class="fas fa-cog"></i> Settings</a>
                    <div class="dropdown-divider"></div>
                    <a href="/logout" class="dropdown-item" style="color: #ff4444;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <a href="/dashboard" class="sidebar-link"><i class="fas fa-home"></i> Home</a>
            <a href="/explore" class="sidebar-link"><i class="fas fa-compass"></i> Explore</a>
            <a href="/events" class="sidebar-link"><i class="fas fa-calendar-alt"></i> Events</a>
            <a href="/battles" class="sidebar-link"><i class="fas fa-fire"></i> Battle Arena</a>
            <a href="/achievements" class="sidebar-link"><i class="fas fa-trophy"></i> Achievements</a>
            <a href="/messages" class="sidebar-link"><i class="fas fa-comment-dots"></i> Chat</a>
            <a href="/reels" class="sidebar-link"><i class="fas fa-film"></i> Reels</a>
            <a href="/profile" class="sidebar-link"><i class="fas fa-user"></i> Profile</a>
            <a href="/games" class="sidebar-link"><i class="fas fa-gamepad"></i> Games</a>
            <a href="/music" class="sidebar-link active"><i class="fas fa-music"></i> Music</a>
            <a href="javascript:void(0)" class="sidebar-link" onclick="openCreateModal()"><i class="fas fa-plus-circle" style="color: var(--accent);"></i> Create Post</a>
            <a href="/logout" class="sidebar-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </aside>

        <main class="content-main">
            <div class="container" style="margin-top: 0;">
    <h1 style="margin-bottom: 6px;">Music Leaderboard</h1>
    <div style="color: var(--text-muted); font-size: 13px; margin-bottom: 18px;">
        Based on rooms created and votes cast (MVP).
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="margin:0 0 12px 0;"><i class="fas fa-thumbs-up" style="color:#3b82f6;"></i> Top voters</h3>
            <div th:if="${topVoters == null or topVoters.isEmpty()}" style="color: var(--text-secondary); text-align:center; padding: 10px;">
                No votes yet.
            </div>
            <div th:each="r,iter : ${topVoters}" class="row">
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="rank" th:text="${iter.index + 1}">1</div>
                    <div style="font-weight: 800;" th:text="${r.username}">user</div>
                </div>
                <div class="pill">
                    <i class="fas fa-star" style="color:#ffd700;"></i>
                    <span th:text="${r.count}">0</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 12px 0;"><i class="fas fa-microphone" style="color: var(--accent);"></i> Top hosts</h3>
            <div th:if="${topHosts == null or topHosts.isEmpty()}" style="color: var(--text-secondary); text-align:center; padding: 10px;">
                No rooms yet.
            </div>
            <div th:each="r,iter : ${topHosts}" class="row">
                <div style="display:flex; gap:10px; align-items:center;">
                    <div class="rank" th:text="${iter.index + 1}">1</div>
                    <div style="font-weight: 800;" th:text="${r.username}">user</div>
                </div>
                <div class="pill">
                    <i class="fas fa-users"></i>
                    <span th:text="${r.count}">0</span>
                </div>
            </div>
        </div>
    </div>
            </div>
        </main>
    </div>
    <div th:replace="~{fragments/modals :: createPostModal}"></div>
</body>
</html>
