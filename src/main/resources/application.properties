
spring.application.name=zentrix1
# Removed redundant exclusion to ensure standard datasource initialization

server.port=${SERVER_PORT:8009}
spring.devtools.restart.enabled=true

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/zentrix1_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:root}


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Multipart configurations
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# HikariCP Configuration to handle system pauses better
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# Tomcat specific form tweaks
server.tomcat.max-parameter-count=5000
server.tomcat.max-http-form-post-size=200MB
server.tomcat.max-swallow-size=200MB

# Disable session persistence to prevent EOFException during restart
server.servlet.session.persistent=false

# Music (Option C) storage directory (local filesystem for MVP)
zentrix.music.storage-dir=${MUSIC_STORAGE_DIR:src/main/resources/static/uploads/music}











